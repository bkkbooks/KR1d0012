body:
  text: 周禮句解卷十二宋朱申撰冬官考工記下玉人之事攻玉之工玉人為長鎭圭尺有二寸天子守之鎭取鎭安四方之義命圭九寸謂之桓圭公守之公侯伯之圭皆曰命者以其出於王所命也桓取强直有立之義命圭七寸謂之信圭侯守之信取尊而不屈之義信申命圭七寸謂之躬圭伯守之躬取卑而不信之義以上制度詳見大宗伯注天子執冒四寸冒圭其形四方其大四寸邪刻其下取覆冒為義以朝諸侯諸侯來朝則以其瑞圭銳首上合於天子之冒圭以為驗也朝潮同天子用全此言祼圭也祼圭一器有瓉有龍有將惟天子則全用玉為之上公用龍祼圭以龍為首上公之祼圭以玉飾其首故曰用龍侯用瓚祼圭盛鬯處曰瓚侯之祼圭以玉飾瓚故曰用瓚伯用將祼圭之柄曰將伯之祼圭以玉飾其柄故曰用將繼子男執皮帛此上疑有脫文典命曰凡諸侯之適子未誓則以皮帛繼子男詳見本注天子圭中必必與縪同謂以維約其圭之中央防失墜也四圭尺有二寸以禮天典瑞曰四圭有邸以祀天旅上帝大圭長三尺典瑞曰王搢大圭杼上終葵首杼殺也終葵推也為推於其杼上明無所屈也杼直吕反天子服之服之則所謂搢之也土圭尺有五寸以致曰以土地致日度日景也典瑞曰土圭以致四時日月封國則以土地祼圭尺有二寸有瓚以祀廟典瑞曰以肆先王以祼賓客琬圭九寸而繅以象徳繅藉玉者也典瑞曰以治徳以結好也琬音宛繅音早琰圭九寸判規以除慝以易行判半也規半以上剡至首規半以下為琢節也餘並見典瑞注琰音冉易去聲璧羨度尺典瑞曰璧羨以起度羨以善切好三寸以為度好璧孔也其徑三寸圓者徑一而圍三則其肉之圍凡九寸矣以徑三寸加圍九寸則得十一寸羡其三寸以為度則盈一尺矣好去聲圭璧五寸以祀日月星辰見典瑞注璧琮九寸諸侯以享天子圓曰璧方曰琮璧以帛琮以錦蓋諸伯享天子之禮穀圭七寸天子以聘女典瑞曰以和難以聘女大璋中璋九寸半圭曰璋曰大曰中則知中璋小於大璋矣其璋則皆九寸邉璋七寸邉璋又小於中璋其長七寸射四寸其廣四寸射音石下並同厚寸其厚一寸黄金勺三璋皆璋瓚故有勺以盛黄流以黄金為之青金外以青金飾其外朱中以朱飾其中鼻寸鼻謂龍頭其高一寸衡四寸勺之徑廣四寸有繅所以藉璋天子以巡守天子巡守所過有事於山川視山川之三等而用二璋也守狩宗祝以前馬宗宗伯之屬祝太祝之屬天子巡守則宗祝以此前馬而致禮大璋亦如之言諸侯之大璋亦如邉璋之長七寸射四寸者諸侯以聘女言天子用穀圭諸侯用大璋也瑑圭璋八寸璧琮八寸以頫聘見典瑞注瑑篆頫工弔反牙璋中璋七寸中璋牙璋之小者射二寸廣二寸厚寸厚一寸以起軍旅以治兵守見典瑞注駔琮五寸駔與組同言係之以組也駔祖宗后以為權宗后即王后也以組係琮為稱錘以權輕重也大琮十有二寸大於五寸七寸之琮故曰大琮射四寸厚寸是謂内鎭大琮為内鎮以見鎮圭之為外鎮也宗后守之猶王之守鎮圭也駔琮七寸宗后五寸而天子七寸者隆殺之辨也鼻寸有半寸宗后之制亦如此天子以為權以權輕重兩圭五寸有邸以祀地以旅四望見典瑞注邸抵瑑琮八寸以别於禮神故加琢刻也諸侯以享夫人諸侯相為賓則夫人有致禮之儀則享夫人者亦施報之禮也案十有二寸以玉飾案其髙十二寸棗㮚十有二列以棗㮚陳於案上為十二列也㮚栗諸侯純九以勞諸侯皆用九列大夫純五以勞大夫皆用五列夫人以勞諸侯夫人謂天子之三夫人也夫人佐后治内政故王勞賔客而夫人亦以棗栗勞之隂陽相成之義也然諸侯純九大夫純五者則知所謂十二列者勞二王之後也勞去聲璋邸射素功以祀山川以致稍餼典瑞曰以祀山川以造贈賔客素功者不加琢飾也所謂致稍餼者即造贈賔客之謂也稍去聲楖人闕雕人闕磬氏為磬倨句一矩有半其愽為一股為二鼔為三參分其股愽去一以為鼓愽參分其鼓愽以其一為之厚已上則摩其旁已下則摩其耑矢人為矢矢箭也鍭矢參分茀矢參分一在前二在後兵矢田矢五分二在前三在後殺矢七分三在前四在後參分其長而殺其一五分其長而羽其一以其笴厚為之羽深水之以辨其隂陽夾其隂陽以設其比夾其比以設其羽參分其羽以設其刄則雖有疾風亦弗之能憚矣刄長寸圍寸鋌十之重三垸前弱則俛前弱則矢行而低後弱則翔後弱則矢行而還中弱則紆中弱則矢行而曲中强則揚中强則矢行而起此四者强弱之失其中也羽豐則遲羽多則矢重而其行失於緩羽殺則趮羽少則矢輕而其行失於急此二者豐殺之失其節也殺去聲趮躁是故夾而搖之此言相矢之法言宜以指夾矢而搖之以眡其豐殺之節也以矢之輕重而知其豐殺之節撓之以指撓其榦而曲之以眡其鴻殺之稱也以矢之强弱而知其鴻殺之稱稱去聲凡相笴欲生而搏同搏欲重同重節欲疏同疏欲㮚陶人為甗實二鬴厚半寸脣寸盆實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺凡陶瓬之事髺墾薜暴不入市器中膞豆中縣膞崇四尺方四寸梓人為筍簴筍簴鍾磬之架也横曰筍直曰簴簴音巨天下之大獸五其目在下脂者牛羊之屬膏者犬豕之屬臝者虎豹之屬以其體重毛淺猶祼袒也臝力果反羽者飛禽之屬鱗者龍蛇之屬宗廟之事五獸用於宗廟脂者膏者以為牲致美味也臝者羽者鱗者以為筍簴貴野聲也外骨龜屬内骨鱉屬郤行若蚓之類仄行若蠏之類連行若魚之類紆行若蛇之類紆乙俱反以脰鳴者蛙黽之屬脰豆以注鳴者蟋蟀之類以旁鳴者蜩蜺之屬以翼鳴者發皇之屬以股鳴者斯螽之屬以胷鳴者榮原之屬謂之小蟲之屬骨者二行者四鳴者六皆小蟲之屬以為雕琢凡此皆雕琢其形而飾筍簴也厚脣弇口出目短耳大胷燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜聲大而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴鋭啄決吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清揚而逺聞於磬宜若是者以為磬虡故擊其所縣而由其虡鳴小首而長搏身而鴻若是者謂之鱗屬以為筍凡攖閷援簭之類必深其爪出其目作其鱗之而深其爪出其目作其鱗之而則於眡必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣爪不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也凡試梓飲器鄉衡而實不盡梓師罪之梓人為侯侯今之射垜也廣與崇方崇高也方猶等也高廣等者謂侯中也參分其廣天子射禮以九為節侯道九十弓弓二寸以為侯中高廣等則天子侯中丈八尺諸侯於其國亦然而鵠居一焉鵠所射也以皮為之各如其侯也居侯中參分之一則此鵠方六尺惟大射以皮飾侯大射者將祭之射也其餘有賔射燕射上兩个與其身三下兩个半之兩个謂布可以維持侯者也上方兩枚與身三設身廣一丈兩个各一丈凡為三丈下兩个半之傳地故短也上綱與下綱出舌尋縜寸焉綱所以繫侯於植者也舌維持侯者上下皆出舌一尋者亦人張手之節也縜籠綱者縜尤粉反張皮侯而棲鵠則春以功鵠射之的也張皮侯而棲鵠謂以皮飾侯而用於大射也諸侯以春貢士天子因大射而選士助祭取其中的之功也春上聲張五采之侯則逺國屬五采侯猶今之紅心蓋朱其中白次之蒼次之黄次之黒居外也天子張五采侯以行賔射之禮所以象文徳也故逺國屬張獸侯則王以息燕獸侯畫為熊麋鹿豕虎豹之象也天子張獸侯以用之燕射所以示其為民除害也故可以休息而安燕焉祭侯之禮將射則先祭侯之神以酒脯醢不用牲也醢海其辭曰祭侯之祝辭也惟若寧侯若汝也寕安也侯之為物捍内蔽外以禦敵為任者也有諸侯之象焉故假以為戒敕諸侯之辭言汝當安為諸侯也毋或若女不寧侯此若字訓如蓋責之曰汝等諸侯毋如此等不寕之侯毋無女汝不屬於王所以其不寧故不服屬於天子之所故抗而射女數其不屬於王之罪故立其侯而射之也强飲强食此祝神之辭勉之使飲食也强上聲詒汝曾孫諸侯百福汝侯既飲食醉飽當以百福遺汝曽孫之為諸侯也廬人為廬器謂戈㦸殳矛之柄也廬盧戈柲六尺有六寸柲猶柄也殳長尋有四尺八尺曰尋殳殊車㦸常倍尋曰常酋矛常有四尺夷矛三尋酋夷長短名酋在由反凡兵無過三其身八尺為一尋人長八尺三其人身之長則三尋矣過三其身設使過於三尋之身弗能用也則兵太長不可得而用之而無已而又不止於弗能用也又以害人適所以為人之害也故攻國之兵欲短凡兵用之於攻敵者則貴乎短守國之兵欲長用之於守城者則貴乎長攻國之人衆此覆解欲短欲長之意謂攻國者用人必多行地逺其所行之地又甚逺食飲飢飲食不時故多飢也且涉山林之阻又況跋涉山林之險阻是故兵欲短有此四者皆不便於長兵故兵欲短也守國之人寡守國者用人必少食飲飽飲食及時故皆飽也行地不逺雖徃來巡警而所行不逺且不涉山林之阻又况不跋涉山林之險阻是故兵欲長有此四者可用長兵故兵欲長也凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵搏擊兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲傅人傅人則宻是故侵之凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍凡試廬事置而搖之以眡其蜎也灸諸牆以眡其橈之均也横而搖之以眡其勁也六建既備車不反覆謂之國工匠人建國前經謂惟王建國辨方正位者此也水地以縣先於四角立植以繩垂之而墜取其端直然後置水於地而取其平也縣音𤣥置𣙗以縣𣙗謂立八尺之木以為表也水地而得其平則可以量日景矣故置𣙗於其中復以繩垂之而墜欲其表之端直也𣙗魚列反眡以景言所以置𣙗者將以眡日景也為規識日出之景與日入之景此言眡日景之法以取東西也立八尺之表於地之平處日出東方則景在表之西日入西方則景在表之東乃於其景之兩端畫而記之然後以繩貫於所立之表如景之長就地一匝為一大規則所識日出日入之景可以定東西矣東西既定乃以自東至西之長而中屈之以量南北則南北亦可得而定矣識音志晝參諸日中之景經乆猶恐南北之未正又參諸日中之景焉冬至日行南陸景長一丈三尺夏至日行北陸景短一尺五寸此日中之景也夜考之極星極星中星也初昏之時見於正南之位晝參夜考則南北無不正矣以正朝夕以日中之景正其朝則地之中得矣以極星正其夕則天之中得矣匠人營國始作而立之謂之建周圍而治之謂之營方九里上公之國其城方九里天子之城不宜如是之狹也旁三門城之四旁各為三門共十二門國中九經九緯國中之路縱者九塗為之經横者九塗為之緯緯位經涂九軌軌車轍跡也言經涂之廣可容九車徃來然王城之門既有十二則所謂九經九緯九軌者皆當以十二為數也左祖右社正宫在城之中其左為宗廟其右為社稷面朝後市其前為朝廷其後為市井朝潮下同市朝一夫朝者官吏所㑹市者商旅所聚必一夫百畆之地然後足以容之夏后氏世室此言三代明堂之制夏后氏號為世室也堂脩二七夏后氏度以步堂脩二七者謂其南北之深十四步也廣四脩一堂之廣益以四分脩之一則其廣十七步有半矣廣去聲下同五室三四步四三尺堂上有五室以象五行東北木室東南火室西南金室西北水室其深皆三步其廣皆益以四尺也中央土室其深四步其廣益以二尺也九階南面三階東西北面各二階共為九階四旁兩夾忩毎室四户毎户夾以兩忩共為八忩白盛以蜃灰堊其牆壁也盛成門堂三之二門堂門側之堂也其深廣比正堂有三分之二室三之一門堂之室其深廣比正室有三分之一殷人重屋殷人號為重屋重平聲堂脩七尋商人度以尋一尋八尺七尋則深五丈六尺也堂崇三尺崇高也四阿重屋言四方屋棟皆為重屋故號重屋也周人明堂明堂之内有世室有重屋三代各舉其一以名之度九尺之筵周人度以筵毎筵長九尺度待咨反下同東西九筵東西之廣為八丈一尺南北七筵南北之深為六丈三尺堂崇一筵其高九尺五室與夏制同凡室二筵毎室一丈八尺室中度以几度量也此總言量地之法一几五尺堂上度以筵一筵九尺宫中度以尋一尋八尺野度以步一步六尺涂度以軌一軌七尺廟門容大扃七个闈門容小扃三个路門不容乗車之五个應門二徹三个内有九室路門之内有九室九嬪居之九嬪賛三夫人以佐后而治内政故各居一室嬪頻外有九室路門之外亦有九室九卿朝焉九卿賛三公以佐天子而治外政故其入朝也亦各居一室焉九分其國以為九分一國之内畫為九分猶井田之法也九卿治之三孤六卿合為九卿各治一分王宫門阿之制五雉雉城上之堞也五堵為雉則長三丈高於一丈也阿棟也門阿之制五雉則三丈之長者五也宫隅之制七雉隅角也宫隅髙於門阿故為七雉則一丈之長者七也城隅之制九雉城隅髙於宫隅故為九雉則三丈之長者九也經涂九軌城中經涂可容九車環涂七軌環城之涂可容七車野涂五軌野外之涂可容五車門阿之制以為都城之制都城王子弟所封之邑其城如門阿之制則無過五雉也宫隅之制以為諸侯之城制諸侯之城如宫隅之制則無過七雉也環涂以為諸侯經涂諸侯經涂可容七車野涂以為都經涂都邑經涂可容五車匠人為溝洫此篇載溝洫之制與遂人不同遂人以一夫至萬夫言之則以相連屬而言也此以一井至一同言之則以開方之法而言之要之考工記未必皆成周之制今各隨本文解之不必强為之説也耜廣五寸耜耒頭之金也其廣五寸二耜為耦兩耜相合號為一耦一耦之伐二耜合為一尺則所伐之土廣一尺矣廣尺深尺謂之􅍒􅍒之廣深皆一尺則二耜之所伐也􅍒捲田首倍之一夫受田百畆其方百步田首則加􅍒之方倍而為遂也廣二尺深二尺謂之遂一夫之田其間有遂以通水其廣深倍於􅍒也九夫為井九夫之田號為一井其方一里井間廣四尺深四尺謂之溝一井之田其間有溝以通水其廣深倍於遂也方十里為成百夫之田其方十里號為一成成間廣八尺深八尺謂之洫一成之田其間有洫以通水其廣深倍於溝也方百里為同千夫之田其方百里號為一同同間廣二尋深二仞謂之澮一同之田其間有澮以通水其廣深又倍於洫也仞與尋皆八尺仞音刃專達於川􅍒之水達於遂遂之水達於溝溝之水達於洫洫之水達於澮澮之水則専達於川各載其名又以别其水之所從也凡天下之地埶泛言天下地埶埶勢兩山之間謂山間之平地必有川焉水之源出於山至於平地則會而為川焉大川之上謂大川之岸上必有涂焉必有道路以通徃來凡溝逆地阞謂之不行水屬不理孫謂之不行梢溝三十里而廣倍凡行奠水磬折以參伍欲為淵則句於矩凡溝必因水勢溝所以導水不因水勢之曲直則其流易壅防必因地勢防所以止水不因地勢之高下則其隄易壞善溝者水漱之善為溝者水必漱齧之而無所壅也漱瘦善防者水淫之善為防者水必淫液之而無所決也凡為防廣與崇方其閷參分去一大防外閷凡溝防必一日先深之以為式凡制溝防必有定式預先一日深之里為式必合一里之廣通計之然後可以傳衆力有定法而後可以齊衆志凡任索約大汲其版謂之無任葺屋參分瓦屋四分困􅐎倉城逆牆六分堂涂十有二分竇其崇三尺牆厚三尺崇三之車人之事半矩謂之宣一宣有半謂之欘一欘有半謂之柯一柯有半謂之磬折車人為耒耒之為器其體曲亦車人為之庛長尺有一寸中直者三尺有三寸上句者二尺有二寸自其庛縁其外以至於首以弦其内六尺有六寸與步相中也堅地欲直庛土剛則欲直庛深入而易推庛謂耒下前曲木柔地欲句庛土之柔處欲曲庛直庛則利推句庛則利發解上文倨句磬折謂之中地中地之耒形之曲直地磬之折乎庛音次車人為車為大車栢車之工柯長三尺愽三寸厚一寸有半五分其長以其一為之首轂長半柯其圍一柯有半輻長一柯有半其愽三三寸厚三之一渠三柯者三行澤者欲短轂澤為沮洳之地用於行澤故利短轂行山者欲長轂山為險阻之地用長轂短轂則利無却行之失長轂則安無倍任之勞行澤者反輮輮牙也以為輪之固抱也行山者仄輮反則裏之滑者在外仄則仄其裏之堅者相依反輮則易仄輮則完六分其輪崇以其一為之牙圍栢車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍大車崇三柯綆寸牝服二柯有三分柯之二羊車二柯有參分柯之一栢車二柯凡為轅三其輪崇參分其長二在前一在後以鑿其鈎徹廣六尺鬲長六尺弓人為弓此弓工也取六材必以其時六材幹角筋膠絲漆也非天時無以備隂陽之和故取之必以其時六材既聚六材既已合聚巧者和之非工巧無以全六材之用故資巧者以和之幹也者以為逺也弓所以為逺者其力在榦故榦以為逺角也者以為疾也弓所以疾發者其勢在角故角以為疾筋也者以為深也角榦資筋以為堅忍以射則中深也膠也者以為和也三者得膠然後相合以為和絲也者以為固也結而固之在絲故絲所以為固漆也者以為受霜露也飾而堅之在漆故漆所以為受霜露凡取榦之道七柘為上檍次之檿桑次之橘次之木𤓰次之荆次之竹為下凡相榦欲赤黒而陽聲赤黒則鄉心陽聲則逺根凡析榦射逺者用勢深者用直居榦之道菑栗不迆則弓不發凡相角秋閷者厚春閷者薄穉牛之角直而澤老牛之角紾而昔疢疾險中瘠牛之角無澤角欲青白而豐末夫角之本蹙於􅑠而休於氣是故柔柔故欲其埶也白也者埶之徴也夫角之中恒當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也夫角之未逺於􅑠而不休於氣是故脆脆故欲其柔也豐末也者柔之徴也角長二尺有五寸三色不失理謂之牛戴牛凡相膠欲朱色而昔昔也者深瑕而澤紾而搏廉鹿膠青白馬膠赤白牛膠火赤鼠膠黒魚膠餌犀膠黄凡昵之類不能方凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝漆欲測絲欲沈得此六材之全然後可以為良凡為弓弓有六材而治之各以其時冬析榦榦欲堅而貞固故冬析之而春液角角欲和而温柔故春液之夏治筋筋欲散而解緩故夏治之秋合三材膠絲漆三者欲其成就而充實故秋合之寒奠體奠定也體者弓徃來之體也必於寒而奠之則弓體用膠至冬堅而牢也氷析灂灂者漆之灂也必於氷而析之則漆灂欲其不動故也灂子召冬析榦則易此覆解上文謂於榦堅之時而析之則其勢和易也易去聲春液角則合於角和之時而液之則其氣浹洽也夏治筋則不煩於筋散之時而治之則其理不亂也秋合三材則合於成材之時而合之則其質不相離也寒奠體則張不流體已定則雖張之而不流移也氷析灂則審環灂已環則不復有所鼔動也春被弦則一年之事被弦於春俟一朞之乆而後可用也析榦必倫析角無邪斵目必荼斵目不荼則及其大脩也筋代之受病夫目也者必强强者在内而摩其筋夫筋之所由幨恒由此作故角三液而榦再液厚其帤則木堅薄其帤則需是故厚其液而節其帤約之不皆約疏數必侔斵摯必中膠之必均斵摯不中膠之不均則及其大脩也角代之受病夫懷膠於内而摩其角夫角之所由挫恒由此作凡居角長者以次需恒角而短是謂逆橈引之則縱釋之則不挍恒角而達譬如終紲非弓之利也今夫茭解中有變焉故挍於挺臂中有柎焉故剽恒角而達引如終紲非弓之利撟榦欲孰於火而無贏撟角欲孰於火而無燂引筋欲盡而無傷其力鬻膠欲孰而水火相得然則居旱亦不動居濕亦不動苟有賤工必因角榦之濕以為之柔善者在外動者在内雖善於外必動於内雖善亦弗可以為良矣凡為弓方其峻而高其柎長其畏而薄其敝宛之無已應下柎之弓末應將興為柎而發必動於閷弓而羽閷末應將發弓有六材焉六者之中榦角為急用惟榦强之弓以榦為强以角附榦而安張如水流張之如水之順流維體防之弓徃來之體防其深淺之失引之中參維角䟫之引弓與三尺之矢相中䟫正也必其用角之正䟫棖欲宛而無負弦引之如環釋之無失體如環材美工巧為之時謂之參均得天時材美工巧為三均角不勝榦榦不勝筋謂之參均用榦勝一石如角勝二石被筋勝三石三者皆平曰三均量其力有參均均者參謂之九和合上材工時角榦筋之六者又以絲漆膠為之輔九者相得而和九和之弓角與榦權角與榦皆權平筋三侔侔猶等也膠三鋝絲三邸漆三斞鋝相稱也邸相敵也斞有所受也上工以有餘巧工和之而有餘下工以不足下工和之則不足為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規説並見夏官司弓矢註弓長六尺有六寸此言人之形貌不同故弓之等制不一六尺六寸弓之制長者謂之上制此弓之上等上士服之士之上者能用之弓長六尺有三寸此得長短之中者謂之中制此弓之中等中士服之士之中者能用之弓長六尺弓之至短者謂之下制此弓之下等下士服之士之下者能用之凡為弓各因其君之躬志慮血氣豐肉而短寛緩以荼若是者為之危弓危弓為之安矢骨直以立忿執以奔若是者為之安弓安弓為之危矢其人安其弓安其矢安則莫能以速中且不深其人危其弓危其矢危則莫能以愿中徃體多來體寡謂之夾臾之屬利射侯與弋徃體寡來體多謂之王弓之屬利射革與質徃體來體若一謂之唐弓之屬利射深大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂合灂若背手文角環灂牛筋蕡灂麋筋斥蠖灂和弓􅌛摩覆之而角至謂之句弓詳察謂之覆極善謂之至角獨善而筋榦未善謂之句弓弓之弊也覆之而榦至謂之侯弓角善榦又善而筋獨未善可以射侯謂之侯弓覆之而筋至謂之深弓非特角榦善而筋亦善故疾而逺又中深故曰深弓周禮句解卷十二
