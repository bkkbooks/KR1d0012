body:
  text: 周禮句解卷六宋朱申撰春官宗伯下大司樂中大夫二人樂官之長掌成均之灋成均五帝學名法謂其遺法也以治建國之學政國有學政不治則不脩不建則不立而合國之子弟焉合聚也公卿大夫之子弟當入學者謂之國子凡有道者有德者使教焉率性之謂道行道而有得於心謂德蓋延請在學有道德者使之教子弟焉死則以為樂祖有道德者死則尊之以為樂祖祭於瞽宗瞽宗殷學名祭於學宫示不忘其所教也以樂德教國子以樂成其德故曰樂德國子即國之子弟也中和祗庸孝友中不偏也和中節也祇敬也庸常也善父母為孝善兄弟為友以樂語教國子以樂達其語故曰樂語興道諷誦言語興者託物興詞道者直言其事微言動之曰諷以聲節之曰誦發端曰言答述曰語以樂舞教國子以樂節其舞故曰樂舞舞雲門門言其出謂其德如雲之出也大卷卷言其聚謂能聚物類也此二者皆黄帝之樂卷權大咸咸池堯樂也言其德無所不施也大㲈舜樂也言其德能紹堯之道也㲈韶大夏禹樂也言其德能大中國也大濩湯樂也言其德能使天下得其所也濩戸故反大武武王樂也言其德能成武功也以六律黄鍾大蔟姑洗㽔賓夷則無射六陽律為六律六同大吕夾鍾中吕林鍾南吕應鍾六隂律為六同五聲宫商角徴羽八音金石絲竹匏土革木六舞黄帝堯舜禹湯武六代樂舞大合樂律同聲音六舞所以大合樂也以致鬼神示奏之郊廟則幽而鬼神示由此而致也以和邦國賜之諸侯則明而邦國由此而和也以諧萬民用之鄉射則内之萬民由此而諧也以安賓客用之燕饗則外之賓客由此而安也以說逺人四夷之君來朝而與之宴樂以此作則逺人皆悅也說悅以作動物歲十二月索萬物而饗之樂以此作則動物可作也乃分樂而序之分用六代之樂以功德厚薄為先後之序以祭以饗以祀祭地示享人鬼祀天神乃奏黄鍾奏者播之於器也黄鍾屬子歌大吕歌者詠之於聲也大吕屬丑子與丑合舞雲門舞者動之於容也雲門黄帝樂以祀天神祀天南郊乃奏大蔟屬寅歌應鍾屬亥寅與亥合舞咸池堯樂以祭地示祭地北郊乃奏姑洗屬辰歌南吕屬酉辰與酉合舞大㲈舜樂以祀四望祀五岳四鎮四瀆乃奏蕤賓屬午歌函鍾即林鍾也屬未午與未合舞大夏禹樂以祭山川祭天下名山大川乃奏夷則屬申歌小吕即中吕也屬己巳與申合舞大濩湯樂以享先妣姜嫄后稷之母乃奏無射屬戌歌夾鍾屬夘夘與戌合舞大武武王樂以享先祖周之先王先公凡六樂者總上文六樂而言文之以五聲五聲相雜以成文播之以八音播被也被之八器以成音凡六樂者同上一變而致羽物及川澤之示此言大蜡之祭索鬼神而致百物也變猶更也樂成而更奏也羽物翟雉之屬注瀆曰川水鍾曰澤再變而致臝物及山林之示臝物虎豹之屬積石曰山竹木曰林三變而致鱗物及丘陵之示鱗物魚龍之屬土高曰丘大阜曰陵四變而致毛物及墳衍之示毛物狐貉之屬水涯曰墳下平曰衍五變而致介物及土示介物龜鼈之屬土示即原隰之示也六變而致象物及天神象物謂日月星辰天神謂上帝及五帝也凡樂大凡作樂圜鍾為宫圜鍾即夾鍾也屬夘正東方之律也致天神以為之宫則以帝所出之方也黄鍾為角黄鍾屬子宫聲最濁角聲次之大蔟為徴屬寅姑洗為羽屬辰羽聲最清徴聲次之子寅辰三者陽律之相繼也靁鼓靁鼗八面鼔也縣之曰鼔有柄曰鼗靁為天聲也孤竹之管孤竹竹特生者取陽數竒也雲和之琴瑟雲和山名也雲門之舞雲和雲門皆取其為天之施也冬日至於地上之圜丘奏之冬至陽生之始圜丘象天之形故以祀天神而奏其樂也若樂六變自子至巳為陽數自午至亥為隂數陽數至少隂之申而止隂數至少陽之寅而止圜鍾屬夘自夘至申其數六六變者圜鍾之數極於六也則天神皆降天神在上故曰降可得而禮矣可以行祀之禮凡樂函鍾為宫函鍾屬未西南方之律也致地示以為之宫則以致養之方也大蔟為角屬寅姑洗為徴屬辰南吕為羽屬酉是三者律吕之相生也靈鼔靈鼗六面鼔也靈者地之德也孫竹之管孫竹竹枝根之未生者蓋以隂為小也空桑之琴瑟空桑山名曰空者蓋以隂為乏也咸池之舞以咸池為舞象地之澤也夏日至於澤中之方丘奏之夏至隂生之始方澤象地之形故以祭地示而奏其樂也若樂八變函鍾屬末自未至寅其數八八變者函鍾之數極於八也則地示皆出地示在下故曰出可得而禮矣可以行祭之禮凡樂黄鍾為宫黄鍾屬子正北方之律也致人鬼以為之宫則以幽隂之方也大吕為角屬丑大蔟為徴屬寅應鍾為羽屬亥是三者律吕之相合也路鼓路鼗四面鼓也路者取徃來之義隂竹之管隂竹生於山北者亦取幽隂之義龍門之琴瑟龍門山名龍則取神化不測之義九德之歌九功之德皆可歌也謂之九歌取其萬世永賴也九㲈之舞取其繼紹前人也於宗廟之中奏之禘祫禴祠蒸嘗之時享人鬼於宗廟而奏其樂也若樂九變黄鍾屬子自子至申其數九九變者黄鍾之數極於九也則人鬼可得而禮矣可以行享之禮不曰皆至者原孝子之心惟恐其不至也凡樂事作樂之事大祭祀宿縣大祭祀謂鬼神示宿縣者於祭前之夕列於筍簴也縣𤣥遂以聲展之遂相扣作聲而展省聽之知其完否也王出入則令奏王夏夏大也王祭祀出入廟門則奏王夏之章尸出入則令奏肆夏尸立人以象神也其出入廟門則奏肆夏之章牲出入則令奏昭夏王出迎牲及爓肉與醴則奏昭夏之章帥國子而舞凡興舞皆使國之子弟為之大饗不入牲大享賓客設牲於廟門外因即烹之其他皆如祭祀不入牲故不奏昭夏其他如王出入賓出入亦奏王夏肆夏大射將祭擇士而射王出入令奏王夏同上及射令奏騶虞騶虞詩召南篇王射以騶虞為節也騶側留反詔諸侯以弓矢舞謂執弓挾矢揖讓進退之儀也王大食三宥大食者朔望以樂侑食時也宥與侑同謂勸也皆令奏鍾鼓用樂節以助氣體之養也王師大獻師出有功獻捷於廟則令奏愷樂愷樂獻功之樂也以人之怒氣釋焉故也凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂大札大㓙大烖大臣死凡國之大憂令弛縣凡建國禁其淫聲過聲㓙聲慢聲大喪涖廞樂器及葬藏樂器亦如之樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人佐大司樂教其屬者掌國學之政大司樂之所建治者以教國子小舞比六舞為小舞則雲門以下蓋大舞也凡舞其目在下有帗舞析五采繒柄而持之有羽舞析重翟之羽為之有皇舞五采為羽以象鳯凰來儀有旄舞持旄牛之尾以象百獸率舞有干舞執干盾而舞有人舞使人效四夷來王之舞教樂儀教王以樂出入於大寢朝廷之儀行以肆夏行於大寢之中則奏肆夏之章以為節也趨以采薺趨於朝廷之上則歌采薺之詩以為節也薺咨車亦如之行緩而趨疾故車之疾徐亦以肆夏采薺為節環拜以鍾鼓為節賓客環列而拜則鼓聲以作之鍾聲以止之凡射以樂為射之節王以騶虞為節騶虞召南詩射義曰樂官備也諸侯以貍首為節樂㑹時也其詩亦見射義大夫以采蘋為節樂循法也士以采蘩為節樂不失職也采蘩采蘋亦召南詩也凡樂掌其序事陳樂器及作樂之事皆有次序治其樂政治理樂聲使得其正凡國之小事用樂者小事謂小祭祀令奏鍾鼓令其屬奏之凡樂成則告備樂一變為一成告備者所謂工告樂備也詔來瞽臯舞臯緩也詔瞽使之來詔舞使之緩及徹祭畢而徹俎豆帥學士而歌徹學士國子也歌徹歌雝頌也令相相扶助也瞽矇當退使眡瞭扶之饗食諸侯享以飲為主食以食為主序其樂事亦有先後之序令奏鍾鼓令相如祭之儀敬賓猶敬神也燕射飲燕用射帥射夫以弓矢舞執弓挾矢揖讓進退之儀樂出入令奏鍾鼓所以為之節也凡軍大獻告捷於廟教愷歌教瞽矇也遂倡之樂師倡之而瞽矇和之也凡喪陳樂器則帥樂官及序哭亦如之凡樂官掌其政令聽其治訟大胥中士四人稱胥有才智之掌學士之版學士國子也版籍也以待致諸子父兄爵列於國謂之國子以其衆言之則謂之諸子致謂按比版籍以致其來也春入學舎采合舞春以學士入學舎采謂薦蘋蘩之祭而禮先師合舞者等其進退使應節奏也舎石秋頒學合聲至秋則頒其才藝所以合聲者亦等其曲折使應節奏也以六樂之㑹正舞位㑹六代之樂而舞焉正舞位者使左右前後有倫也以序出入舞者其出入行綴各有序也比樂官比校其所教之人展樂器展視其所用之器凡祭祀之用樂者以鼓徴學士大胥擊鼔以徴召學士之衆皆舞序宫中之事次序宿衛於王宫者小胥下士八人府二人史四人徒四十人贊大胥者掌學士之徴令而比之徴之使來學令之使有為比則校其能否也觵其不敬者觵罰爵也慢期則不敬故觵以罰之觵古横反巡舞列而撻其怠慢者撻以荆朴怠慢則不勤恪故巡行舞列而撻以辱之正樂縣之位縣謂鍾磬之屬縣於筍簴者也位則其次序也王宫縣四面皆縣如宫之有牆也諸侯軒縣去其南面以避王也卿大夫判縣又去其北面以示其德半於君也士特縣又去其西面以示特立之義也辨其聲别其聲音凡縣鍾磬每方各六十枚半為堵半陳之則為堵如見宫牆之堵全為肆全陳之則為肆如四面皆設大師下大夫二人賢凡樂工皆以瞽矇為之擇其智者使為之師掌六律六同以合隂陽之聲六律陽聲六同隂聲合者子與丑合寅與亥合夘與戌合辰與酉合已與申合午與未合陽聲六律黄鍾子大蔟寅姑洗辰蕤賓午夷則申無射戌隂聲六同大吕丑應鍾亥南吕酉函鍾未小吕已夾鍾夘皆文之以五聲五聲相雜成文宫上商金角木徴火羽水皆播之以八音被於八器以成音金鍾鏄石磬土塤革鼓鼗絲琴瑟木祝敔匏笙竹管簫教六詩教瞽矇以六詩曰風諸侯國風曰賦直陳其事曰比即物為比曰興託物興詞曰雅大小二雅曰頌祭祀歌頌風雅頌三者詩之體也賦比興三者所以為是詩者也以六德為之本中和祗庸孝友以立其本以六律為之音六律六同以和其音大祭祀帥瞽登歌帥瞽矇升堂而歌詩令奏擊拊拊形如鼓以韋為之實之以糠擊拊瞽乃歌也拊音撫下管播樂器吹管者在堂下匏竹之屬皆樂器也令奏鼓􅉧朄小鼔也鼔朄乃播樂器也朄音𦙍大饗亦如之享諸侯亦知祭祀也大射帥瞽而歌射節射節即騶虞貍首采蘋采蘩也大師大起軍師執同律以聽軍聲執六同六律吹之以言軍士之聲而詔吉㓙商則戰勝軍士强角則軍擾多變失士心宫則軍和士卒同心徴則將急數怒軍士勞羽則兵弱少威大喪帥瞽而廞作匶謚凡國之瞽矇正焉小師上士四人贊大師者掌教鼓鼗柷敔塤簫管弦歌教瞽矇也革音曰鼔鼗如鼔而小旁有耳持其柄摇之柷如漆筩中有推柄動擊其旁以合樂也敔刻木為虎背有二十七刻以木轢之以止樂也塤燒土為之鋭上平底有六孔以取聲簫編小竹為之管如篪有六孔弦琴瑟也歌依詠也大祭祀登歌擊拊登堂而歌必先擊拊下管擊應鼔應鼔鼙也蓋為鼔朄之應也徹歌有司徹而歌雝大饗亦如之大享諸侯亦同祭祀大喪與廞凡小祭祀小樂事鼔朄掌六樂六代之樂聲音之節五聲八音之節奏與其和相應和和去聲瞽矇上瞽四十人中瞽百人下瞽百有六十人無目眸謂之瞽有目眸而無見謂之矇掌播鼗柷敔塤簫管弦歌此八者皆小師教瞽矇播揚以出聲也諷誦詩背文曰諷以聲節之曰誦諷誦六詩則知民風之厚薄也世奠繫奠定也繫即帝系世本之書也言以世之序而定其繫也誦世奠繫則知前世之興衰也鼓琴瑟詩與世本雖不歌詠猶鼔琴瑟以合之也掌九徳六詩之歌九徳見大司樂六詩見大師歌謂以人聲詠之也以役大師應大師之役使眂瞭三百人府四人史八人胥十有二人徒百有二十人目明者掌凡樂事播鼗擊頌磬笙磬掌大師之縣凡樂事相瞽相扶助也瞽矇作樂眡瞭扶之賓射皆奏其鍾鼔王與諸侯射皆奏鍾鼔以為之節也鼜愷獻亦如之鼜謂師旅夜戒之鼔愷獻謂戰勝獻俘之樂亦皆奏其鍾鼓也鼜戚典同中士二人府一人史一人胥二人徒二十人同即六同言同則六律在其中矣掌六律六同之和以六律六同取其聲音之和以辨天地四方隂陽之聲陽聲屬天隂聲屬地天地之聲布於四方以為樂器取其中聲以作樂器凡聲高聲䃂正聲緩下聲肆陂聲散險聲歛達聲贏徴聲韽囬聲衍侈聲筰弇聲鬱薄聲甄厚聲石凡為樂器凡作樂器之法以十有二律為之數度十二律六律六同也古之為樂器者其數皆始於黄鍾其長九寸乃度之所起而其餘律皆自是而生焉以十有二聲為之齊量其齊量皆取於十二聲也齊去聲凡和樂亦如之調和樂聲皆如是也磬師中士四人下士八人府四人史二人胥四人徒四十人教眡瞭擊鍾磬掌教擊磬擊編鍾編鍾編磬各十有六共為一簴教眡瞭皆擊之教縵樂燕樂之鍾磬縵樂合六代之樂也燕樂歌二南之詩也凡祭祀奏縵樂祭祀磬師奏縵樂燕樂則鍾師奏之縵慢又幔鍾師中士四人下士八人府二人史二人胥六人徒六十人其樂雖用鼓而以金為主掌金奏擊金以為奏樂之節凡樂事凡作樂之事以鍾鼓奏九夏九夏皆樂章名夏大也王夏王出入奏之肆夏尸出入奏之昭夏牲出入奏之納夏四方賓來奏之章夏臣有功奏之齊夏夫人祭奏之齊音齋族夏族人侍奏之祴夏客醉而出奏之祴該驁夏公出入奏之驁五羔反凡祭祀饗食奏燕樂祭祀以禮神享食以禮賓皆在廟故也凡射大射賓射燕射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩前樂師既以此四詩為射節鍾師特奏之耳掌鼙鼓縵樂磬師奏雜聲之縵樂鍾師則執鼙鼔以和之笙師中士二人下士四人府二人史二人胥一人徒十人笙以匏為之几十三管掌教龡竽笙塤籥簫篪篴管舂牘應雅以教祴樂凡祭祀饗射共其鍾笙之樂鍾笙與磬聲相應之笙也燕樂亦如之燕樂歌二南詩亦以鍾笙應之鎛師中士二人下士四人府二人史二人胥二人徒二十人鏄如鍾而大鏄音博掌金奏之鼓是主擊晉鼓者金奏謂奏金即鏄鍾也凡祭祀鼓其金奏之樂即八音是也亦以晉鼔鼔之饗食賓射亦如之亦鼓其金奏之樂也軍大獻則鼔其愷樂獻捷于廟而奏愷樂亦以晉鼓鼓之凡軍之夜三鼜皆鼓之軍之夜三次擊夜戒之鼓守鼜亦如之大喪廞其樂器奉而藏之韎師下士二人府一人史一人舞者十有六人徒四十人韎東夷之樂掌教韎樂韎以􅅊為服也教其樂舞因使服其服也祭祀則帥其屬而舞之帥其屬之舞者十六人以舞韎樂大饗亦如之示四夷來王也旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人旄旄牛尾舞者之所持也掌教舞散樂野人之樂舞夷樂鞮鞻氏掌其樂與聲歌旄人則教夷樂之舞耳凡四方之以舞仕者屬焉皆統於旄人凡祭祀賓客舞其燕樂燕享用樂旄人舞之籥師中士四人府二人史二人胥二人徒二十人籥三孔舞者吹之掌教國子舞羽龡籥執羽以為舞吹籥以為節祭祀則鼓羽籥之舞國子舞之籥師擊鼔以節之賓客饗食則亦如之與祭祀同大喪廞其樂器奉而藏之籥章中士二人下士四人府一人史一人胥二人徒二十人吹籥以為詩章掌土鼓豳籥土鼔燒土為匡也豳國名周家王業之所由致也豳籥謂豳人吹籥之詩章也中春晝擊土鼓龡豳詩以逆暑豳詩豳風七月也逆暑以晝求諸陽也中秋夜迎寒亦如之迎寒以夜求諸隂也凡國祈年于田祖祈年祈豐年也田祖始耕者謂先嗇也龡豳雅擊土鼓以樂田畯豳雅豳詩之雅也畯田官所謂司嗇也國祭蜡歲十二月合聚萬物而索享之則龡豳頌擊土鼓以息老物豳頌豳詩之頌也田夫萬物至此老而勞故祀而息之今按先儒以豳雅豳頌皆為七月詩非也七月國風也雅頌各有體蓋逸詩也鞮鞻氏下士四人府一人史一人胥二人徒二十人四夷樂人所履之革屨也鞮提鞻屨掌四夷之樂與其聲歌四夷之樂以樂舞而言之也聲歌以其所吹唱而言之也祭祀則龡而歌之吹其聲而唱其歌也燕亦如之亦同祭祀典庸器下士四人府四人史二人胥八人徒八十人庸功也有功者鑄器以銘其功掌藏樂器庸器民功曰庸與樂器皆藏之及祭祀帥其屬而設筍簴筍簴所以縣鍾磬之屬横曰筍植曰簴陳庸器以示能守其所傳也饗食賓射亦如之與祭祀同大喪廞筍簴司干下士二人府二人史二人徒二十人干盾也舞者所持掌舞器羽籥之屬祭祀舞者既陳則授舞器既已也舞者既陳成列則授以舞器既舞則受之受而藏之賓饗亦如之與祭祀同大喪廞舞器及葬奉而藏之大卜下大夫二人曰卜官之長問龜卜掌三兆之法兆灼龜之象也一曰玉兆如男子弄璋之兆其象在左者二曰瓦兆如弄瓦之兆象在右者三曰原兆如易比吉原筮原之言再也象之上下左右未定者宜再推之其經兆之體皆百有二十經常也三兆之法其常體各有一百二十也其頌皆千有二百頌占兆之繇辭也每體十繇則得千有二百也掌三易之法易變易也一曰連山伏羲易也或曰夏易以艮為首艮為山也二曰歸藏黄帝易也或曰商易以坤為首坤以藏之三曰周易文王易也即今周易其經卦皆八其别皆六十有四經卦凡八毎卦之上又各加以八卦别而言之則為六十四也掌三夢之灋夢者精神所感可占吉㓙一曰致夢出於思慮有因而至者二曰觭夢角一俯一仰為觭人晝俯仰於事夜則為夢觭竒三曰咸陟無心感物為咸陟升也謂無所拘滯而自有其夢其經運十運即眂祲所掌十煇也以占夢之吉㓙運或為緷當為煇其别九十每煇九變别為九十以邦事作龜之八命國有大事則作龜而命之有此八者一曰征行討征役二曰象天象變動三曰與與人共事四曰謀圖事於人五曰果事成與否六曰至人至與否七曰雨禱雨八曰瘳療疾瘳質留反以八命者贊三兆三易三變之占以八命作龜則以龜筮夢三者合聚而占之以觀國家之吉㓙吉謂福祥㓙謂禍灾皆可以前知也以詔救政詔告也既知吉㓙乃預告王脩政以救之凡國大貞大事求正於龜卜也卜立君君無冢適不可立者卜大封割邦土以封諸侯則眂髙作龜眡高謂眡龜骨高者可灼處也作龜謂以火灼之而作其兆也大祭祀則眂髙命龜命龜謂告以所卜之事也凡小事涖卜涖臨也大事宗伯涖卜小事則大卜自涖之國大遷大師則貞龜凡旅陳龜凡喪事命龜卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人佐大卜者掌開龜之四兆開謂出其占書也一曰方兆二曰功兆三曰義兆四曰弓兆凡卜事眂髙揚火大事大卜眡高則此卜事蓋小事也揚火以作龜熾其火以灼龜致其墨明其兆廣之大小也凡卜辨龜之上下左右隂陽上謂仰也下謂俯也左左倪也右右倪也隂後弇也陽前弇也以授命龜者卜師辨之以授太卜而詔相之詔告以言也相贊以事也相去聲龜人中士二人府二人史二人工四人胥四人徒四十人主取龜攻龜者掌六龜之屬屬言非一也各有名物名以命之物以色之天龜曰靈屬天龜𤣥俯者靈也地龜曰繹屬地龜黄仰者繹也東龜曰果屬東龜青前弇果也果魯果反西龜曰靁屬西龜白左倪雷也靁力胃南龜曰獵屬南龜赤後弇獵也北龜曰若屬北龜黒右倪若也各以其方之色與其體辨之色謂𤣥黄青白赤黑也體謂俯仰前後左右也凡取龜用秋時龜至秋而堅成可以取之攻龜用春時至春而乾實可以脩治各以其物入于龜室物色也龜色不同故所藏之室亦異也上春釁龜以牲血釁之祭祀先卜預先卜日若有祭祀祭天地宗廟則奉龜以徃待其占卜也旅亦如之喪亦如之菙氏下士二人史一人徒八人聲菙荆木也灼龜用之菙垂上掌共燋契燋即灼龜之木也契即開龜之鑿也卜則爇燋以灼龜用鑿以開龜也燋音焦以待卜事菙人共之以授卜師用之凡卜以明火爇燋遂龡其焌契以授卜師遂役之占人下士八人府一人史二人徒八人占蓍龜之卦兆吉㓙掌占龜占人亦占筮以龜為主以八簭占八頌將占八命之事先以蓍筮之而以八頌占之簭音筮以八卦占簭之八故八卦即三易之經卦也八故八事之故也以眂吉㓙眡其從違以占吉㓙凡卜簭龜為卜蓍為筮君占體體兆象也體有吉㓙大夫占色色兆氣也色有善惡史占墨墨兆廣也墨有大小卜人占坼坼兆釁也圻有微明尊者視兆象而已卑者以次詳其餘焉凡卜簭既事則繫幣以比其命歲終則計其占之中否用以進退占人之能否簭人中士二人府一人史二人徒四人問蓍曰簭掌三易以辨九簭之名三易筮之書九筮筮之事一曰連山二曰歸藏三曰周易此三易也詳見大卜九簭之名其名見下一曰巫更鄭氏曰巫字皆當為筮筮更者筮變動也更庚二曰巫咸筮衆心也三曰巫式作法則也四曰巫目立要凡也五曰巫易革天命也六曰巫比包遐荒也七曰巫祠筮牲與日八曰巫參筮御與右參七南反九曰巫環攻伐而圍之也孟子曰環而攻之也以辨吉㓙辨其從違以占吉㓙凡國之大事八命之事先簭而後卜當用卜者先筮之筮不吉則不卜也上春相簭上春乃一歲之始相視揀擇其蓍草可為筮也凡國事共簭以共國家占筮之用占夢中士二人史二人徒四人即夢而占吉㓙掌其歲時歲謂子丑寅夘時謂春夏秋冬觀天地之㑹升降徃來之㑹辨隂陽之氣休咎旺相之氣以日月星辰占六夢之吉㐫日為太陽月為大隂星二十八宿屬陽辰十二次屬隂蓋以歲時天地隂陽日月星辰而占六夢之吉㓙也一曰正夢安靜而夢二曰噩夢驚愕而夢噩愕三曰思夢覺時所想而夢四曰寤夢覺時所道而夢五曰喜夢喜悅而夢六曰懼夢恐懼而夢季冬聘王夢歲十二月聘問王夢獻吉夢于王王夢之吉則獻其兆王拜而受之吉夢在王而佑之者在天拜而受之尊天之所佑也乃舎萌于四方以贈惡夢遂令始難敺疫眂祲官屬如占夢妖祲謂隂陽之氣相侵漸而成祥者祲子鴆反掌十煇之法煇謂日之氣煇光也以觀妖祥辨吉㓙妖則主㓙祥則主吉觀妖祥所以辨吉㓙也一曰祲日旁有隂邪氣相侵犯也二曰象隂氣附日凝結而成象也三曰䥴黒氣如䥴刺於日也䥴音攜又音隳四曰監抱日之氣如冠珥也五曰闇方晝而暗也六曰瞢隂氣蒙蒙日光瞢然也瞢亡鄧反七曰彌白虹彌天横氣貫日也八曰叙片段成列穿日有序也九曰隮螮蝀升氣於日旁也隮子兮反十曰想雜氣以成形想也掌安宅叙降正歲則行事歲終則弊其事大祝下大夫二人上士四人祝官之長祝之又反掌六祝之辭告神之辭曰祝以事鬼神示天神人鬼地示之禮祈福祥天所佑為福福所化為祥求永貞歴年之謂永正命之謂貞一曰順祝年無必豐之理故祈天順二曰年祝祈大有年三曰吉祝祈五福以錫庶民四曰化祝祈休祥以為豐氣五曰瑞祝祈祥瑞之降六曰筴祝祈龜筮之從掌六祈以同鬼神示鬼神示不和同而為災變則以六者祈之一曰類合其類而祭之二曰造造其所而祭之三曰禬若禬國之㓙荒民之札喪之類四曰禜若日月星辰山川之神於是乎禜之之類禜詠五曰攻攻去其災六曰說責之以辭作六辭以通上下親疎逺近以言達意之謂辭上下以位言親疎以情言逺近以勢言皆以辭而後通也一曰祠若伊尹祠先王是也二曰命若說命微子之命是也三曰誥若湯誥仲氏之誥是也四曰㑹謂㑹同諸侯以誓之若甘誓湯誓是也五曰禱若禱爾于上下神示是也六曰誄若哀公誄孔子之類是也辨六號號謂尊其名更謂美稱也一曰神號若云皇天上帝是也二曰鬼號若云皇祖伯某是也三曰示號若云后土地示是也四曰牲號若云牛曰一元大武是也五曰齍號若云黍曰薌合是也六曰幣號若云幣曰量幣是也辨九祭祭食之禮有此九者一曰命祭玉藻曰君若賜之食而君客之則命之祭是也二曰衍祭曲禮曰客執食興辭主人興辭於客然後客坐主人延客祭是也三曰炮祭將食炮燔而先祭之如封人所謂毛炮之豚是也四曰周祭周猶徧也曲禮曰肴之序徧祭之是也五曰振祭見擩祭解六曰擩祭振祭擩祭本同但振者先擩後振擩者不振也將食者既擩必振乃祭也不食者擩則祭之擩而泉反七曰絶祭見繚祭解八曰繚祭絶祭繚祭亦同繚祭者以手從肺本循之至於末乃絶以祭之絶祭者不循其本直絶以祭也繚了九曰共祭共猶授也膳夫曰膳夫授祭是也辨九􅉔拜之儀容有此九者􅉔拜一曰稽首拜而頭至地也二曰頓首拜而首叩地也三曰空首拜而頭至手也四曰振動戰慄變動之拜五曰吉􅉔吉事則拜而後稽顙也六曰㓙拜㓙拜則稽顙而後拜七曰竒􅉔一拜八曰褒拜再拜褒音報九曰肅􅉔俯下手也以享右祭祀享右接人也或享尊在已上者或右尊在已右者祭祀接神也或備物以祭或致道以祀凡大禋祀肆享祭示祭祀祭天神肆享祭宗廟祭示祭地祗也則執明水火而號祝明水以鑑取於月明火以燧取於日號六號也祝六祝之辭也祝之又反隋釁逆牲逆尸令鍾鼓右亦如之隋許規反來瞽令臯舞相尸禮既祭令徹大喪始崩以肆鬯渳尸相飯贊歛徹奠言甸人讀禱付練祥掌國事國有大故天烖彌祀社稷禱祠大師大興軍師宜于社軍將出則宜祭于社取社主以行造于祖軍出造于祖廟取遷主以行皆載以齊車設軍社置社主于軍中類上帝類祭上帝告于天也國將有事于四望軍行所過望祭四方山川之神及軍歸獻于社征伐有功獻捷于社則前祝皆大祝前致其祝辭大㑹同王與諸侯㑹同造于廟告行于廟宜于社宜祭于社過大山川則用事焉所過山川亦祭也反行舎奠以告至也舎音石建邦國新創邦國之城先告后土先告地示用牲幣用牲所以祭之用幣所以禮之禁督逆祀命者頒祭號于邦國都鄙小祝中士八人下士十有六人府二人史四人胥四人徒四十人祝官之貳掌小祭祀將事侯禳禱祠之祝號侯以候福之將至禳以却禍之方來禱以先事而求祠以後事而報此皆祭祀之小者小祝將事則掌其祝號焉以祈福祥福則無禍祥則無灾故欲其祈而得之也順豐年豐則無㓙故欲其順而應之也逆時雨時雨先期而逆之故曰逆寧風旱風旱因變而安之故曰寧彌灾兵灾人患兵人難彌以止之彌弭逺辠疾罪自貽之毒疾癘氣之作故逺以避之辠罪同大祭祀逆齍盛逆迎也齍盛即饎人所共者送逆尸沃尸盥贊隋贊徹贊奠凡事佐大祝大喪贊渳設熬置銘及葬設道齎之奠分禱五祀大師掌釁祈號祝有冦戎之事則保郊祀于社凡外内小祭祀小喪紀小㑹同小軍旅掌事焉喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人掌䘮祭之祝官掌大喪勸防之事及辟令啓及朝御匶乃奠及祖飾棺乃載遂御及葬御匶出宫乃代及壙說載除飾小喪亦如之掌喪祭祝號王弔則與巫前掌勝國邑之社稷之祝號以祭祀禱祠焉凡卿大夫之喪掌事而斂飾棺焉甸祝下士二人府一人史一人徒四人掌田獵之祝官掌四時之田春蒐夏苗秋獮冬狩表貉之祝號設貉祭于所表之地貉禡舎奠于祖廟告祖廟而後田也禰亦如之禰父廟也師田田大師以教田致禽于虞中立虞中而各致禽乃屬禽合就以別其種類及郊饁獸舎奠于祖禰乃斂禽禂牲禂馬皆掌其祝號詛祝官屬如甸祝掌盟詛類造攻說禬禜之祝號作盟詛之載辭以叙國之信用以質邦國之劑信司巫中士二人府一人史一人胥一人徒十人掌羣巫之政令若國大旱則帥巫而舞雩國有大烖則帥巫而造巫恒祭祀則共匰主及道布及蒩館凡祭事守􅄟凡喪事掌巫降之禮男巫無數掌望祀望衍授號旁招以茅冬堂贈無方無算春招弭以除疾病王弔則與祝前女巫無數其師中士四人府一人史四人胥四人徒四十人掌歲時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請大史下大夫二人上士四人史官之長掌建邦之六典以逆邦國之治助大宰掌六典佐王治邦國也掌灋以逆官府之治即大宰以八法治官府也掌則以逆都鄙之治即大宰掌八則治都鄙也蓋太史以掌書為事典法則之書皆其所藏焉故也凡辨灋者攷焉邦國官府都鄙以法爭訟者必攷之於太史也不信者刑之不信太史之法則以刑治之凡邦國都鄙及萬民之有約劑者藏焉約盟誓也劑劵書也皆藏其書於大史也以貳六官貳猶副也約劑之書其正在六官其副在太史六官之所登六官以約劑之貳登于大史若約劑亂則辟灋若約劑亂而不可攷則大史辟開所藏之貳法以正之辟音闢不信者刑之如是則不信者無所逃其刑也正歲年以序事謂作厯正歲年而授民以事各有次序也頒之于官府及都鄙頒布也先頒厯于官府次及都鄙者自近而及逺也頒告朔于邦國天子頒來歲十二月朔于諸侯諸侯藏之祖廟至月朔則告朔于廟而行之閏月日之行也日一度凡三百六十五日零三時而一周天而一歲止三百六十日是餘五日有竒也月之行也日十三度常以二十九日過半而與日合是月不足於三十日也二者之餘每歲凡十一日有竒故厯家則置閏月以歸其餘數焉詔王居門終月王居總章明堂每月各有其室惟閏月則詔王居門故閏字從王從門也大祭祀與執事卜日執事大卜之屬也史占墨故大史與卜日焉戒及宿之日戒謂前期十日散齋也宿謂前祭一日是也與羣執事讀禮書而協事羣執事謂凡有事於祭者也祭之事具載於禮書故讀禮書以合其事也祭之日當祭之日執書以次位常貴賤之位有常處故執禮書而定其次序也辨事者攷焉辨祭之執事者攷於禮書不信者誅之不信禮書者誅責之大㑹同朝覲天子與諸侯㑹同朝覲以書協禮事亦讀禮書而協其事及將幣之日諸侯將幣見君之日執書以詔王執禮書而告王亦以合其禮書也大師大起軍師抱天時與大師同車大師以聲而知天道大史以書而知天道故與之同車也大遷國王者遷都抱灋以前法謂司空營地之法大史抱之先至其所也大喪執法以涖勸防遣之日讀誄凡喪事攷焉小喪賜謚凡射事凡大射賓射之類飾中舎算舎讀曰釋中所以盛算放算於中以待射畢時計之執其禮事凡射禮升降進退之事大史守其禮節小史中士八人下士十有六人府四人史八人胥四人徒四十人大史之貳掌邦國之志謂諸侯之國志其土地風俗之書奠繫世奠定也繫世謂帝系世本之書辨昭穆昭生穆穆生昭辨之則知其世系也若有事則詔王之忌諱先王死日為忌名為諱故凡有事皆告於王也大祭祀讀禮灋小史帥羣執事讀禮書之法史以書叙昭穆之俎簋俎以盛牲簋以盛粢以昭穆為先後小史掌叙之而其叙則以所讀禮法為證也大喪大賓客大㑹同大軍旅佐大史從大史而讀法凡國事之用禮灋者讀禮之法掌其小事事之輕者卿大夫之喪賜謚讀誄馮相氏中士二人下士四人府二人史四人徒八人馮乘也相視也言登髙臺以視天文也馮慿掌十有二歲謂歲星所在也寅曰攝提格夘曰單閼辰曰執徐已曰大荒落午曰敦牂未曰協洽申曰涒灘酉曰作噩戌曰掩茂亥曰大淵獻子曰困敦丑曰赤奮若十有二月謂斗柄所建毎月一辰自正月建寅至十二月建丑是也十有二辰謂日月所㑹也子曰𤣥枵亥曰訾戌曰降婁酉曰大梁申曰實沈未曰鶉首午曰鶉火巳曰鶉尾辰曰壽星夘曰大火寅曰析木丑曰星紀十日甲乙丙丁戊己庚辛壬癸二十有八星之位東方角亢氐房心尾箕南方井鬼栁星張翼軫西方奎婁胃􅄧畢觜參北方斗牛女虚危室壁辨其叙事東作南訛西成朔易以㑹天位星鳥以正仲春星火以正仲夏星虚以正仲秋星􅄧以正仲冬冬夏致日冬至日在牽牛景丈三尺夏至日在東井景尺五寸春秋致月春分日在婁而月上弦於東井下弦於牽牛秋分日在角而月上弦於牽牛下弦於東井以辨四時之叙二至二分正則四時之叙可辨矣保章氏官屬如馮相氏之保守也世守天文變掌天星掌天文星度以志星辰日月之變動志記也天左轉日月五星右行故變動而無常以觀天下之遷天下灾祥禍福之遷運者因可得而觀焉辨其吉㓙順則為吉逆則為㓙以星土辨九州之地所封星土星所主土也封猶界也封域皆有分星角亢氐兖州房心豫州尾箕幽州斗牛女揚州虚危青州室壁并州奎婁胃徐州􅄧畢冀州觜參益州井鬼雍州栁星張三河翼軫荆州以觀妖祥觀彗孛客星所犯屬何分野主何妖祥以十有二歲之相觀天下之妖祥歲星在木則火為相在火則土為相在土則金為相在金則水為相在水則木為相五星順度為祥流逆失度為妖以五雲之物辨吉㓙水旱雲有五色以二分二至日觀之青為蟲白為喪赤為兵荒黒為水黄為豐降豐荒之祲象豐有年也荒無年也降其祲象於國使人預知而為備也祲音寢以十有二風察天地之和十二風者風生於十二辰之位也天地之氣和而成風和則無事命乖别之妖祥乖則異别則離此天地之不和而為妖祥也故命之以告於人焉凡此五物者物事也謂上文五事也以詔救政告於王預脩政以救之訪叙事謀訪天時所宜次序其事内史中大夫一人下大夫二人上士四人中士八人下士十有二人府四人史四人胥四人徒四十人猶今之内制即翰林之職也掌王之八枋之灋枋與柄同言王者謂八柄當自王出也以詔王治大宰以八柄詔王馭羣臣而内史則以詔王治者蓋以内史有司之事而治則在於王於馭羣臣非所任也一曰爵二曰禄三曰廢四曰置五曰殺殺即誅也六曰生七曰予八曰奪說並見大宰注執國法及國令之貳上以道制而下守之為法上以命使而下稟之為令内史掌其副貳也以攷政事攷政事則所主在治凡有所正皆政也凡有所為皆事也以逆㑹計逆㑹計則所主在財歲終之㑹皆㑹也三歲之計皆計也掌叙事之法謂事治之先後受納訪納進言也訪問事也受納則受其所納之言受訪則受其所訪之對以詔王聽治掌叙事則詔王以聽其事受納訪則詔王以聽其情凡命諸侯及孤卿大夫則䇿命之諸侯有邦之君也孤卿大夫在朝之臣也䇿命謂以簡䇿書王命也凡四方之事書四方諸侯以書奏事於王内史讀之内史則讀示於王也王制禄則贊為之禄謂仕者之俸也贊為之者為之辭也以方出之書其辭於方版而出示之賞賜亦如之賞賜或以土田或以車服亦贊為之辭也内史掌書王命王言之出為命内史載而書之遂貳之又書副本而藏之以待有所攷也外史上士四人中士八人下士十有六人胥二人徒二十人猶今之外制即舎人之職也掌書外令王之詔令出外則書之掌四方之志志記也猶晉之乗楚之檮杌魯之春秋也掌三皇五帝之書三皇之書謂之三墳五帝之書謂之五典掌達書名于四方名字也達於四方使書同文也若以書使于四方使者奉詔令以使於諸侯則書其令外史書王令以授使者御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人侍御於君之史官掌邦國都鄙及萬民之治令六典以治邦國八則以治都鄙官成以治萬民此三者之治令以贊冢宰三者皆冡宰所掌御史特贊助之耳凡治者受法令焉法令皆御史所書凡為治者皆從而授之掌贊書贊内外史所載之書凡數從政者凡公卿以下從政之數御史皆計之數所主巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人車官之長言巾者以設飾為主也掌公車之政令公車謂在官之車辨其用與其旗物用謂祀賓之屬旗物謂大常以下而等叙之等謂差其上下叙謂次其先後以治其出入當用則治其出用畢則治其入王之五路車謂之路有徃來不窮之道也一曰玉路以玉為飾錫馬面當盧刻金為之錫音陽樊纓十有再就樊馬大帶也纓馬鞅也皆以五采罽飾之為十有二匝建大常十有二斿大常旗畫日月上綴十有二斿斿音留以祀祀天地日月社稷宗廟用之金路以金為飾鉤鉤當馬胸亦以金為之樊纓九就樊纓皆以九匝建大旗旗畫蛟龍以賓賓客㑹同用之同姓以封王子毋弟出封為侯伯亦以賜之象路以象齒為飾朱以朱飾馬勒樊纓七就皆為七匝建大赤其旗名旜以通帛為之以朝毎日視朝用之朝音潮異姓以封王之甥舅出封亦以賜之革路輓之以革而漆之龍勒以龍文飾馬勒條纓五就其樊纓以條絲飾之而為五匝條音絛建大白殷之旗名以即戎兵事用之以封四衞四方諸侯守衛亦以賜之木路不用革輓但漆之前樊鵠纓以淺黑色飾韋為樊鵠色飾韋為纓前剪建大麾夏后氏旗以田田獵用之以封蕃國九州之外蕃國亦以此賜之王后之五路王后亦有五路重翟以重雉羽為車兩旁之蔽厭翟不用重翟但次其羽使相厭也厭於涉反安車不用翟羽為蔽翟車不重不厭以翟飾車之側輦車以人挽之而行重翟錫面朱總厭翟勒面繢總安車彫面鷖總皆有容蓋翟車貝面組總有握輦車組輓有翣羽蓋王之喪車五乗木車蒲蔽犬䄙尾櫜疏飾小服皆疏素車棼蔽犬䄙素飾小服皆素薻車薻蔽鹿淺䄙革飾駹車萑蔽然䄙髤飾漆車藩蔽豻䄙雀飾服車五乘服事者之車孤乗夏五采畫轂約卿乗夏縵亦用五采但不刻大夫乘墨車黑色不畫士乘棧車不用革輓而漆之庶人乘役車可載任器以共役凡良車散車不在等者精制曰良粗制曰散不入車服之等者其用無常惟王所賜凡車之出入當用而出已用而入歲終則㑹之計其完弊多少凡賜闕之毁折入齎于職幣大喪飾遣車遂廞之行之及葬執蓋從車持旌及墓嘑啓關陳車小喪共匶路與其飾歲時更續共其弊車大祭祀鳴鈴以應雞人典路中士二人下士四人府二人史二人胥二人徒二十人巾車兼主上下之車典路專主五路掌王及后之五路王五路自玉路以下后五路自重翟以下辨其名物與其用說名以命之物以色之出之為用舎之為說說音稅若有大祭祀大祭祀用玉路則出路贊駕說典路則出玉路而贊助駕馬說馬者之事大喪大賓客亦如之凡㑹同軍旅弔于四方以路從車僕中士二人下士四人府二人史二人胥二人徒二十人掌偹副車掌戎路之萃戎路在軍所乘也萃猶副也謂共副車以待乏用也萃七内反廣車之萃横陳之車廣去聲闕車之萃補闕之車苹車之萃所用對敵自屏蔽之車苹平輕車之萃所用馳敵致師之車輕遣政反凡師共革車凡兵師用車皆以革輓之各以其萃各因其用而備副車㑹同亦如之所以不失備也大喪廞革車大射共三乏乏容也謂射之三侯皆有容以皮為之司常中士二人下士四人府二人史二人胥四人徒四十人主王旌旗掌九旗之物名九旗所畫異物則異其名各有屬王以下臣民各有所屬故建其旗則使其屬視而知所從也以待國事國家有事則各建其旗以待其所用也日月為常九旗皆以絳帛為之太常畫日月者取天道之運也交龍為旂旂畫龍者取君德之用也通帛為旜旜用通幅綘帛所謂大赤也雜帛為物物則内幅以綘外飾以白也熊虎為旗旗畫熊虎取其猛毅也鳥隼為旟旟畫鳥隼取其摰速也龜蛇為旐旐畫龜蛇取其能扞難避害也全羽為旞旞用全羽為之取其全而遂之之義析羽為旌旌用析羽為之取其析而旌之之義及國之大閱仲冬大簡閱軍禮贊司馬頒旗物司馬頒布旗物司常助之王建太常象天明也諸侯建旂象君德也孤卿建旜旜不畫者言奉上政教而已大夫士建物殷尚白周尚赤物中赤而外白言以先王正道佐職也師都建旗師都六卿六遂大夫也建旗者象熊虎守猛莫敢犯也州里建旟州里州長里官也建旟者象鳥隼之勇捷也縣鄙建旐縣鄙縣正鄙師也建旐者象龜蛇之扞難避害也道車載旞道車象路也載旞見下注斿車載旌斿車木路也全羽析羽皆畫五采象其文德也皆畫其象焉盡其象於旗如下文所云官府各象其事象官府所掌之事而畫之州里各象其名象州里官名而畫之家各象其號象家邑位號而畫之凡祭祀各建其旗王祭祀乗玉路則建太常諸侯以下則各建其旗物㑹同賓客亦如之亦如祭祀建旗置旌門用旌以表門大喪共銘旌建廞車之旌及葬亦如之凡軍事建旌旗及致民置旗弊之甸亦如之凡射共獲旌歲時共更旌都宗人上士二人中士四人府二人史四人胥四人徒四十人都謂王子弟及公卿所食邑宗人其禮官也掌都祭祀之禮王子弟及公卿祭於其邑則掌其禮凡都祭祀致福于國已祭則致胙於國蓋歸王以其福也正都禮與其服正其禮謂禁督其遺失者服謂衣服及宫室車旗若有冦戎之事則保羣神之壝國有大故則令禱祠既祭反命于國家宗人官屬如都宗人之數家謂大夫所食之邑掌家祭祀之禮大夫祭於其邑則掌其禮凡祭祀致福與都宗人同國有大故則令禱祠反命祭亦如之掌家禮與其衣服宫室車旗之禁令亦同都宗人而言之詳者互見之耳凡以神仕者無數以其藝為之貴賤之等其職無數掌三辰之法日月星之所次以猶鬼神示之居猶謂為之圖以象天神地示人鬼之所居辨其名物名號物色以冬日至致天神人鬼天人屬陽故陽氣升而祭鬼神以夏日至致地示地屬隂故隂氣升而祭地示物鬼以禬國之㓙荒民之札喪周禮句解卷六
