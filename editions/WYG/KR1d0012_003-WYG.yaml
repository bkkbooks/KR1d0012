body:
  text: 周禮句解卷三宋朱申撰地官司徒第二司徒曰地官者以其掌邦教而安擾萬民猶地之載養萬物也地官司徒上惟王建國辨方正位體國經野設官分職以為民極並見天官冢宰注乃立地官司徒使帥其屬而掌邦教邦教即六典之教典也地官其屬六十司徒帥之而掌邦教焉以佐王安擾邦國佐助也因其所性而導之謂之安矯其所習而制之謂之擾大司徒之職卿一人則教官之職大而德行則教之小而徒役司之司至於徒則教官所司皆舉矣掌建邦之土地之圖與其人民之數土地建其圖則知逺近之所宜人民建其數則知多寡之所在以佐王安擾邦國以佐助天子而安擾邦國以天下土地之圖周知九州之地域廣輪之數周徧也九州揚荆豫青兖雍幽冀并也廣横也輪從也東西為廣南北為輪凡此皆可按圖而知之廣去聲辨其山林川澤丘陵墳衍原隰之名物積石曰山竹木曰林注瀆曰川水鍾曰澤土高曰丘大阜曰陵水涯曰墳下平曰衍高平曰原下濕曰隰辨其名則知其所在辨其物則知其所宜墳焚而辨其邦國都鄙之數辨邦國謂畿外諸侯邦國之數辨都鄙謂畿内公卿采地之數制其畿疆而溝封之畿即九畿見大司馬疆界也畿則溝水以為限疆則分土以為守焉設其社稷之壝社土神稷榖神壝祭社稷之壇也壝唯季反而樹之田主田主田神也樹立木以為表也各以其野之所宜木所宜木謂松栢栗之類遂以名其社與其野若地宜松則名松社之野栢栗亦然以土㑹之灋辨五地之物生㑹計也謂以土計貢稅之法也物生謂五地所宜動植之物也一曰山林見上文注其動物宜毛物動物天産也毛物䝖貉之屬其植物宜皁物植物地産也皁物栢栗之屬其民毛而方居山林者其民如此二曰川澤同上其動物宜鱗物魚龍之屬其植物宜膏物楊栁之屬其民黑而津津潤也居川澤者其民如此三曰丘陵同上其動物宜羽物飛禽之屬其植物宜覈物李梅之屬有核者其民專而長專圜也與方為對居丘陵者其民如此專音團四曰墳衍其動物宜介物龜鼈之屬其植物宜莢物薺莢王棘之屬其民晳而瘠晳白也與黒為對瘠臞也與津為對五曰原隰其動物宜臝物虎豹之屬臝力果反其植物宜叢物萑葦之屬其民豐肉而庳豐厚也庳短也庳音婢因此五物者民之常而施十有二教焉五地之物所生異宜五物之民所習異便其施教也豈能違其性習之常哉十二教其目見下一曰以祀禮教敬祀禮謂祭祀之禮祭祀尚敬故也則民不苟敬故不苟於事二曰以陽禮教讓陽禮謂鄉飲之禮鄉飲尚齒故也則民不爭遜讓故無鬬爭三曰以隂禮教親隂禮謂婚姻之禮冕而親迎親之也則民不怨婚姻及時則男女無有怨曠四曰以樂禮教和樂禮謂享燕作樂之禮樂禮尚和故也則民不乖和故相協而不乖離五曰以儀辨等宫室車旗衣服之儀有貴賤之等則民不越上下之分辨故無所踰越六曰以俗教安五方民俗人情所安因以施教則民不愉安居樂業故不愉薄愉音偷七曰以刑教中制刑以弼五教使民協于中則民不虣民協于中故暴不作虣暴八曰以誓教恤誓約其民俾相救恤則民不怠風俗以任恤相高故民不怠於為義九曰以度教節以法度教之使知制節則民知足民無侈心故自知足十曰以世事教能士農工商世守其事各有所能則民不失職父祖作之子孫述之故不失職十有一曰以賢制爵賢有德者制爵則以德制爵也則民慎德則民勉而謹於德行十有二曰以庸制禄庸有功者制禄則以功詔禄也則民興功則民勉而興於功業以土宜之灋辨十有二土之名物十二分野之土各有所宜辨其名謂白墳黒墳之類辨其物謂所生之物以相民宅而知其利害相視民居使得其所利則就之害則避之以阜人民阜盛也以蕃鳥獸蕃息也以毓草木毓生也以任土事有事於地者皆任焉凡此皆由知其利害使之然也辨十有二壤之物而知其種壤亦土也分別物之所生而知其所殖之種以教稼穡樹藝遂以教民春耕秋穡以樹其木以藝其黍稷也以土均之灋辨五物九等均平也五物五地所宜之物九等上三等中三等下三等也制天下之地征地征者貢賦稅斂之總名五物九等既辨則天下之地征可得而制矣以作民職民職即太宰之九職以令地貢地貢即太宰之九貢以斂財賦財賦即太宰九賦之財以均齊天下之政以此皆以均平齊一天下之政也以土圭之灋測土深正日景土圭長一尺五寸其法用之下可以測土深上可以正日景深去聲以求地中地中見下文注日南則景短多暑夏至日正中時立八尺之表以侯日景以土圭量之其景短於土圭則其地在日南而多暑日北則景長多寒其景長於土圭則其地在日北而多寒日東則景夕多風景在表之東是地在日東也景夕謂日中時其景已如夕時也如此則其地多風日西則景朝多隂景在表之西是地在日西也景朝謂日中時其景尚如朝時也如此則其地多隂凡此四者皆非地中也蓋地近南則多暑近北則多寒東方近海故多風西方多山故多隂也日至之景尺有五寸謂之地中夏至日正中時量以土圭其日景長一尺五寸與土圭合乃地中也天地之所合也以其地當天地之中故曰合四時之所交也四時於此而交通風雨之所㑹也風雨以序而至隂陽之所和也隂陽調而不乖然則百物阜安有生者遂有形者育乃建王國焉則其地可以建立邦國焉制其畿此王國之畿也方千里而封樹之王畿地方千里不特溝封之且樹木以為固也凡建邦國上言建王國此言建諸侯之國以土圭度其地而制其域日景移一寸則差千里故建諸侯之國亦以土圭度之制其域者境界皆有營域封圻也諸公之地封疆方五百里諸公國大其地方五百里其食者半山川林麓不可食者半也諸侯之地封疆方四百里降於公也其食者參之一不食之地二可食之地一參音三諸伯之地封疆方三百里降於侯也其食者參之一與諸侯同諸子之地封疆方二百里降於伯也其食者四之一不食之地三可食之地一諸男之地封疆方百里降於子也其食者四之一與諸子同等今按此五諸侯之地與孟子所言不同考之史傳周公之封於魯太公之封於齊皆不止百里孟子王制之言若與周制不合說者以周禮兼附庸而言及統山林川澤言廣封之制也凡造都鄙都鄙者王畿内公卿采地所居曰鄙其界曰都制其地域而封溝之制地域與建邦國同封溝見篇首注以其室數制之依都鄙城内室數於田野之中制地與之不易之地家百畮不易之地歲歲可種是為上田一家受一百畝畮古畝字一易之地家二百畮一易之地兩歲一種是為中田一家受二百畝再易之地家三百畮再易之地三歲一種是為下田一家受三百畝乃分地職若三農園圃之類奠地守若山虞為之守禁之類奠音定制地貢若任農以耕事貢九穀之類而頒職事焉分命官使各為其所職之事以為地灋而待政令地職地守地貢各有度數謂之法凡此皆以待上之政令也以荒政十有二聚萬民荒㐫年也救荒之政十有二條聚民使不離散一曰散利豐年聚之㐫年散之二曰薄征輕其征稅三曰緩刑犯刑者緩縱之四曰弛役弛放其力役之事弛施氏反五曰舎禁舎山澤之禁與民同利舎上聲六曰去幾去門關之幾察去上聲幾音基七曰𤯝禮吉禮之中減其禮數𤯝音省八曰殺哀㐫禮之中殺其禮數殺色界反九曰蕃樂藏樂器而不作十曰多昏婚姻殺禮使男女及時十有一曰索鬼神搜索鬼神而祈禱之索音色十有二曰除盜賊驅除盜賊以去民害以保息六養萬民保安而使蕃息有此六條以養萬民一曰慈幼年幼者慈愛之二曰養老年老者奉養之三曰振窮振之及其時則窮者通四曰恤貧恤之致其愛則貧者利五曰寛疾疾者寛之不以力役加焉六曰安富富者安之不以富斂暴焉以本俗六安萬民本舊也因民舊俗有此六條以安萬民一曰媺宫室上棟下宇以同其安媺音美二曰族墳墓左昭右穆以同其葬三曰聯兄弟或燕或食所以同其恩四曰聯師儒以賢以道所以同其善五曰聯朋友鄉里同井學校同業六曰同衣服貴賤有常上下有制正月之吉建子之月朔日始和布教于邦國都鄙始調和十二教以下之事而頒布此教職文書于邦國都鄙乃縣教象之灋于象魏以地官之教法畫之為象而縣于兩觀縣音𤣥使萬民觀教象使萬民觀教法而儀則之挾日而斂之挾三旬乃收斂使逺近皆知之挾音浹乃施教灋于邦國都鄙乃施教民之法于外之邦國内之都鄙使之各以教其所治民使邦國諸侯教邦國之民都鄙卿大夫教都鄙之民令五家為比令六鄉之民各五家號為一比比毗志反使之相保居相親則易相督察五比為閭一十五家號為一閭使之相受同門閭居足以相容四閭為族百家為族使之相葬族相聚財足以相助五族為黨五百家為一黨使之相救有災冦足以相援五黨為州二千五百家為一州使之相賙有難厄足以相濟五州為鄉萬二千五百家為鄉使之相賓賢能皆備于中相與賓而興之頒職事十有二于邦國都鄙頒布民之職事十有二條使以登萬民登成也一曰稼穡即三農生九穀二曰樹蓺即園圃毓草木三曰作材即虞衡作山澤之材四曰阜蕃即藪牧養蕃鳥獸也五曰飭材即百工飭化八材也六曰通財即商賈阜通財貨也七曰化財即嬪婦化治絲枲也八曰斂材即臣妾治斂疏材也九曰生材即閒民無常職轉移執事也十曰學藝謂學道藝者若禮樂射御書數是也十有一曰世事謂以世事教能則民不失職十有二曰服事謂為公家服事者若府史胥徒是也以鄉三物教萬民而賓興之物猶事也興猶舉也三事告成鄉大夫舉其賢能而以禮賓之一曰六德六者出於心故曰德知仁聖義忠和知别是非仁無私欲聖無不通義有斷制盡已之心曰忠無所乖戾曰和知去聲二曰六行六者體之於身故曰行行去聲孝友睦婣任恤孝於父母友於兄弟睦謂親於九族婣謂親於外親任信於朋友恤振於貧窮婣因三曰六藝六者見之於事故曰藝禮樂射御書數五禮六樂五射五御六書九數以鄉八刑糾萬民不從三物之教則設刑以糾合之一曰不孝之刑孝見上注二曰不睦之刑睦見上注三曰不婣之刑婣見上注四曰不弟之刑不弟即不友也五曰不任之刑任見上注六曰不恤之刑恤見上注七曰造言之刑訛言惑衆八曰亂民之刑亂民改作以五禮防萬民之偽而教之中禮即吉㐫軍賓嘉之五禮所以節止民之侈偽使其行得中以六樂防萬民之情而教之和樂即雲門大巻以下六者所以蕩正民之情思使其心應和凡萬民之不服教而有獄訟者不服謂不服十二教者爭罪曰獄爭財曰訟與有地治者聽而斷之有地治謂鄉州之官司徒與之聽其獄訟而斷決之斷都玩反其附于刑者歸于士士獄官也其附麗于刑歸于士使刑之祀五帝祭祀五方之帝奉牛牲奉猶進也謂獻腥也差其肆肆陳骨體也謂獻熟也肆音剔享先王亦如之如祀五帝之禮大賓客諸侯來朝稱賓卿大夫來聘稱客令野脩道委積令遺人於野路之上脩治道途及委積芻薪禾米之等大喪天子之喪七月而葬帥六鄉之衆庶屬其六引六引謂引喪車索也屬謂挽柩向壙而治政令檢校挽柩之事大軍旅大田役大軍旅謂司馬九伐之事大田役謂治兵大閱之事以旗致萬民旗畫熊虎者也刻日立旗期于旗下而治其徒庶之政令所以申其教戒若國有大故謂王崩及冦兵則致萬民于王門以衛天子令無節者不行於天下有節乃得行所以防姦也大荒大札大㐫年大疫癘則令邦國移民通財民食不足移之以就有餘財之有餘通之以濟不足舎禁弛力有小害者舎之而不禁力役之事弛之而不任薄征緩刑薄其征稅緩其刑法歲終則令教官正治而致事正治謂脩其文書致事謂上其計簿正歲令于教官曰警其官屬各共爾職共其所治之職脩乃事脩其所作之事以聽王命皆聽王之所命其有不正有不正直而濫失者則國有常刑國有典常之刑小司徒之職中大夫二人大司徒之貳掌建邦之教灋建立邦國教民之法以稽國中及四郊都鄙之夫家九比之數稽放也夫家猶言男女也九比出九賦者之人數也比毗志反以辨其貴賤老幼癈疾貴為卿大夫賤謂販賣者癈疾謂癃病也凡征役之施舎施與弛同舎置也征謂征稅役謂繇役貴與老幼廢疾者皆弛舎其征役也與其祭祀飲食喪紀之禁令祭祀以奉神飲食以養生喪紀以送死皆有禁令而不使失禮法也乃頒比灋于六鄉之大夫比法即大司徒令五家為比之法也鄉大夫職見後使各登其鄉之衆寡六畜車輦衆寡謂民之多少車輦謂師行之具皆登載於簿書使知其數畜許六反辨其物物謂家財以歲時入其數以歲時入其登載之數以施政教行徵令施政教謂行鄉射之禮行徵令謂起徒役之事及三年則大比大比謂更閱民數及其財物也大比則受邦國之比要比要謂大比之簿書也乃㑹萬民之卒伍而用之㑹聚萬民閱其材堪充卒伍者以待使用卒子卒反五人為伍五人號為伍五伍為兩二十五人號為兩兩去聲四兩為卒二百人號為卒五卒為旅五百人號為旅五旅為師二千五百人號為師五師為軍萬二千五百人號為一軍以起軍旅用征伐也以作田役習戰陣也以比追胥捕冦盜也以令貢賦制軍需也乃均土地均平也以稽其人民而周知其數稽攷人民徧知多寡之數上地家七人一家受田百畝七口以上則授以上地可任也者家三人可任力役者每家三人中地家六人六口則授以中地可任也者二家五人可任力役者二家共五人下地家五人五口以上則授以下地可任也者家二人可任力役者每家二人凡起徒役起民於役作毋過家一人每家可任者雖多惟一人為正卒毋音無以其餘為羨正卒之外皆為羡卒羨余面反唯田與追胥竭作惟田獵與逐捕冦盜則正卒羨卒並行凡用衆庶若國大詢于衆庶之類則掌其政教與其戒禁政以正之教以導之戒以飭其怠忽禁以使之勿為聽其辭訟衆有辭訟則聽之而辨其曲直施其賞罰衆有功過則施之賞罰以示其勸懲誅其犯命者干犯王命其罪甚大故誅之凡國之大事致民大事自我作故所致毋過家一人大故致餘子大故乃不虞之變故致羨卒乃經土地此謂造都鄙也經謂為之里數而井牧其田野制井田之法教以畜牧九夫為井一夫受田百畝九夫田九百畝其形如井字然四井為邑方里而井謂四方各一里邑則方一里四邑為丘方四里四丘為甸甸方八里旁加一里則方十里為成甸繩證反四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里則方百里而為一同也以任地事而令貢賦地事謂九職之事貢謂九貢賦謂九賦凡稅斂之事此又非特九貢九賦所出也乃分地域而辨其守分邦國都鄙鄉遂之地域而辨地域之守施其職而平其政施地守之職而均平其征稅焉政當作征凡小祭祀奉牛牲羞其肆小賓客令野脩道委積大軍旅帥其衆庶小軍旅巡役治其政令大喪帥邦役治其政教凡建邦國諸侯之國立其社稷社土神稷榖神正其畿疆之封九畿皆有疆界封樹以為固也凡民訟以地比正之民訟其是非不可無證故正以地之比隣地訟以圖正之地訟其疆界不可無質故正以地之圖歲終則考其屬官之治成而誅賞教官其屬六十歲終則考其計簿有罪則誅之有功則賞之令羣吏正要㑹而致事總羣吏之簿書而致其事之功狀以待考也正歲則帥其屬而觀教象之灋大司徒縣教法之象小司徒則帥其屬而徃觀焉徇以木鐸木鐸金口而木舌撼之以警衆鐸達各反曰不用灋者不用教象之法者國有常刑則用以典常之刑令羣吏憲禁令脩灋糾職以待邦治憲謂表縣之禁謂正絶之脩其法制糾其職事以待邦家有治則共之及大比六鄉四郊之吏吏謂比長閭胥以上三年則大比也平教治平章其教治之優劣正政事論正其政事之得失考夫屋及其衆寡六畜兵器考其受田之夫居里之屋及其人民衆寡六畜登耗兵器備乏以待政令以待國家政令所需則共之也鄉師之職下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人分掌六鄉冬掌其所治鄉之教以一人共治三鄉之教而聽其治鄉大夫以下各聽其民鄉師又審察之治直吏反以國比之灋以時稽其夫家衆寡國比之法即小司徒頒于六鄉者夫家謂男女衆寡謂民之多少辨其老幼貴賤廢疾馬牛之物馬牛以供田役為事餘見小司徒辨其可任者與其施舎者可任者用之施舎者不用施音弛舎音捨掌其戒令糾禁戒者戒其怠忽糾者糾其緩散令所以使之從禁所以使之避聽其獄訟以審其是非曲直焉大役則帥民徒而至有大役事鄉師則各帥其民徒而至治其政令治所帥民徒之政令既役則受州里之役要役要役人比要也受州里役要者以所役之民出於州里也以攷司空之辟辟謂功程以司空主役作故也辟音闢以逆其役事逆謂鈎考之也凡邦事國家有功力之事令作秩叙秩常也使多寡有常事有次叙大祭祀吉禮羞牛牲大司徒奉之鄉師進之共茅蒩以茅為蒩用以藉祭蒩音租杜音菹大軍旅㑹同軍旅軍禮㑹同賓禮正治其徒役與其輂輦輂駕馬輦人挽行治徒役謂計久近勞役治輂輦謂計所出所任輂音菊輦力展反戮其犯命者干犯王命者戮之大喪用役則帥其民而至遂治之及葬執纛以與匠師御匶而治役及窆執斧以涖匠師凡四時之田春蒐夏苗秋獮冬狩前期出田灋于州里先田之期出田法于州以令六郷出田法于里以令六遂簡其鼓鐸旗物兵器簡選也兵以鼓進以金退以旗物指揮以兵器擊刺脩其卒伍脩治也百人為卒五人為伍及期及田之時以司徒之大旗致衆庶而陳之熊虎為旗鄉師為司徒致衆庶故以其大旗而陳之以旗物辨鄉邑六鄉公邑之民使各視其旗之所在而從其屬而治其政令刑禁政令所以使之從刑禁所以使之辟巡其前後之屯車徒屯聚前後異部巡之所以正其部伍而戮其犯命者見上注斷其爭禽之訟獲禽而有爭訟則斷其曲直斷都玩反凡四時之徵令有常者謂鄉官屬民及田役之類以木鐸徇于市朝徇于市以令萬民徇于朝以令百官鐸達各反朝肖遥反以歲時巡國及野巡行國中以及野外而賙萬民之囏阨民有飢乏則周其急囏音艱以王命施惠以惠之及下當自王出也歲終則攷六鄉之治攷六鄉之吏治以詔廢置以詔於王而廢其怠者置其勤者正歲稽其鄉器攷其良窳比共吉凶二服吉服是謂祭服凶服是謂弔服共音恭下同閭共祭器簠簋鼎俎之屬族共喪器素俎楬豆之屬黨共射器弓矢決拾之屬州共賓器尊俎笙瑟之屬鄉共吉凶禮樂之器吉器即祭器也凶器即喪器也禮樂即賓射之器鄉大夫備集此四者若國大比三歲大比則攷教察辭攷其勤惰察其實偽稽器展事稽其是否展其廢舉以詔誅賞以告於王而誅賞之鄉大夫之職鄉老二鄉則公一人鄉大夫毎鄉卿一人六鄉分掌六卿之事各掌其鄉之政教禁令以政為先教次之禁令則輔之者也正月之吉建子之月朔日受教灋于司徒受十二法以下之法于司徒退而頒之于其鄉吏分教法于州長至比長使各以教其所治鄉吏受之以教所治之民治直吏反以攷其德行攷六德六行之賢者察其道藝察道德于六藝之能者以歲時登其夫家之衆寡夫家衆寡稽之鄉大夫則登其版籍辨其可任者辨别民力之强壯可任國事者國中自七尺以及六十七尺謂年二十國中晚征而早舎以地近而役多故也野自六尺以及六十有五六尺謂年十五野則早征而晚舎以地逺而役少故也皆征之總國中及野而言其舎者舎謂不征者國中貴者以其有爵禄也賢者以其有德行也能者以其有道藝也服公事者以其有職任也老者以其有年也疾者以其無力也皆舎總六者皆舎之而不用以歲時入其書既登載于版籍毎歲四時入其書於上三年則大比三年一次大比攷其德行道藝德行謂賢者道藝謂能者而興賢者能者興謂舉也鄉老及鄉大夫帥其吏與其衆寡鄉老謂三公分掌六鄉吏謂州長以下衆寡謂民以禮禮賓之用鄉飲酒之禮以禮賢能而與之為賓客厥明賓賢能之明日鄉老及鄉大夫羣吏獻賢能之書于王獻德行道藝之書以待王之官使王再拜受之重得賢能也登于天府天府掌玉玉鎮寳器登賢能之書于天府寳之也内史貳之内史掌贊王制禄貳之者將詔而制其禄也退而以鄉射之禮五物詢衆庶物猶事也謀于衆庶復求賢能養于鄉學以補所興之缺一曰和發而中節二曰容動皆合禮三曰主皮不失正鵠四曰和容容體比于和五曰興舞節比于樂此謂使民興賢總上文而言之謂使民自舉有德行者出使長之出于民上使長民德長丁丈反使民興能使民自舉有道藝者入使治之入于民間使治民事歲終則令六鄉之吏皆會政致事六鄉之吏謂州長以下皆㑹計教政之功狀而致其所掌之事于鄉大夫㑹音檜正歲令羣吏攷灋于司徒攷法謂攷司徒之教法受而行之以退已攷法而退各憲之于其所治憲懸表之也所治謂州鄉黨族閭比國大詢于衆庶國有大事而謀及于庶民則各帥其鄉之衆寡而致于朝卿大夫各帥其鄉之吏民而致于外朝共詢謀之國有大故災變冦戎之類則令民各守其閭二十五家為閭以待政令以待大司徒之政令以旌節傳令則達之各守其節禁人徃來惟以旌節傳政令文書者則不禁也州長每州中大夫一人州二千五百家為一各掌其州之教治政令之灋有教則有治政令則所以輔教治者法則其條目也正月之吉各屬其州之民而讀灋屬猶合也合聚其州之民讀教法而示之屬挽下同以攷其德行道藝而勸之民之有德行道藝者則攷量而勸勉之以糾其過惡而戒之民之有過惡者則糾察而警戒之若以歲時祭祀州社州各有社毎歲春秋舉行祭祀則屬其民而讀灋亦如之其屬民讀法亦如正月之吉春秋以禮㑹民而射于州序序學名春秋二時皆以禮會聚其民而行射禮于州之序㑹如字凡州之大祭祀大喪皆涖其事若國作民而師田行役之事師謂征伐田謂田獵行謂巡守役謂役作凡此數者皆須徵聚其民則帥而致之致于司徒掌其戒令與其賞罰掌戒令所以率作事掌賞罰所以治功過歲終則㑹其州之政令各㑹計一州之政令正歲則讀教法如初復如正月之吉三年大比則大攷州里每歲皆攷其德行道藝矣三歲大比又大攷焉以贊鄉大夫廢興廢退也興進也廢興在鄉大夫州長特贊之而已黨正每黨下大夫一人五百家為一黨各掌其黨之政令教治州長掌其法黨正則奉之以施于其黨焉治直吏反及四時之孟月吉日春夏秋冬孟月吉日則屬民而讀邦灋如州長之禮正月在州三時在黨以糾戒之以戒察警戒其黨之民春秋祭禜亦如之禜謂祭日月星辰水旱之類其讀法糾戒如孟月也國索鬼神而祭祀歲十二月大蜡之祭鬼神萬物而索祭之索音色則以禮屬民而飲酒于序合聚其黨之民而行鄉飲之禮于序以正齒位以正齒序尊卑之位壹命齒于鄉里一命為下士則以年與衆賓相次再命齒于父族再命為中士則以年與族人相次而衆賓不敢與之齒矣三命而不齒三命為上士則雖父族亦不得而齒焉故席于尊東其黨之祭祀喪紀昬冠飲酒教其禮事掌其戒禁凡作民而師田行役凡起民為軍師田獵行狩工役之事則以其灋治其政事以什伍比聯之法治其師田行役之政事歲終則㑹其黨政各㑹計一黨之政帥其吏而致事帥其黨之吏而致所治之事於上正歲屬民讀灋而書其德行道藝書之以待鄉大夫州長所攷以歲時涖校比族師以歲時校比黨正則親臨視之及大比亦如之族師至三年大比黨正亦涖之族師每族上士一人一百家為族各掌其族之戒令政事戒以敕其怠忽令所以輔戒而政事則次之月吉則屬民而讀邦灋屬民讀法州長以正月黨正以孟月族師則毎月舉行焉書其孝弟睦婣有學者孝弟睦婣見大司徒弟即友也有學講六藝也春秋祭酺亦如之災害之神祭而却之日酺其讀法亦如月朔也酺音步以邦比之灋帥四閭之吏邦比之法即五家為比之法也一族則四閭其吏即閭胥也以時屬民而校登其族之夫家衆寡校而登之于鄉大夫校聲教反辨其貴賤老幼廢疾可任者辨其人則知任舎之所宜及其六畜車輦辨其物則知虚耗之所在五家為比十家為聯聯屬也兩比合為一聯五人為伍十人為聯兩伍共為一聯四閭為族八閭為聯二百家共為一聯使之相保相受相保則相督相受則相容刑罰慶賞相及相共刑罰相及則有惡必去慶賞相共則有善必舉共音供以受邦職如此則安居樂業而邦職可受以役國事樂事勸功而國事可役以相葬埋徃來相視而葬埋可合葬如字才即埋莫皆反若作民而師田行役見州長注則合其卒伍卒伍欲聚故合之簡其兵器兵器欲精故簡之以鼓鐸旗物帥而至大司徒辨鼓鐸旗物之用而族師用之以帥民也掌其治令戒禁刑罰民既至族師則以所職治令而號為之禁戒刑罰以警省之使之叶力治直吏反歲終則㑹攷致事㑹其族之政於所攷致其族之事於所治閭胥毎閭中士一人二十五家為閭各掌其閭之徵令徵令謂徵召之命令以歲時各數其閭之衆寡閭二十五家其衆寡可以數而計之辨其施舎族師辨其可任者閭胥辨其施舎者施音弛舎音捨凡春秋之祭祀役政喪紀之數祭祀謂州社黨禜族酺也役田役也政謂鄉射也喪紀謂族相葬埋也政音征聚衆庶四者皆聚衆庶既比則讀灋既比人數之後則讀法以戒敕之比音鼻書其敬敏任恤者敬以直内敏則有功田里相助為任鄉黨相濟為恤族師書其孝弟睦婣者閭胥書其任恤者凡事掌其比觵撻罰之事比長五家下士一人上五家為比比音鼻長聲各掌其比之治比雖五家亦有治法五家相受相和親善則相容有辠竒袤則相及惡則相糾辠罪竒音基袤似嗟反徙于國中及郊人有不便其居則須遷徙則從而授之則比長授其所居若徙于他出居異鄉則為之旌節而行之授之者有節乃達若無授無節若遷徙而無授無節則唯圜土内之圜土獄城也如此則是冦賊之民故置之圜土也内音納封人中士四人下士八人府二人史四人胥六人徒六十人掌畿封者掌設王之社壝社壝祭祀之壇封人設之壝位為畿封而樹之畿上為溝積土於外以為封又樹木以為阻固凡封國封五等諸侯之國設其社稷之壝為民立社故稷從焉餘見大司徒注封其四疆四邊皆有封疆造都邑之封域者亦如之大都小都家邑三等采地亦封其四疆也令社稷之職祭社稷如牲幣器服之類各有職掌封人令之使無廢職凡祭祀飾其牛牲設其楅衡置其絼共其水槀歌舞牲音生及毛炮之豚凡喪紀賓客軍旅大盟則飾其牛牲鼓人中士六人府二人史二人徒二十人掌教金鼔掌教六鼔四金之音聲以鼓名官而四金亦在所教者金皆以鼔為主故也音聲謂八音五聲之節奏以節聲樂樂勝則流故言節以和軍旅師克在和故言和以正田役田役欲正其行列故言正教為鼓而辨其聲用教擊鼔者大小之數又辨其聲所用之事以雷鼓鼓神祀雷鼓八面鼓也祀天神則鼓之以靈鼓鼓社祭靈鼓六面鼓也祭地祗則鼔之以路鼓鼓鬼享路鼔四面鼔也享人鬼則鼔之以鼖鼓鼓軍事鼖大也鼖鼔長八尺以軍事為大故也鼖音賁以鼛鼔鼓役事鼛緩也鼛鼓長八尺以役事勞民故節之欲其緩也以晉鼔鼔金奏晉進也晉鼔長六尺六寸金作而後奏故欲其進也此即上文所謂六鼔也以金錞和鼓錞淳于也鼔倡而和之錞音淳以金鐲節鼓鐲鉦也鼓行而節之鐲音濁以金鐃止鼓鐃如鈴無舌鼔退而止之鐃女交反以金鐸通鼓鐸大鈴也鼔作而通之此即上文所謂四金也鐸得落反凡祭祀百物之神鼓兵舞帗舞者兵舞干戚之舞帗舞者兵繪為之所以形容百物之神有捍蔽祓除之功帗音弗凡軍旅夜鼓鼜軍動則鼓其衆田役亦如之救日月則詔王鼓大喪則詔大僕鼓舞師下士二人胥四人舞徒四十人掌教舞者掌教兵舞兵舞武舞謂干戚也帥而舞山川之祭祀祭名山大川用之教帗舞帗以采繒為之帥而舞社稷之祭祀祭土神穀神用之教羽舞羽析白羽為之帥而舞四方之祭祀四方望祀用之教皇舞皇析五采羽為之三者皆文無也皇注作望音同帥而舞旱暵之事禱雨之祭用之凡野舞則皆用之凡小祭祀則不興舞無功德可形容牧人下士六人府一人史二人徒六十人掌牧牲者掌牧六牲而阜蕃其物牛馬羊豕犬雞為六牲阜盛也蕃息也物謂色以共祭祀之牲牷牷純色也凡陽祀用騂牷毛之隂祀用􅉳牲毛之望祀各以其方之色牲毛之凡時祀之牲必用牷物凡外祭毁事用尨可也凡祭祀共其犧牲犧牲毛羽完具也以授充人繫之祭前三月授之充人繫養之凡牲不繫者共奉之謂非時而祭祀也牛人中士二人下士四人府二人史四人胥二十人徒二百人主掌養牛者掌養國之公牛公牛謂公家之牛以待國之政令以待祭祀賓客享食賓射軍事喪事之所需也凡祭祀共其享牛求牛以授職人而芻之享牛享祭之牛求牛隔日繹祭求神所用之牛命牧人芻養之凡賓客之事共其牢禮積膳之牛饗食賔射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡㑹同軍旅行役共其兵車之牛與其牽徬以載公任器凡祭祀共其牛牲之互與其盆簝以待事充人下士二人史二人胥四人徒四十人掌繫牲者掌繫祭祀之牲牷牧人共之充人繫之牷音全祀五帝見大宰注則繫于牢牢䦨也所以繫牲芻之三月草食曰芻養之三月而後用之享先王亦如之亦如祀五帝也展牲則告牷隔日視牲充人則告純全碩牲則贊宗人告牲之充碩則贊之周禮句解卷三
