body:
  text: 周禮句解卷七宋朱申撰夏官司馬第四象夏所立之官也司馬掌兵而曰政官者政者正也聖人之用兵所以一正天下也夏官司馬上惟王建國辨方正位體國經野設言分職以為民極見天官冢宰注乃立夏官司馬建立夏官司馬之職使帥其屬而掌邦政邦政即六典之政典也夏官其屬六十司馬帥之而掌邦政焉以佐王平邦國王以兵政正天下正者平之謂也司馬則佐助之焉凡制軍先王制兵之法萬有二千五百人為軍五師為軍王六軍王有六卿故置六軍大國三軍大國三卿故置三軍次國二軍次國二卿故置二軍小國一軍小國一卿故置一軍軍將皆命卿王有六軍六卿主之平居則為卿大夫有事則為軍將也三等侯國亦如之二千有五百人為師五旅為師師帥皆中大夫州長三十人為之五百人為旅五卒為旅旅帥皆下大夫黨正百五十人為之百人為卒四兩為卒卒長皆上士旅卒七百五十人為之二十五人為兩五伍為兩兩司馬皆中士閭胥三千人為之五人為伍伍皆有長比長下士主五家之教不以從軍故但曰有長大司馬之職卿一人政政以馬為大司至於馬則官所掌皆舉矣掌建邦國之九法建立九法皆以糾察諸侯故曰邦國之九法也以佐王平邦國以助佐天子而平諸侯之國制畿封國制侯甸男采衛等之九畿封公侯伯子男五等之國以正邦國正其疆土之廣狹也設儀辨位設儀謂國家宫室車旗衣服之節也辨位謂公一位侯一位伯一位子男同一位也以等邦國辨其尊卑之等級也進賢興功有善行者起而擢之有治績者興而起之以作邦國作其勸善樂業之心建牧立監八命作牧為九州長五等諸侯各監一國監去聲以維邦國成其小大相維之勢制軍詰禁制軍謂大國三軍次國二軍小國一軍詰禁謂詰治其犯禁者詰去吉切以糾邦國糾其强弱相陵之事施貢分職施其貢則各以其所有分其職則各以其所能以任邦國施貢以任其財分職以任其力簡稽郷民簡郷民之强弱稽郷民之多少郷向以用邦國簡其可用之人稽其當用之數均守平則均其地之守平其法之則以安邦國如此則邦國安而不危也比小事大大國比小國小國事大國比鼻以和邦國如此則邦國和而不乖也以九伐之法正邦國諸侯有違王命則有九等征伐之法用以正之馮弱犯寡則𤯝之以彊陵弱謂之馮以衆暴寡謂之犯𤯝之謂削其地之四隅也馮皮氷𤯝所景賊賢害民則伐之賢宜任之賊之則傷義民宜養之害之則傷仁故鳴鐘皷以伐其罪暴内陵外則壇之内暴其臣民外陵其諸侯故㑹諸侯為壇焉命以伐之也壇善野荒民散則削之野荒蕪而不治民離㪚而不安故削其地而使小焉負固不服則侵之負恃其險阻之固不服上之命令故不用鐘皷而侵入其地焉賊殺其親則正之賊其親則不仁殺其親則不義故正名定罪而誅之放弑其君則殘之放其君則無上弑其君則大逆故致其徒黨而殘破之犯令陵政則杜之犯令則違上之命陵政則干上之法故杜絶而不使之通也令去聲外内亂鳥獸行則滅之内外之親交相淫亂如鳥獸之聚麀則戕滅其根本不復生也行去聲正月之吉始和布政于邦國都鄙乃縣政象之法于象魏使萬民觀政象挾日而歛之皆如大宰布治之法縣𤣥挾子叶反乃以九畿之籍施邦國之政職九畿謂九服之界限也籍書也政職謂兵賦也蓋以九畿畫界載之於書而施於邦國使其政職也方千里曰國畿王國之畿必方千里者蓋不千里則不足以待諸侯也其外方五百里曰侯畿王畿之外其地方五百里號曰侯畿者取其為王斥候也此職方氏謂之九服者取服事天子為義名九畿者取制畿封國為義又其外方五百里曰甸畿侯畿之外其地方五百里號曰甸畿者取其為王治田出税也又其外方五百里曰男畿甸畿之外其地方五百里號曰男畿者取其為王任職也又其外方五百里曰采畿男畿之外其地方五百里號曰采畿者取其為王治事也又其外方五百里曰衛畿采畿之外其地方五百里號曰衛畿者取其宣力以衛内也謂自侯至衛五服之中國又其外方五百里曰蠻畿衛畿之外其地方五百里號曰蠻畿者言其俗之慢也又其外方五百里曰夷畿蠻畿之外其地方五百里號曰夷畿者言其俗之易也又其外方五百里曰鎮畿夷畿之外其地方五百里號曰鎮畿者謂須鎮守之也又其外方五百里曰蕃畿鎮畿之外其地方五百里號曰蕃畿者謂其在外為蕃籬也自蠻至蕃四服謂之四夷凡令賦令邦國之稅賦以地與民制之以地之􅍇惡與民之衆寡而制之也上地食者參之二上地可食者三之二謂田百畝也其不可食者三之一即田五十畝也參三其民可用者家三人上地家七人故可用為兵者三人中地食者半中地可食者半不可食者半謂田百畝萊亦百畝也其民可用者二家五人中地家六人故其可用為兵者兩家共五人下地食者參之一下地可食者三之一謂田百畝也其不可食者三之二謂萊二百畝也其民可用者家二人下地家五人故可用為兵者家二人中春教振旅此下言四時教兵之法春教曰振旅者振謂振而拯之所謂入曰振旅是也司馬以旗致民熊虎為旗司馬植之以聚衆也平列陳平其列以為陣高下如一故曰平也陳陣下同如戰之陳教兵將以戰也故如戰之陳焉辨皷鐸鐲鐃之用兵以皷進以金止皷鐸鐲鐃皆所以節行也故辨其用鐸徒各鐲濁鐃嘵王執路皷路者道之大也王以道御衆故執路皷諸侯執賁皷賁者事之大也諸侯為王執事故執賁皷賁扶云反軍將執晉皷軍將統萬二千五百人晉以進為義也師帥執提師帥統一千五百人提皷皷之有柄者於馬上提之旅帥執鼙旅帥統五百人鼙皷卑者所執也鼙蒲兮卒長執鐃卒長統百人執金鐃以止皷兩司馬執鐸兩司馬統一十五人執金鐸以通皷公司馬執鐲公司馬伍長也執金鐲以節皷以教坐作進退疾徐疏數之節詳見下文中冬教大閲一章遂以蒐田春田曰蒐者蒐有擇意謂擇不孕者然後取之有司表貉有司大司徒也立表而貉祭之貉莫駕反誓民誓以犯田法之罰皷遂圍禁禁謂虞衡守禽之厲禁也乃擊鼔而園之火弊春田用火田止曰弊弊婢世獻禽以祭社獻禽以祭社神為民祈穀也中夏教茇舍夏教曰苃舍者教以草止之法也苃蒲末如振旅之陳亦平列陣如戰之陣羣吏撰車徒車兵車也徒歩卒也撰謂數擇之也撰算讀書契述事為書合驗為契讀則聲於衆也辨號名之用號名謂以旗幟相别如下文所云也帥以門名帥謂軍將以下也以門名者若魯有東門襄仲宋有桐門右師之類縣鄙各以其名縣謂縣正鄙謂鄙師各以其官名之也家以號名家謂卿大夫之家以其美稱之號而名之也號去聲卿以州名一郷有五州各以其州而名之也野以邑名野謂都鄙之采邑各以其邑而名之也百官各象其事各以所治之事而名之也以辨軍之夜事凡此號名皆以待軍旅之夜事以聲聞相别也其他皆如振旅此外一如春教之法遂以苗田夏田曰苗以除禽獸之害苗者如蒐之法一如春蒐之法車弊夏田用車故曰車弊獻禽以享礿夏祭先王曰礿礿餘若反中秋教治兵秋教曰治兵者所謂出曰治兵是也如振旅之陳亦平列陣如戰之陣辨旗物之用旗物所以作戰如下文所云也然此與司常所載亦小不同未詳其義王載大常日月為常諸侯載旂交龍為旂軍吏載旗軍吏即軍將也熊虎為旗師都載􅎶師都謂孤郷之涖衆者通帛為􅎶郷遂載物六郷六遂之大夫也雜帛為物郊野載旐郊野謂都邑之吏也龜蛇為旐百官載旟鳥隼為旟各書其事與其號焉事謂所掌之事號謂所稱之號皆書於旗物也書當為畫其他皆如振旅一如春教之法遂以獮田秋田曰獮者以殺為主故也獮息典如蒐田之灋一如春蒐之法羅弊以網覆而取之故曰羅弊致禽以祀祊祊謂祭四方以報成百物也中冬教大閲冬教曰大閲者冬農隙之時故大閱兵而習戰也閱悦前期羣吏戒衆庶脩戰法羣吏謂郷師以下也前大閲之期而戒衆庶以脩戰攻之法虞人萊所田之野為表山澤之虞除去田草而立表也百歩則一每百歩立一表為三表三表之間有三百歩又五十歩為一表四表之間通三百五十歩田之日及至狩田之日司馬建旗于後表之中後表第一表也建旗以待民之至也羣吏以旗物皷鐸鐲鐃各帥其民而致皆致之於大司馬也質明天正明時弊旗仆後表之旗誅後至者仆旗而後至者誅之乃陳車徒陳兵車與歩卒如戰之陳一如春教之陣陳上如字下音陣皆坐為將誓衆使坐而聽之也羣吏聽誓于陳前諸軍將以下率衆而聽誓於陣前斬牲以左右徇陳小子乃斬牲而徇陣之左右曰不用命者斬之言不聽王命者斬之如此牲也中軍以鼙令皷中軍之將擊皷鼙以令鼔所以作士氣也鼙蒲兮反鼔人皆三鼓師帥旅帥各三擊其所執之鼔司馬振鐸兩司馬乃振鐸以作衆鐸徒各反下同羣吏作旗羣吏皆植所建之旗物車徒皆作車徒之坐而聽誓者皆起鼓行嗚鐲鼔人擊鼔以行之伍長嗚鐲以節之鐲音濁下同車徒皆行車徒皆起行也及表乃止自第一表行至第二表而止三鼔摝鐸鼔人人三鼔也摝鐸者掩其口而振之也摝音鹿又扶表反羣吏弊旗羣吏聞鐸皆仆其旗車徒皆坐止行而息氣也又三鼔鼔人又三擊鼔振鐸司馬又振鐸作旗羣吏聞鐸又植其旗車徒皆作坐者皆起鼓進鳴鐲鼔人擊鼔而進伍長鳴鐲以節之車驟徒趨驟謂聚足而進趨則走之肅也此言赴敵尚疾之漸也驟仕救反及表乃止自第二表驟趨至第三表而止坐作如初坐作一如第二表之法乃鼓鼔人又擊鼓車馳徒走馳謂决圍而去走則速也此言勇於赴敵也及表乃止自第三表馳走至第四表而止鼔戒三闋聲鼔以戒攻敵以三為節闋苦宂反車三發每鼓一闋則車一發徒三刺每鼔一闋則徒一刺至三而止乃鼓退象已勝敵故鳴鼓而退也鳴鐃且郤卒長鳴鐃以止鼔而退兵郤却及表乃止自第四表退至第一表而止坐作如初坐作一如前法遂以狩田冬田曰狩者言取之無所擇也以旌為左右和之門軍門曰和立兩旌於左右以為之羣吏各帥其車徒以叙和出用次序以出和門也左右陳車徒或出而左或出而右有司平之郷師居門正其出入之行列也旗居卒間以分地旗軍吏所載也每百人為一卒分地者謂調其部曲之疏宻也分去聲前後有屯百歩車徒前後異屯其相去百歩也屯豚有司巡其前後郷師又巡其行列使不紊也險野人為主山阜險阻則以歩卒居前易野車為主原野平夷則以兵車居前易去聲既陳車徒排列成陣乃設驅逆之車驅謂驅禽使前趨獲逆謂送還之使不出圍也驅起其切又如字有司表貉于陳前如振旅之法貉莫駕中軍以鼙令鼓鼓人皆三鼓見上注羣司馬振鐸羣司馬即兩司馬也車徒皆作坐者皆起遂鼓行遂擊鼔而行徒銜枚而進枚如箸歩卒皆銜枚而進所以止諠譁也大獸公之得大獸則納之於官小禽私之得小禽則私自取之獲者取左耳得禽獸者取其左耳以計多少而論功也及所弊田所當止之處鼓皆駴疾志擊鼔曰駴駴胡楷反車徒皆譟譟讙也以象克敵而喜也徒乃弊冬狩以徒為主故曰徒乃弊致禽饁獸于郊取所獲之禽因以饁祭四方之神于郊饁于輒反入獻禽以享烝入以獻于先王也冬祭曰烝烝之升及師大合軍師謂王巡守㑹同司馬起師合軍以從之以行禁令禁以止之令以行之以救無辜仁之至也伐有罪義之盡也若大師則掌其戒令王出大師征伐則戒其怠忽令其有為涖大卜大卜占出兵吉凶則臨之帥執事涖釁主及軍器卜既得吉乃迎遷廟之主及社主載之齊車執事者殺牲取血以塗主及軍器司馬則帥而臨視之及致郷師致民於司馬建大常司馬乃植大常之旗比軍衆比校軍衆之多寡比音鼻誅後至者已建大常而後至者誅之及戰及當戰之時巡陳眂事而賞罰司馬巡行陳中視其所執之事冇功者賞違令者罰眂視若師有功謂戰勝也則左執律律聽軍聲故左執之右秉鉞鉞致殺伐故右秉之鉞越以先愷樂獻于社先猶道也乃奏愷捷之樂而獻功于社若師不功則厭而奉主車王弔勞士庶子則相大役謂築作城池役衆之大事與慮事司徒司空謀慮役事司馬與焉與預屬其植植謂主役人之官屬其植則欲知其人之多寡屬燭植值受其要要謂計功程之書受其要則欲知其功之差等以待攷而賞誅以待攷校其功過而行誅賞也大㑹同則帥士庶子士謂國子之已命者庶子謂未命者而掌其政令政以正之令以命之若大射則合諸侯之六耦兩人為耦王大射以選士則令諸侯為大耦以射三侯大祭祀饗食大祭祀謂大享也饗食於廟所以禮賔客也食似羞牲魚以魚為牲而進之授其祭授尸賔所當祭之物大喪平士大夫喪祭奉詔馬牲小司馬之職中大夫二人掌凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之法軍司馬下大夫二人闕輿司馬上士八人闕行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人闕司勲上士二人下士四人府二人史四人胥二人徒二十人主功賞之官掌六郷賞地之法六鄉賞地即載師之賞田也在逺郊以等其功以差等其功之大小王功曰勲王功謂輔成王業也勲者功之緫名王功至大故名曰勲國功曰功國功謂保全國家也次於王功故以功名之民功曰庸民功謂法施於民也庸常也國家為民立官故冇功於民者曰庸也事功曰勞盡勤勞者足以立事故事功名之曰勞也治功曰力强有力者足以任治故治功名之曰力也治直吏反戰功曰多戰以多筭而能勝故名戰功曰多也凡有功者凡人臣有功於國家者銘書於王之大常日月為常王之旗也書有功之名於大常之旗使與日月同其光也祭於大烝冬祭曰烝死而祭於大烝使與先王同其享也司勲詔之其祭之也則司勲以其辭而告於神也大功司勲藏其貳大功之書藏於天府而司勲又藏其副本以主其賞也掌賞地之政令政令謂賞田之賦役也凡賞無常功之大小不可預知故無常也輕重眂功功大者重其賞功小者輕其賞凡頒賞地頒受賞田之法參之一食三分計税王食其一功臣食其二也參三唯加田無國正既賞以田而又加賜之則免其征稅也正音征馬質中士二人府一人史二人賈四人徒八人主平馬價掌質馬質正也買馬則平其價直馬量三物三馬之材必量其高下然後可知其價也一曰戎馬共戎事之馬二曰田馬共田事之馬三曰駑馬下材而共冗事之馬皆有物賈以其材之美惡定其價之高下賈價綱惡馬馬之惡者則綱維之所以禁其奔踶也凡受馬於有司者冇司謂校人之屬受馬謂國事當用馬者書其齒毛與其賈馬質則書其年齒毛色及其價直馬死則旬之内更旬之外入馬耳以其物更其外否馬及行則以任齊其行若有馬訟則聽之有爭馬之訟則聽其曲直禁原蠶者原再也蠶為龍精與馬同祖一歳再蠶則蠶勝而馬衰故禁之量人下士二人府一人史四人徒八人主以大尺量地廣狹量良掌建國之灋建國之法謂辨方正位也以分國為九州自王國及諸候之國列其地為九州也營國城郭營創也王國之内曰城外曰郭營后宫營王后之六宫量市朝道巷門渠王立朝后立市朝在前市在後道巷所以往來門以出入渠以通水皆量其廣狹而為之制也潮朝造都邑亦如之造都鄙之采邑亦如建國之法營軍之壘舍壘謂軍壁舍謂軍舍量其市朝州涂軍社之所里王師之所在有市有朝其衆之所聚則謂之州其衆之所由則有涂其載社主以行而所至之涂則有里涂塗邦國之地諸侯之地其制冇大小與天下之涂數天下道涂其數有廣狹皆書而藏之以備其攷察也凡祭祀饗賔制其從獻脯燔之數量掌喪祭奠竁之爼實凡宰祭與鬱人受斝歴而皆飲之小子下士二人史一人賈二人徒八人主祭祀之小事掌祭祀羞羊肆羊殽肉豆羞進也羊肆謂體薦全烝也羊殽謂體解節折也肉豆謂切肉加於豆也肆音剔又如字而掌珥于社稷珥弭災之祭也社土神稷穀神珥弭祈于五祀祈求福之祭也五祀户竈中霤門行也凡沈辜侯禳飾其牲釁邦器及軍器凡師田師旅田獵斬牲以左右徇陳斬牲而徇於陣之左右言不用命者其受戮于社如此牲也徇辭俊陳陣祭祀贊羞受徹焉始祭進饌則贊之祭畢徹器則受之羊人下士二人史一人賈二人徒八人火畜屬夏掌羊牲用羊為牲則掌之凡祭祀飾羔羔小羊也飾謂飾以繢也祭祀割羊牲祭祀用羊則主割殺之事登其首首者陽氣所聚升首以報陽也凡祈珥共其羊牲賔客共其灋羊凡沈辜侯禳釁積共其羊牲若牧人無牲牧人偶乏羊牲則受布于司馬則受其買牲泉布于司馬使其賈買牲而共之羊人之屬冇賈二人能知物價故使買而共之賈古共㳟司爟下士二人徒六人舉火曰爟爟貫掌行火之政令行火猶用火也正以政之令以命之四時變國火春取榆柳之火夏取􅀥杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火以救時疾四時之火各以其宜則民疾可救矣季春出火火星見於建辰之月因出之以宣其氣雖烈山焚萊不禁也民咸從之民皆從其出火之令季秋内火火星伏於建戌之月因内之以息其氣雖鑠金焚薙不為也内音納民亦如之民亦從其内火之令時則施火令以時施其禁焚萊之令令去聲凡祭祀則祭爟祭爟以報始鑽燧出火者凡國失火國中不謹而致失火野焚萊野外不謹而致焚萊則有刑罰焉以其不謹故施刑罰以薄懲之掌固上士二人下士八人府二人史四人胥四人徒四十人國所依阻曰固掌脩城郭溝池樹渠之固浚溝之土以為城鑿池之土以為郭外有渠以通水而植木其上凡此皆所以為固也頒其士庶子及其衆庶之守士謂公卿大夫之適于已命者庶子謂未命者頒士庶子所守之地使董衆庶以為守也設其飾器設飾以為美設器以為備分其財用以給守者均其稍食以養守者任其萬民如此則萬民可任而使有職用其材器材器可用而使無乏也凡守者受灋焉凡守城池備冦難者皆受法於掌固守狩以通守政有移甲與其役材用唯是得通與國有司帥之以贊其不足者晝三巡之夜亦如之夜三鼜以號戒若造都邑若造都鄙之采邑則治其固與其守灋亦造城池以為固而為守之之法凡國都之竟有溝樹之固王國所都之竟界皆鑿溝樹木以為阻固竟境郊亦如之國外曰郊其溝樹亦如之民皆有職焉民皆任其守險之職若有山川則因之地險山川丘陵可因之以為阻固也司險中士二人下士四人史二人徒四十人在國曰固在野曰險掌九州之圖謂九州之地圖以周知其山林川澤之阻山林川澤有阻塞不通者觀於地圖可以徧知之而達其道路山林之阻則開鑿之川澤之阻則橋梁之使道路通逹也設國之五溝五涂五溝遂溝洫澮川也五涂徑畛涂道路也詳見遂人注而樹之林以為阻固栽植林木於溝涂之上用為阻固皆有守禁司險地之民職其守禁而達其道路雖有守禁而聽民往來也國有故喪烖及兵事則藩塞阻路而止行者閉塞要害之路不通往來所以備奸宄也以其屬守之使凡屬司險之民同守之唯有節者達之惟執符璽以往來者不禁其行掌疆中士八人史四人胥十有六人徒百有六十人闕候人上士六人下士十有二人史六人徒百有二十人主候迎賔客者各掌其方之道治四方賔客之來則掌其道路之治治直吏與其禁令禁令所以備奸宄也以設候人四方各設其人以候賔客若有方治四方有來治國事者則帥而致于朝候人則帥其人面造於王朝也朝潮及歸及其治事而歸送之于竟候人復送之出竟也竟境環人下士六人史二人徒十有二人環猶却也主以勇力却敵掌致師致敵人來使戰也察軍慝伺察軍中為隂奸者慝他得反環四方之故四方有兵戎之故環而却之不使合黨締交巡邦國巡行邦國之中搏諜賊賊來作間諜探伺虛實者搏而執之訟敵國諸侯有爭訟則平之揚軍旅其負固不服者則振揚武事以伐之降國邑邑之叛者降户來降則受之江反挈壺氏下士六人史二人徒十有二人刻挈提也壺水器也主挈壺水以定漏掌挈壺以令軍井謂為軍穿井井成則挈壺以表於其上使軍中知取水之處也挈轡以令舍轡所以駕馬者軍所止宿之地則挈轡以表之使軍中知所止宿也挈詰結反又音纈挈畚以令糧畚盛糧之器也於置糧食之地則挈畚以表之使軍中知取食之處也畚音本凡軍事凡有軍旅之事縣壺以序聚􅈀縣壺注水以定更漏所以序次更迭擊柝守備之人也􅈀託凡喪縣壺以代哭者皆以水火守之以水守壺者所以添漏水也以火守壺者夜則視刻數也分以日夜於晝漏上分日夜之刻數及冬則以火爨鼎水而沸之而沃之冬則水凝而漏不下故以鼎煑水為沸湯以沃漏也射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人主射事者掌國之三公孤卿大夫之位王與諸侯行賔射之禮則國之公孤卿大夫與焉射人則掌其位也三公北面以荅君也孤東靣三孤列於西而東面卿大夫西面卿大夫列於西而東面蓋東西向者所以佐佑王也其摰其執摯以見王如下文所云三公執璧三公執璧為摯孤執皮帛三孤執皮帛為摯卿執羔卿執羔為摯大夫鴈大夫執鴈為摯諸侯在朝則皆北面從三公之後也朝潮詔相其灋詔以言相以力謂射人詔相諸侯以禮儀也相去聲若有國事國有祭祀之事則掌其戒令戒其怠忽令其有為詔相其事詔相諸侯共祭祀之事相去聲掌其治達其善治射事者則達之於王也以射灋治射儀射法謂射禮之法而下文所謂侯也獲也容也樂節也皆射儀也王以六耦射三侯兩人為耦六耦則十二人也侯今之射垜也三侯熊侯虎侯豹侯也射射侯之射音石下同三獲三容三獲謂執獲旌而告中者三人也三容謂設之以蔽待獲者也樂以騶虞歌騶虞之詩以為節也九節五正節即騶虞也以九為數五正者以五采為正鵠也中朱次白次黃次蒼而黒居其外焉正音征下同諸侯以四耦射二侯四耦則八人也二侯熊豹也二獲二容如侯之數樂以貍首歌貍首之詩以為節七節三正貍首以七為節三正朱白蒼也孤卿大夫以三耦射一侯三耦則六人也一侯謂麋侯也一獲一容如侯之數樂以采蘋歌采蘋之詩以為節五節二正采蘋以五為節二正則朱綠也士以三耦射豻侯亦六人也豻胡犬也一獲一容如侯之數樂以采蘩歌采蘩之詩以為節五節二正與孤卿大夫同若王大射謂將祭而擇士之射則以貍歩張三侯貍獸之善摶者蓋擬其步數以取逺近而張熊虎豹之三侯也王射則令去侯立于後王自射則令負侯者去侯而立於其後去上聲以矢行告王矢之行必以高下左右告也卒令取矢射畢則令校烏氏取矢也卒子恤反祭侯則為位祭侯之神則設位於西北三歩與大史數射中與大史同數射者中侯之筭數所中去聲佐司馬治射正射以不失正鵠為主司馬射之而射人佐之祭祀則贊射牲祭祀王親射牲則贊射之相孤卿大夫之灋儀孤卿大夫射則相其射法與射儀也㑹同朝覲作大夫介凡有爵者大師令有爵者乘王之倅車有大賔客則作卿大夫從戒大史及大夫介大喪與僕人遷尸作卿大夫掌事比其廬不敬者苛罰之服不氏下士一人徒四人掌養猛獸而教擾之凡祭祀共猛獸賔客之事則抗皮射則贊張侯以旌居乏而待獲射鳥氏下士一人徒四人掌射鳥祭祀以弓矢歐烏鳶凡賔客㑹同軍旅亦如之射則取矢矢在侯高則以并夾取之羅氏下士一人徒八人掌羅烏鳥蜡則作羅􅃭中春羅春鳥獻鳩以養國老行羽物掌畜下士二人史二人胥二人徒二十人掌養鳥而阜蕃教擾之祭祀共卵鳥歲時貢鳥物共膳獻之鳥周禮句解卷七
