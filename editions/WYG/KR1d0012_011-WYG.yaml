body:
  text: 周禮句解卷十一宋朱申撰冬官考工記第六鄭氏曰古周禮六篇司空之官也司空之篇亡漢興購千金不得後人錄此三十工以為考工記備大數耳名今按冬官不名司空而名考工記者蓋漢儒之也冬官考工記上國有六職謂國家之事有此六種職掌如下文坐而論道以下六條非謂小宰之六職也百工與居一焉百工審曲面勢以飭五材以辨民器居六職之一也與音預或坐而論道王與三公坐而論道經邦此六職之一也或作而行之作猶起也行猶為也王公論之士大夫則起而有為此六職之二也或審曲面埶審察五材之曲直面觀五材之形勢埶勢以飭五材飾猶修也五材金木水火土也以辨名器五材既修乃分辨之以為民之器用此百工之事六職之三也或通四方之珍異以資之物貴為珍物殊為異通四方之有無而相資以為用此商旅之事六職之四也或飭力以長地財地財九穀也必勤力以長成之此三農之事六職之五也或治絲麻以成之治絲以成帛治麻以成布此嬪婦之事六職之六也坐而論道謂之王公此覆解上文六條謂坐而論道者王與三公之職也作而行之謂之士大夫謂作而行之者士與大夫之職也審曲面勢以飭五材以辨民器謂之百工審察五材曲直方面形勢以為民器謂主此事者百工之職也通四方之珍異以資之謂之商旅謂主此事者掌商旅之職也飭力以長地財謂之農夫謂主此事者掌農夫之職也治絲麻以成之謂之婦功謂主此事者掌婦功之職也粤無鎛粤南蠻地也鎛治田器也言其地無鑄鎛者之名粤曰鎛搏燕無函燕北狄地也函甲也言其地無函人之名函含秦無廬秦西戎地也廬兵戈之柄也言其地無廬人之名廬盧胡無弓車胡北夷地也言其地無弓人車人之名粤之無鎛也此覆解上文四條釋粤無鎛之義非無鎛也非是其地無鎛手也夫人而能為鎛也人人皆能為鎛故鎛工不以名著也夫扶下同燕之無函也釋燕無函之義非無函也非是其地無函人也夫人而能為函也人人皆能為甲故函人不以名著也秦之無廬也釋秦無廬之義非無廬也非是其地無廬人也夫人而能為廬也人人皆能為廬故廬人不以名著也胡之無弓車也釋胡無弓車之義非無弓車也非是其地無弓人車人也夫人而能為弓車也人人皆能為弓與車故弓人車人不以名著也知者創物創謂立法於物也知者無所不知故能創造器用巧者述之述謂取法於後也巧者無所不能故能倣傚為之守之世謂之工父子相傳不失其業然後名之曰工百工之事百工不一其事皆父子世守其業者皆聖人之作也聖人知無不知故百工之事皆出於聖人創物之知也爍金以為刄金性至堅必待火以爍之然後可以為刄爍始灼反凝土以為器土性至緩必待水以凝之然後可以為器也作車以行陸行陸路者必待車以載之作舟以行水行水道者必待舟以載之此皆聖人之所作也四者雖百工之事然而知金之可爍土之可凝車之可以行陸舟之可以行水此皆出於聖人創物之知也天有時天時有寒温之殊地有氣地氣有剛柔之別材有美均之為材料也而有美惡之不同工有巧均之為工匠也而有巧拙之或異合此四者材既美工既巧又得天時地氣四者相合然後可以為良以此為器然後極至於善材美工巧材料雖美工匠雖巧然而不良而所作之器乃不善何也則不時不得地氣也蓋由不得天時地氣故不良也橘踰淮而北為枳淮今淮河也橘味甘枳味苦以江南之橘移過淮北則化為枳枳紙鸜鵒不踰濟濟水在齊地鸜鵒之禽不過此水故春秋書鸜鵒來巢以為異也鸜其俱鵒欲貉踰汶則死貉禽名似狐汶水在魯地貉獸過此水則死貉戸各此地氣然也此地道之化使然也鄭之刀鄭國之地其刀良宋之斤斤斧類宋國之地其斤良魯之削削書刀也魯國之地其削良吳粤之劍吳粤二國之地其劍良粤曰遷乎其地而弗能為良雖使五國之人遷於他國之地而制此器則不良者何也地氣然也蓋由物性之宜使然也以上兩節言地有氣燕之角燕地在北方其牛角最堅實荆之幹荆地在南方多堅木可為弓弩之幹妢胡之笴妢胡胡子國也近楚其地多幹可為箭幹妢扶弓笴古老吳粤之金錫吳粤在東南多石山産金與錫此材之美者也此材之稟天時地氣自然而美者也此一節言材有美天有時以生陽一嘘而萬物生有時以殺隂一吸而萬物殺草木有時以生春夏陽盛故草木生有時以死秋冬隂盛故草木死石有時以泐石雖至堅或以盛暑而解散也泐勒水有時以凝水雖流動或以盛寒而凍結也有時以澤水雖凍結又以春時而消澤也澤亦此天時也此物之係乎天者然也此一節言天有時凡攻木之工七自此而下言工有巧攻治也治木之工其目有七攻金之工六治金之工其目有六攻皮之工五治皮革之工其目有五設色之工五裝設采色之工其目有五刮摩之工五刮以成質磨以出細為此工者其目有五刮古八反搏埴之工二搏團也埴土粘也蓋為瓦器者其目有二凡此六者總為三十工也摶團攻木之工此覆解上文六條言攻木之工七其目在下輪為輪為蓋輿為輿弓為弓廬為廬器蓋戈㦸殳矛之柄也廬盧匠建國為宫室為溝洫車為耒為車梓為筍􅒶為飲器為侯此七者攻木之工也攻金之工其目在下築為削治為戈㦸鳬為鍾㮚為量㮚栗段為鎛桃為劍之此六者攻金工也攻皮之工其目在下函為甲鮑治皮韗為皷韗運韋闕裘為裘之此五者攻皮工也設色之工其目在下畫繢繢言其意畫言其事二者相須也畫胡卦繢㑹鍾深羽筐闕㡛練絲工此五者設色之也㡛芒刮摩之工其目在下玉治圭璧楖雕闕楖側筆矢為矢磬為磬之此五者刮摩工也搏埴之工其目在下陶為瓦旊為簋工此二者搏埴之也旊倣有虞氏上陶上與尚同虞舜時淳朴未散陶土為器故上陶夏后氏上匠夏時營制稍興為宫室以居處為溝洫以灌溉故上匠殷人上梓商禮樂之器漸備故上梓周人上輿周則經制廣而庶事備故上輿故一器而工聚焉者車為多此因周人上輿而言蓋車雖一器而用衆工為最多也車有六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等車謂之六等之數凡察車之道大凡察車高下之法必自載於地者始也自從也載於地者謂輪也是故察車自輪始輪廣則車髙輪狹則車卑凡察車之道欲有樸屬而㣲至不其屬無以為完乆也不㣲至無以為戚速也輪已崇則人不能登也輪已卑則於馬終古登阤也故兵車之輪六尺有六寸兵車革路也凡輪之尺寸皆量其圓徑之數田車之輪六尺有三寸田車木路也乗車之輪六尺有六寸乗車玉路金路象路也輪之尺寸不同者以所駕馬有高下也乘去聲六尺有六寸之輪輪之圓有六尺六寸軹崇三尺有三寸也軹軸頭也崇髙也輪徑六尺六寸軸頭處中故但髙三尺三寸也軹紙加軫與轐焉輿後横木謂之軫軸上伏兔謂之轐車軸上有轐轐尾上載車軫軫上加輿共髙七寸轐卜四尺也三尺三寸又加七寸故髙四尺人長八尺人有長短取中而言之故曰八尺長去聲登下以為節車之髙於人為半故登車下車以此為節則得其宜也輪人為輪斬三材必以其時三材所以為轂也輻也牙也斬之以時者陽木則仲冬斬之隂木則仲夏斬之三材既具三材既已具備巧者和之必資工之巧者和合三材以為輪也轂也者以為利轉也輻也者以為直指也牙也者以為固抱也輪敝三材不失職謂之完望而眡其輪欲其幎爾而下迆也進而眡之欲其㣲至也無所取之取諸圜也望其輻欲其揱爾而纎也進而眡之欲其内稱也無所取之取諸易直也望其轂欲其眼也進而眡之欲其幬之廉也無所取之取諸急也眡其綆欲其蚤之正也察其菑蚤不齵則輪雖敝不匡凡斬轂之道必矩其隂陽矩謂刻識之也凡斬轂材必辨其向日背日之隂陽方陽也者稹理而堅陽木實栗叢緻也謂稹理而堅實隂也者疏理而柔隂木其體虚空故疏而不宻其質弱是故以火養其隂而齊諸其陽必以火而煉治之則轂雖敝不藃雖乆而敝亦不壞藃音耗轂小而長則柞柞謂狹而不廣大而短則摯摯危也言不堅固是故六分其輪崇以其一為之牙圍參分其牙圍而漆其二椁其漆内而中詘之以為之轂長以其長為之圍以其圍之阞捎其藪五分其轂之長去一以為賢去三以為軹容轂必直非和轉之勢故欲其直陳必正采以約之為文施膠必厚附麗之必欲固也施筋必數幔角之用必欲多也數朔幬必負榦幬覆也幬以幔轂必欲其廉之外見而負於榦既摩革色青白謂之轂之善參分其轂長二在外一在内以置其輻凡輻量其鑿深以為輻廣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也故竑其輻廣以為之弱則雖有重任轂不折參分其輻之長而殺其一則雖有深泥亦弗之溓也參分其股圍去一為骰圍揉輻必齊揉輻以火所以齊曲直平沈必均沈輻以水所以均輕重直以指牙然輻直則為倨牙曲則為勾故必欲其直指牙得則無􅈏而固不得則有􅈏必足見也六尺有六寸之輪綆參分寸之二謂之輪之固凡為輪為輪之法行澤者欲杼澤多濕故削其輪之外如劍脊也杼直吕反行山者欲侔山多石故輪欲上下相等而圓滑也杼以行澤以輪之杼者而行澤則是刀以割塗也譬如以刀而割泥也是故塗不附故雖行濕地而泥不附者也侔以行山以輪之侔者而行山則是搏以行石也譬如以圓滑之物而行石也搏音圓是故輪雖敝不甐於鑿輪雖為石損敝而不動於鑿中也甐力刄鑿曹報反凡揉牙外不廉而内不挫旁不腫謂之用火之善是故規之以眡其圜也輪中規則圜矣萭之以眡其匡也萭與矩同規圜中矩四圍端正是中矩也縣之以眡其輻之直也以繩縣之中繩則輻直矣縣𤣥水之以眡其平沈之均也􅅯其輪而灌以水其平沈適均則平中準矣量其藪以黍以眡其同也藪輻間也量之以黍而所受多寡適同焉則中量矣藪素口反權之以眡其輕重之侔也權稱鍾也以兩輪分而稱之其輕重適侔則中權矣故可規可萭可水可縣可量可權也六者皆曰可者見其無不善也謂之國工則國人無以過其巧矣輪人為蓋蓋取其圓於車上之所用達常圍三寸蓋之為制上為部中為達常柄通上下也桯圍倍之六寸下為桯蓋扛也蓋之材賴之以呈蓋頂也桯楹信其桯圍以為部廣廣徑也部廣之圍尺有八寸信音申廣古曠反部廣六寸部長二尺桯長部之四尺者二十分寸之一謂之枚部尊一枚弓鑿廣四枚鑿上二枚鑿下四枚鑿深二寸有半下直二故鑿端一枚弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫參分弓長而揉其一參分其股圍去一為蚤圍參分弓長以其一為之尊上欲尊而宇欲卑上近部則欲其髙隤下為宇則欲其低卑音婢上尊而宇卑則吐疾而霤逺其勢順霤力又反蓋已崇則難為門也髙則門難容蓋已卑是蔽目也卑則遮前不見是故蓋崇十尺髙十尺良蓋弗冐弗紘善為蓋者不以衣覆或有衣而不以線係殷畆而馳不隊隊讀謂墜如平畆而馳且落不落之􅃺謂之國工是國之良工也輿人為車車謂五路輪崇車廣衡長參如一謂之參稱參分車廣去一以為隧參分其隧一在前二在後以揉其式以其廣之半為之式崇以其隧之半為之較崇六分其廣以一為之軫圍參分軫圍去一以為式圍參分式圍去一以為較圍參分較圍去一以為軹圍參分軹圍去一以為轛圍圜者中規為圓必中於規中去聲方者中矩為方必中於矩立者中縣立者必如縣繩之直縣𤣥衡者中水衡者必如止水之平直者如生焉如木之生於地繼者如附焉如木之附於榦凡居材大與小無并處材得其所以小入大大者受之而入無兼并之失大倚小則摧引之則絶棧車欲弇飾車欲侈輈人為輈輈車轅也輈張留反輈有三度淺深異其數也軸有三理言其有常也國馬之輈種馬駕玉路戎馬駕革路齊馬駕金路道馬駕象路深四尺有七寸國馬髙八尺故輈之深四尺七寸深去聲下同田馬之輈駕木路深四尺田馬髙七尺故輈之深四尺駑馬之輈駕役車深三尺有三寸駑馬髙六尺故輈之深三尺三寸此言輈有三度也軸有三理釋三理之義一者以為媺也軸之材欲其美而無惡媺美同二者以為乆也軸之體欲其堅而可乆三者以為利也軸之勢欲其利而易轉此言軸有三理也軌前十尺而䇿半之凡任木任正者十分其輈之長以其一為之圍衡任者五分其長以其一為之圍小於度謂之無任五分其軫間以其一為之軸圍十分其輈之長以其一為之當兔之圍參分其兔圍去一以為頸圍五分其頸圍去一以為踵圍凡揉輈欲其孫而無弧深今夫大車之轅摯其登又難既克其登其覆車也必易此無故惟轅直且無橈也是故大車平地既節軒摯之任及其登阤不伏其轅必縊其牛此無故惟轅直且無橈也故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故惟轅直且無橈也是故輈欲頎典輈深則折淺則負輈注則利準利準則乆和則安輈欲弧而無折經而無絶進則與馬謀馬所以駕車故車之進則與馬謀退則與人謀人所以御馬故車之退則與人謀終日馳騁雖終日用之以馳騁驅驟左不揵車左君聴乗揵倦也言尊者在左無揵倦之病也揵蹇行數千里雖行數千里之逺馬不契需契傷也言馬不傷於蹄不濡滯於路也契苦結反終嵗御雖終嵗御車衣袵不敝袵裳際也車行無動搖故不損御者之衣裳也此惟輈之和也凡此三者以輈之和故能如此勸登馬力馬力既竭輈猶能一取焉良輈環灂自伏兔不至軌七寸軌中有灂謂之國輈軫之方也軫輿後横木也以象地也軫在下以承上也故象地之方蓋之圜也蓋周圍覆車也以象天也蓋在上以覆下故以象天之圜輪輻三十一輪有三十輻以象日月也象一月有三十日也蓋弓二十有八一蓋有二十八弓以象星也象天有二十八宿也龍旂九斿交龍為旂其斿有九諸侯建之以象大火也大火蒼龍之宿東方之星其屬有九鳥旟七斿鳥準為旟其斿有七州里建之旟余以象鶉火也鶉火朱鳥之宿南方之星其屬有七鶉淳熊旗六斿熊虎為旗其斿有六師都建之以象伐也伐白虎之宿西方之星其屬有六也龜蛇四斿龜蛇為旐其斿有四縣都建之以象營室也營室𤣥武之宿北方之星其屬有四弧旌枉矢凡旌旗皆有弧以張之又畫枉矢於上也以象弧也以象弧星之有矢飛行也攻金之工此下言用金錫多寡之法築氏執下齊多錫為下齊築氏為削則用錫為多齊去聲下同冶氏執上齊少錫為上齊冶氏為戈㦸則用錫為少鳬氏為聲鐘錞之屬㮚氏為量斗斛之屬量去聲段氏為鏄器錢鏄之屬桃氏為刄刃劍之屬金有六齊用錫和金其齊有六六分其金而錫居一金五分錫一分共六分謂之鍾鼎之齊鍾以擊鼎以烹比之斧斤則用錫為差少五分其金而錫居一金四分錫一分共五分謂之斧斤之齊斧以伐斤以削比之鍾鼎則用錫為差少四分其金而錫居一金三分錫一分共四分謂之戈㦸之齊戈㦸皆用以擊刺防其挫折故比之斧斤則用錫為多也以上三者皆上齊也三分其金而錫居一金二分錫一分共三分謂之大刄之齊大刄以施之斬伐防其易虧比之戈㦸則用錫尤多五分其金而錫居二金三分錫二分共五分謂之削殺矢之齊削書刀也用以削書殺矢箭也用以田獵皆欲其堅忍不脆比之大刄則用錫又多金錫半金一半錫一半謂之鑒燧之齊鑒取水於月燧取火於日皆以潔白為上故金錫半之以上三者皆下齊也築氏為削書刀也刋竹簡用之長尺博寸削之制長與大合六而成規其形容大成規欲新而無窮常欲其如新發之於硎用之不窮敝盡而無惡雖至敝終無頓缺之患冶氏為殺矢刄長寸圍寸鋌十之重三垸戈廣二寸内倍之胡三之援四之已倨則不入已句則不決長内則折前短内則不疾是故倨句外愽重二鋝㦸廣寸有半寸内三之胡四之援五之倨句中矩與刺重三鋝桃氏為劒劒工謂之桃氏以能辟除不祥故也臘廣二寸有半寸兩從半之以其臘廣為之莖圍長倍之中其莖設其後參分其臘廣去一以為首廣而圍之身長五其莖長手所握者謂之莖其長五寸劍身長五倍於莖則共長三尺也臘納重九鋝一鋝重六兩半有零九鋝則重六十兩也鋝劣謂之上制此劍之上等上士服之勇士之上者能用之身長四其莖長共長二尺五寸重七鋝重四十六兩有餘謂之中制此劍之中等中士服之勇士之中者能用之身長三其莖長共長二尺重五鋝重三十兩有餘謂之下制此劍之下等下士服之勇士之下者能用之鳬氏為鍾鳬入氷不溺以名鍾工取其虚浮之義兩灓謂之銑銑間謂之于于上謂之鼓鼔上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡鍾縣謂之旋旋蟲謂之幹鍾帶謂之間謂之枚枚謂之景于上之攠謂之隧十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞修去二分以為舞廣以其鉦音正之長為之甬長以其甬長為之圍參分其圍去一以為衡圍參分其甬長二在上一在下以設其旋薄厚之所震動薄厚不得其宜則震動不得中清濁之所由出聲之清濁出於此侈弇之所由興口之侈弇起於此有説當推其弊之所由出説始鋭反鍾已厚則石其聲不出已薄則播聲散侈則柞形大則聲迫窄柞側百反弇則鬱形小則聲鬱而不散長甬則震甬鍾柄也甬長則震而不定甬音勇是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚鍾大而短鍾形大則宜長而失於短則其聲疾而短聞疾急也短聞者聲易竭也聞問鍾小而長鍾形小則宜短而失於長則其聲舒而逺聞舒緩也逺聞謂聲難息也為遂六分其厚以其一為之深而圜之㮚氏為量㮚與栗同以名量工取其堅實之義改煎金錫則不耗量則鍾鼎之齊必煉之使精而無減耗然後可用也不耗然後權之權稱錘也權之所以眡其輕重之齊也權之然後準之準取法於水也準之所以眡其髙下之平也準之然後量之量之以黍所以眡其多寡之均也量之以為鬴一鬴容六斗四升鬴音父深尺其深一尺内方尺而圜其外内方一尺而外圜象天包地外也其實鬴四豆為區四區為鬴其臋一寸臋厚一寸臋豚其實一豆四升為豆其耳三寸耳廣三寸其實一升四龠為合四合為升重一鈞重三十斤其聲中黄鍾之宫黄鍾律長九寸上下損益生十二律五聲之中宫聲為君量之聲應之也中去聲槩而不税用槩所以為平也不征其税所以為公也其銘曰刻於量上以銘之其辭如下文所云時文思索時是也惟是文徳之君思索以求其理允臻其極允信也極中也作為比量使天下取信而至於中也嘉量既成量成而名之曰嘉所以一天下之法而極其美也以觀四國其法度之器可以觀示四方之國也觀音貫永啓厥後永乆開啓其後世子孫茲器維則使後世惟以此器為法則也凡鑄金之狀金與錫黒濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄也段氏闕函人為甲包函不至傷人掌為甲犀甲七屬以犀皮次叙聨屬其甲屬謂上旅下旅相績之數屬音注兕甲六屬以兕牛皮貫甲合甲五屬合犀兕之革貫甲尤堅犀甲夀百年兕甲夀二百年合甲夀三百年革堅者用愈乆凡為甲必先為容容象式也然後制革權其上旅與其下旅而重若一以其長為之圍凡甲鍛不摯則不堅已敝則橈凡察革之道眡其鑚空欲其惌也眡其裏欲其易也眡其朕欲其直也􅐤之欲其約也舉而眡之欲其豐也衣之欲其無齘也眡其鑚空而惌則革堅也眡其裏而易則材更也眡其朕而直則制善也􅐤之而約則周也舉之而豐則明也衣之無齘則變也鮑人之事望而眡之欲其荼白也進而握之欲其柔而滑也卷而搏之欲其無迆也眡其著欲其淺也察其線欲其藏也革欲其荼白而疾澣之則堅欲其柔滑而腛脂之則需引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以愽為帴也卷而博之而不迆則厚薄序也眡其著而淺則革信也察其線而藏則雖敝不甐韗人為皋陶韗人為鼔皋陶以木為之鼔之匡也韗運陶逃長六尺有六寸左右端廣六寸中尺厚三寸穹者二之一上三正鼓長八尺鼓四尺中圍加三之一謂之鼖鼔為皋鼓長尋有四尺鼓四尺倨句磬折凡冐鼓必以啓蟄之曰驚蟄日冐鼔冐象也良鼓瑕如積環其用革之調急隨皋陶之周圍若環之圓鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞義與鳬氏為鍾同聞音問韋氏闕裘氏闕畫繢之事模成物體謂之畫分布五色謂之繢雜五色東方謂之青南方謂之赤西方謂之白北方謂之黒天謂之𤣥地謂之黄青與白相次也赤與黒相次也𤣥與黄相次也赤與青謂之文東方青色與南方赤色相雜名之曰文赤與白謂之章南方赤色與西方白色相雜名之曰章白與黒謂之黼黼為斧形取其斷以西方白色與北方黒色相雜為之黼音甫黒與青謂之黻黻為兩已相背取其辨也以北方黒色與東方青色相雜為之黻紱五采備謂之繡繡刺繡也備青黄赤白黒之色土以黄其象方天時變火以圜山以章水以龍鳥獸虵雜四時五色之位以章之謂之巧凡畫繢之事後素功謂後於素功也蓋先以粉地為質而後可施以五采也記曰甘受和白受采孔子曰繪事後素此之謂也鍾氏鍾重也染色欲深重染羽羽所以飾旌旗及王后之車以朱湛丹秫湛漬漸也丹秫赤栗也取汁染明湛子潜反三月而熾之熾炊也淳而漬之漬染也三入為纁五入為緅七入為緇三染為纁謂染朱黒色五染赤汁及黒色為緅七入染汁為黒白緇緅側留反筐人闕㡛氏治絲帛而練熟之為㡛㡛音芒湅絲以涗水涗水灰水也涷音練涗書銳反漚其絲七日漚鳥豆反漸也去地尺暴之暴步卜反晝暴諸日夜宿諸井七日七夜是謂水湅此涷絲之法度湅白以欄為灰渥淳其帛實諸澤器淫之以蜃清其灰而盝之而揮之而沃之而盝之而塗之而宿之明日沃而盝之晝暴諸日夜宿諸井七日七夜是謂水涷周禮句解卷十一
