body:
  text: 周禮句解卷五宋朱申撰春官宗伯第三象春所立之官宗尊也伯長也宗伯典禮以事神為主不言司者明祭祀鬼神非人所司也春官宗伯上惟王建國辨方正位體國經野設官分職以為民極天官冡宰注乃立春官宗伯建立春官宗伯之職使帥其屬而掌邦禮邦禮即六典之禮典也春官其屬六十宗伯帥之而掌邦禮焉以佐王和邦國禮之用和為貴故以佐助天子而和邦國也大宗伯之職卿一人小宗伯中大夫二人作宗伯主禮之官故帝舜命伯夷汝秩宗掌建邦之天神人鬼地示之禮建立祀天神祭地示享人鬼之三禮示祗以佐王建保邦國封國頒祀此之謂建邦國祭則受福此之謂保邦國以吉禮事邦國之鬼神示吉禮凡十二條見下文事謂祀祭享也以禋祀祀昊天上帝禋祀取精意以享之義上帝者天之主宰也冬日至於圜丘祀之以實柴祀日月星辰實柴者實牲於柴而燔之也星謂五星辰謂日月所會十二次以槱燎祀司中司命觀師雨師槱燎謂燔柴而不實以牲也司中司命文昌第五第四星也風師箕也雨師畢也此三者所以祀天神飌古風字以血祭祭社稷五祀五嶽血祭者貴氣臭也社土神稷穀神五祀者門户竈行中霤也五嶽者東曰泰山南曰衡山西曰華山北曰恆山中曰嵩山以貍沈祭山林川澤祭山林曰貍謂藏諸地也祭川澤曰沈謂置諸水也貍埋以疈辜祭四方百物疈者肆而磔之辜者制而磔之四方百物即蠟祭也此三者所以祭地示疈孚逼反以肆獻祼享先王肆者進所解牲體謂薦熟也獻者獻醴謂薦腥也祼者灌以鬱鬯謂獻尸求神也以饋食享先王饋食言有黍稷也祭先灌次獻腥次獻熟次饋食凡祭皆然互相備也以祠春享先王春物生未有以享故曰祠以禴夏享先王夏陽盛以樂為主故曰禴以嘗秋享先王秋物成可嘗故曰嘗以蒸冬享先王冬庶物盛多故曰蒸此六者所以享人鬼以凶禮哀邦國之憂凶禮凡五條哀謂救患分災也以喪禮哀死亡死以氣言亡以形言喪禮則有賻賵之類以荒禮哀凶札凶謂歲歉札謂民病荒札則有散利之類以弔禮哀禍災禍與福乖災與祥違弔禮則有慰問之類以禬禮哀圍敗圍謂國受圍敗謂兵敗績禬禮則會其財物以補之以恤禮哀冦亂兵作於外為冦作於內曰亂恤禮則出其兵師以救之也以賓禮親邦國賓禮凡八條親謂使之相親附也春見曰朝朝猶朝也欲其來之早夏見曰宗宗尊也欲其尊王秋見曰覲覲猶勤也欲其勤於王事冬見曰遇遇偶也欲其不期而皆至時見曰會時見者言無常期王將有征討為壇於國外會諸侯而命事焉殷見曰同殷猶衆也王十二年不巡狩則六服盡朝王亦為壇而命以政焉時聘曰問時聘亦無常期天子有事乃聘之焉殷眺曰視殷眺謂一服朝之歲以朝者少諸侯乃使卿以大禮衆聘焉以軍禮同邦國軍禮凡五條同謂使諸侯和同不僣差也大師之禮用衆也以征伐為主所以用其命也大均之禮恤衆也以土地人民為主所以恤其事也大田之禮簡衆也以教戰為主所以簡其能也大役之禮任衆也以築作為主所以任其力也大封之禮合衆也以建國為主所以合其民也以嘉禮親萬民嘉禮凡六條獨此言萬民者通上下言之以飲食之禮親宗族兄弟人民有合宗族飲食之禮所以親親也以婚冠之禮親成男女婚姻之禮所以親男女冠笄之禮所以成男女以賓射之禮親故舊朋友射禮雖王亦立賓主王之故舊朋友蓋為世子時共在學者以饗燕之禮親四方之賓客饗有體薦燕有折俎賓客謂朝聘者以脤膰之禮親兄弟之國脤膰胙肉也分賜同姓之國同福祿也脤矧以賀慶之禮親異姓之國因其喜而賀慶之也以九儀之命正邦國之位九等之命各異其儀所以正其位之貴賤也一命受職王之下士與公侯伯之士子男之大夫皆一命而授以所任之職再命受服王之中士與公侯伯之大夫子男之卿皆再命而授以所位之服三命受位王之上士與公侯伯之卿皆三命而授之以位使之臨民四命受器王之大夫與公之孤皆四命而授以祭器五命賜則則法也王之大夫五命則賜以畿內之都鄙六命賜官王之卿六命封為子男則許之建官以治家邑七命賜國王之卿出封則加一命始為諸侯建牧立軍八命作牧諸侯有功德則受八命為九州牧九命作伯王之上公或諸侯有功德則受九命為方伯得專征伐也以玉作六瑞四圭兩璧為六瑞皆以玉而作之以等邦國辨其等級王執鎮圭以四鎮之山為瑑飾取其鎮安四方也公執桓圭雙植曰桓取其強直有立也侯執信圭信象人形而直其身取其尊而不屈也信伸伯執躬圭躬象人形而罄折其身取其卑而不倨也子執穀璧瑑穀於璧取其能養人也男執蒲璧蒲可為席瑑蒲於璧取其能安人也以禽作六摯摯之為言至也所執以自至也以等諸臣辨其等級孤執皮帛束帛而加以皮天子之孤以虎皮取其文炳也公之孤以豹皮取其文蔚也卿執羔羔小羊取其羣而不失其類也大夫執鴈取其候時順隂陽也士執雉取其有文采而守介也庶人執鶩取其不飛遷也工商執雞取其守時而動也以玉作六器六等禮神之器皆以玉為之以禮天地四方以禮天神地示及四方之帝以蒼璧禮天璧圜以象天之形其色蒼則以象天之色也以黃琮禮地琮方以象地之形其色黃則以象地之色也以青圭禮東方東方其帝大皡圭形鋭以象出震生物其色青則以象木色也以赤璋禮南方南方其帝炎帝半圭曰璋赤璋者以象相見乎離與火之色也以白琥禮西方西方其帝少皥琥瑑為虎形取其威猛肅物白則金之色也以玄璜禮北方北方其帝顓帝半璧曰璜象物藏於黃泉之宫玄則水之色也璜黃皆有牲幣言禮天地四方皆有犧牲幣帛而以六器為主各放其器之色所用牲幣各依六器之色以天産作隂德性出於天故曰天産人生而靜靜則屬隂故天産所以作隂德以中禮防之禮中也性則喜怒哀樂之未發故以中禮而防其性以地産作陽德情感於物故曰地産感物而動動則屬陽故地産所以作陽德以和樂防之樂和也情既動則恐其發不中節故以和樂而防其情以禮樂合天地之化百物之産百物稟氣於天賦形於地而禮樂本天地中和之理故皆有以合之以事鬼神天地祖宗無不感格以諧萬民閨門族黨無不和順以致百物飛潛動植無不得宜凡祀大神享大鬼祭大示天神地示人鬼此三者為至大帥執事而卜日執事謂有職於祭者宿眂滌濯卜既得日則齊宿而臨視洗滌祭器涖玉鬯涖臨也玉禮神之玉也鬯鬱酒也省牲鑊省視也鑊所以烹祭牲也奉玉齍玉飭簠簋以薦齍盛祭則奉之詔大號六號見大祝大號六號之大者詔之為祝辭也治其大禮紀綱祀享祭之三大禮也詔相王之大禮凡王所躬行者則預詔之及行禮則相之若王不與祭祀或有故而不得親與則攝位大宗伯則代王行其祭祀大賓客則攝而載果載為也果祼也代王酌獻於賓客朝覲會同則為上相入詔禮曰相王接諸侯宗伯為上相王命諸侯則擯王者䇿命諸侯擯進也進接諸侯使進王大封大封建諸侯則先告后土后土社也告之以立國之義乃頒祀于邦國都家鄉邑頒布祀典之禮於內外分封采地之主使之知禮神之節小宗伯之職中大夫二人二大宗伯之副掌建國之神位建立也神位如下文所云右社稷地道尚右故建社稷於國之右左宗廟人道尚左故建宗廟於國之左兆五帝於四郊兆為之營域也太皥於東郊炎帝黃帝於南郊少皥於西郊顓帝於北郊四望四類亦如之四望謂五嶽四瀆四鎮四竇以望而祭之者四類謂日月星辰以氣類為之位者亦為兆於四郊也兆山川丘陵墳衍各因其方山川丘陵墳衍民所取財用者為兆各因其方順其所在也掌五禮之禁令與其用等五禮吉凶軍賓嘉有禁之使不敢用者有令之使不敢廢者用等謂牲器尊卑之差等也辨廟祧之昭穆祧謂遷主所藏之室也天子七廟三昭三穆與大祖之廟而七辨吉凶之五服吉之五服謂在內王及公卿大夫士在外公侯伯子男也凶之五服謂斬衰齊衰大功小功緦麻也車旗宫室之禁禁者典命所謂各視其命之數是也詳見典命掌三族之别三族者上親父下親子併已為三也以辨親疏以父親祖以祖親曽高以子親孫以孫親曽玄是為九族也九族之中三族為親餘族皆疏也其正室皆謂之門子謂宗嫡也以其當室故謂之正室以其當門故謂之門子掌其政令掌糾宗合族之政令毛六牲擇其毛也辨其名物辨六牲之名號與其物色而頒之于五官司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕使共奉之五官各以所主而共奉祭事辨六齍之名物與其用六齍謂黍稷稻粱麥苽以供粢盛也所用不同故與名物各辨之使六宫之人共奉之以黍稷簠簋乃婦人共奉之事也辨六彛之名物雞彛鳥彛斚彛黃彛虎彛蜼彛以待果將當祼獻之時將瓚以祼也辨六尊之名物獻尊壺尊象尊著尊大尊山尊以待祭祀賓客祭祀賓客皆用之也掌衣服車旗宫室之賞賜三者或以有功而賞或以私恩而賜掌四時祭祀之序事與其禮四時祭祀其事則有先後之序其禮則有隆殺之别若國大貞若卜立君卜大封之類則奉玉帛以詔號奉玉帛以禮神詔大祝之六號大祭祀省牲充人繫牲小宗伯省之眂滌濯執事者滌濯祭器小宗伯視之祭之日逆齍饎人供粢盛小宗伯逆之省鑊烹人烹牲小宗伯省之告時于王告以祭祀之時告備于王告以祭祀之備凡祭祀賓客以時將瓚果將送也瓚果謂以圭瓚盛鬱鬯而祼之也祭祀以時奉而授王賓客以時而授宗伯詔相祭祀之小禮祭祀小禮未祭則詔之既祭則相之凡大禮大祭禮佐大宗伯詔相大禮者大宗伯也小宗伯則佐之而已賜卿大夫士爵則儐小祭祀掌事如大宗伯之禮大賓客諸侯來朝受其將幣之齎受其齎來貢獻之財物齎躋若大師大起軍旅則帥有司而立軍社出軍則先有事於社立軍社立其主也奉主車以車載木主而奉以行若軍將有事將有征伐之事則與祭有司將事于四望小宗伯與祭有司大祝等祭四望之神以求福與預若大甸大田獵則帥有司而饁獸于郊有司謂司馬之屬饁饋也謂以獸而饋四方之神也遂頒禽既祭乃頒禽以與羣臣大災及執事禱祠于上下神示王崩大肆以秬鬯渳及執事涖大斂小斂帥其異族而佐縣衰冠之式于路門之外及執事視葬獻器遂哭之卜葬兆甫竁亦如之既葬詔相喪祭之禮成葬而祭墓為位凡王之會同軍旅甸役之禱祠大事祈禱於神以求福肄儀為位肄習威儀必設神位國有禍災則亦如之凡天地之大災類社稷宗廟則為位凡國之大禮禮之大者佐大宗伯從長也凡小禮儀禮之末如宗伯之儀儀文也肆師之職下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人之肆陳也佐宗伯陳列祭祀禮掌立國祀之禮神位既定然後祭祀之禮可立以佐大宗伯大宗伯行禮肆師則佐助之立大祀用玉帛牲牷大祀天地宗廟也玉如蒼璧黃琮之類帛幣也牷謂純色之牲立次祀用牲幣次祀日月星社稷五祀五嶽也止用牲幣而無玉立小祀用牲小祀司中司命風師雨師山川百物之神也止用牲而無幣以歲時序其祭祀每歲四時祭祀定其後先之序及其祈珥祈珥釁血之事也求福曰祈止災曰珥祈巨既珥餌大祭祀展犧牲展閲也謂視其牲之全者繫于牢牢間也所以繫牲頒于職人職人謂充人及監門人頒之使養之也凡祭祀之卜日卜祭祀之吉凶宿為期卜前之夕詔相其禮詔之以言相之以力眂滌濯亦如之亦詔相其禮也祭之日表齍盛告潔盛六穀於簠簋而表識之及告潔淨也展器陳告備陳祭祀而展閲之又告備具也及果築煮築香草而煮以為鬯用以祼將也果音祼煮煮也相治小禮羣臣行禮則相治之誅其怠慢者執事懈怠惰慢則誅責之掌兆中廟中之禁令兆四郊神位也廟七廟也掌其禁令不得侵犯也凡祭祀禮成則告事畢祭祀行禮既成則告王以事畢大賓客涖筵几築煮贊果將大朝覲佐儐共設匪甕之禮饗食授祭與祝侯禳于疆及郊大喪大渳以鬯則築煮令外內命婦序哭禁外內命男女之衰不中法者且授之杖凡師甸軍旅田獵用牲于社宗則為位社軍社也宗遷主也用牲以祭則設神位類造上帝類造皆祭名聚其神謂之類至其所謂之造封于大神封謂壇也大神社及方鎮也祭兵于山川兵所過之山川皆有祭亦如之兵有用牲皆設神位凡師不功則助牽主車凡四時之大甸獵春搜夏苗秋獮冬狩祭表貉則為位貉師祭也於所立表之處祭日則設神位貉罵嘗之日秋祭曰嘗涖卜來歲之芟涖臨也芟草除田農功之始也故卜之獮之日秋田曰獮獮息淺反涖卜來歲之戒用戒不虞恐為農功之害也故卜之社之日秋社祭之涖卜來歲之稼稼為農功之成也此三者皆卜人卜之而肆師涖之若國有大故則令國人祭歲時之祭祀亦如之凡卿大夫之喪相其禮凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮鬱人下士二人府二人史一人徒八人鬱金香草宜以和鬯掌祼器謂彛及舟與瓚凡祭祀賓客之祼事祭祀賓客皆有祼將之事和鬱鬯以實彛而陳之用香草和鬯人之鬯乃實之於六彛而陳列之凡祼玉王用圭瓚后用璋瓚濯之陳之濯之所以致潔陳之所以待用以贊祼事贊助祼將之事詔祼將之儀與其節儀謂奉王送祼之儀節謂行事早晚之節凡裸事沃盥大喪之渳共其肆器及葬共其祼器遂貍之大祭祀與量人受舉斚之卒爵而飲之鬯人官屬如鬱人暢釀秬為酒其氣條也掌共秬鬯而飾之秬鬯謂不和鬱者飭之謂設巾也凡祭祀大凡祭祀用鬯之器社壝有大罍社土神也壝為壇以祭也大罍瓦罍也禜門用瓢齎禜門禜祭于國門也瓢齎謂取甘瓠割去蒂以齎為尊也禜詠廟用修修讀為卣謂中尊也宗廟之祭用之凡山川四方用蜃蜃謂刻蜃形於尊也祭山川四方之神則用之凡祼事用概概尊謂以朱帶絡腹也凡祼將之事皆用之凡疈事用散疈謂磔牲胸以祭也尊無飾謂之散大喪之大渳設斗共其釁鬯凡王之齊事共其秬鬯凡王弔臨共介鬯雞人下士一人史一人徒四人雞屬木故列職于春官掌共雞牲用雞為牲則共之辨其物辨其毛色大祭祀夜呼旦以嘂百官夜漏未盡之時呼旦以警起百官使夙興也呼火吳反嘂呌凡國之大賓客會同軍旅喪紀亦如之四者皆夜呼旦以叫百官凡國事為期所作謂之事期謂作事之時則告之時以雞能知時故使之告其時凡祭祀面禳釁面四面也禳以却禍災釁以厭妖怪釁讀作徽共其雞牲二者用雞牲則共之司尊彛下士二人府四人史二人胥二人徒二十人尊以盛酒彛以盛鬯掌六尊六彛之位六尊獻尊之屬六彛雞彛之屬位謂所陳之位詔其酌詔告也尊酌以獻彛酌以祼辨其用與其實用謂四時祭祀之用實謂尊彛所盛之實皆當辨之春祠夏禴春祭曰祀夏祭曰禴祼用雞彛鳥彛謂刻而畫雞鳯凰之形於彛也二彛皆實以鬱鬯以待祼將王以圭瓚酌雞彛之鬯為一獻后以璋瓚酌鳥彛之鬯為二獻皆有舟舟所以薦彛也其朝踐用兩獻尊朝踐即朝獻也曰踐者言籩豆有踐也獻讀為羲羲尊者飾以翡翠也尊必兩者一實醴齊王酌以為三獻二實緹齊后酌以為四獻其再獻用兩象尊再獻饋獻也以序言之故曰再獻象尊者飾以象骨也尊必兩者一實盎齊王酌以為五獻一實緹齊后酌以為六獻王之七獻則犧尊之醴齊后之八獻則象尊之盎齊也皆有罍罍所以副二其尊也諸臣之所昨也昨與酢同蓋諸臣酌於罍以為九獻也不言獻者避王后故曰昨也秋嘗冬蒸秋祭曰嘗冬祭曰蒸祼用斚彛黃彛斚彛畫禾稼也黃彛黃目尊也餘並同上皆有舟同上其朝獻用兩著尊曰獻者言其獻齊酒之物也著尊者著地無足也餘並同上其饋獻用兩壺尊曰饋者主齊酒而言之也壺尊者以壺為尊也餘並同上皆有罍諸臣之所昨也並同春祠夏禴凡四時之間祀追享朝享追享謂夏四月禘祭朝享謂冬十月之祫祭以其間於四時故曰間祀祼用虎彛蜼彛謂畫虎蜼之形於彛也蜼猴屬也餘並同上蜼以水皆有舟其朝踐用兩大尊大尊大古之瓦尊餘並同上其再獻用兩山尊山尊畫山雲於尊也餘並同上皆有罍諸臣之所昨也並同春祠夏禴凡六彛六尊之酌凡言酌者謂皆泲之使可酌也鬱齊獻酌祼用鬱齊則酌以獻之而已獻音莎醴齊縮酌朝踐用醴齊則以手縮之而後酌也盎齊涗酌饋獻用盎齊則以酒涗之而後酌也凡酒修酌諸臣之昨用凡酒則滌治而後酌也修直歷切大喪存奠彛大旅亦如之司几筵下士二人府二人史一人徒八人者几所慿以為安者筵鋪於地以為位掌五几五席之名物五几玉雕漆素􅊮五席莞藻次蒲熊也名以命之物以色之辨其用與其位用謂所設之席位謂所設之地凡大朝覲大饗射大朝覲謂非四時常朝也大饗謂王與諸侯行饗禮於廟也大射謂王將祭祀擇士而射也凡封國命諸侯謂王之公卿出封加一等也王位設黼依扆之制如屏風設黼於其上蓋以白黑文為斧形也黼音甫依上聲依前南鄉取向明之義也鄉去聲音嚮設莞筵紛純莞蒲之細者紛白繡也純緣也蓋以莞為席而緣以紛也莞官純準加繅席畫純加謂加於上也繅謂編以五綵也畫謂雲氣也繅音藻加次席黼純次席謂以次列成文者黼純謂畫黼以為純也左右玉几以玉飾几設於左右祀先王昨席亦如之祀先王於宗廟王獻尸尸酢王王所受酢之席亦如上三種席也諸侯祭祀席諸侯祭祀所設之席蒲筵繢純以蒲草為筵畫繢彩色以為純加莞席紛純説見上注右雕几雕刻為飾而設之於右昨席莞筵紛純加繅席畫純説並見上筵國賓于牖前亦如之諸侯來朝為之設筵于牖前亦用上二種席也左􅊮几丹色為飾而設於左甸役則設熊席王之甸獵有司祭表貉所設席以熊皮為飾右漆几以漆為飾而設於右凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几凡吉事變几凶事仍几天府上士一人中士二人府四人史一人胥二人徒二十人府庫藏也以天為言尊之也掌祖廟之守藏與其禁令太祖之廟其所守有人所藏有物禁使勿為令使用之守狩若有大祭大喪則出而陳之示其能傳所寶也既事藏之示其能守所傳也几官府鄉州及都鄙之治中治中謂計治之文書也曰中者三者之治各於此取中也中去聲受而藏之受於官府州鄉都鄙而藏之於天府以詔王察羣吏之治以詔於王而察吏治之出於中者上春孟春釁寶鎮及寶器實鎮即上文玉鎮也釁者殺牲而塗之以血也凡吉凶之事吉事祭禮凶事喪禮祖廟之中祭祀則行事於祖廟喪葬則朝於祖廟季冬陳玉所以禮神以貞來歲之媺惡貞問也蓋卜筮而問來年之吉凶也媺美若遷寶則奉之王者遷都則寶亦遷奉猶送也若祭天之司民司祿司民軒轅角也司祿文昌第六星也而獻民數穀數祭司民然後獻民數祭司祿然後獻穀數則受而藏之受民數穀數之籍而藏於天府典瑞中士二人府二人史二人胥四人徒十人主瑞玉之官掌玉瑞玉器之藏執於人曰瑞若鎮圭之等是也禮於神曰器若四圭之等是也辨其名物與其用事名以命之物以色之用事如朝聘朝日祭祀之類也設其服飾謂王之繅藉若人衣服之飾也王晉大圭執鎮圭大圭朴素無文鎮圭瑑四鎮之山晉則服之執則手執之也繅藉五彩五就繅謂織組為藻飾以藉玉也備五色為五彩一匝為一就以朝日春分日拜日於東門外用此圭也公執桓圭侯執信圭伯執躬圭並見大宗伯注信伸繅皆三彩三就三彩朱白蒼也子執穀璧男執蒲璧並見大宗伯注繅皆二彩再就二彩朱緑也以朝覲宗遇會同于王春見曰朝秋見曰覲夏見曰宗冬見曰遇時見曰會殷見曰同諸侯相見亦如之亦用此六等玉瑑圭璋璧琮瑑刻也圭鋭璧員半圭曰璋半璧曰琮瑑音繅皆二彩一就朱緑共成一匝以眺聘大夫衆來曰眺寡來曰聘四圭有邸以璧為邸宿之邸而圭出於四旁邸抵以祀天旅上帝祀天謂郊祀於員丘旅上帝謂祀五帝及衆神兩圭有邸以琮為邸而圭出於兩旁以祀地旅四望祀地於方丘旅四望謂祀嶽瀆及衆神祼圭有瓚於圭頭為器名之曰瓚用以祼鬯以肆先王如宗伯六享是也以祼賓客如大行人再祼上公一祼侯伯之類是也圭璧圭其邸為璧以祀日月星辰朝日以大圭鎮圭而祀日月星辰以圭璧者朝禮與祀禮異也璋邸射半圭曰璋邸托於琮謂貫而射之於琮也射石以祀山川如宗伯兆山川丘陵各因其方是也以造贈賓客謂致稍餼之時造館贈之也造去聲土圭量日景之圭以致四時日月冬夏致日春秋致月而測其景之長短封國則以土地建國封諸侯則以測日景而制其地域所封珍圭王使執之以為瑞節珍當為鎮以徴守徵召守國諸侯守狩以恤凶荒執此以開府庫而賑救之牙璋瑑其璋為齒牙之象以起軍旅出征則以起軍旅而討其罪以治兵守守國則以治兵守而防患難璧羡璧圜九寸其羡而長之則盈尺羡似面反以起度分寸尺丈由此而生駔圭璋璧琮琥璜之渠眉駔與組同渠眉謂玉飾之溝瑑也蓋以組穿聯六玉溝瑑之中也疏璧琮取其通於天地以斂尸圭在左璋在首琥在右璜在足璧在背琮在腹穀圭瑑如穀璧之文以和難王遣使以和諸侯之難以聘女聘女以納幣二者皆致其信善之實也琬圭琬圭琰圭皆王使之瑞節琬圭則無鋒芒以治德諸侯有德於下民則以此治而旌之也以結好諸侯和好於鄰國則以此結而固之也琰圭琰其上使有鋒芒以易行諸侯之行違乎正者以此易之使為善也以除慝諸侯之慝不可赦者以此除之去其惡也大祭祀大旅大祭祀謂大神示先王也大旅謂上帝四望也凡賓客之事諸侯來朝行燕享之禮共其玉器而奉之共其物而奉其事也大喪共飯玉含玉贈玉凡玉器出則共奉之典命官屬如典瑞之主王遷秩羣臣書掌諸侯之五儀公侯伯子男之儀諸臣之五等之命公之孤以下四命三命再命一命不命也上公九命為伯王之三公有德者加命為二伯其國家宫室車旗衣服禮儀皆以九為節其國之城方九里宫方九百步車九乘旗九斿冕服九章與夫禮文儀物皆以九為數也侯伯七命侯伯之爵七命其國家宫室車旗衣服禮儀皆以七為節降上公二等也子男五命子男之爵五命其國家宫室車旗衣服禮儀皆以五為節降侯伯二等也王之三公八命此以未出封者言其卿六命降於三公二等其大夫四命降於卿二等及其出封皆加一等三公九卿七命大夫五命其國家宫室車旗衣服禮儀亦如之三公以八為節卿以六為節大夫以四為節出封則各加一等凡諸侯之適子誓於天子適子謂當立者誓謂天子命之以為嗣也攝其君攝君以行朝會之禮則下其君之禮一等上公之子八命侯伯之子六命子男之子四命未誓則以皮帛繼子男天子未命為嗣則執皮帛而繼子男之後公之孤四命上公九命則其臣不得等其君命之半故其孤四命而已以皮帛眂小國之君其卿三命公之卿也其大夫再命公之大夫也其士一命公之士也其宫室車旗衣服禮儀各眂其命之數如四命則以四為節之類侯伯之卿大夫士亦如之與上公同但不立孤子男之卿再命降於公侯伯一等其大夫一命子男之大夫也其士不命子男之士也其宫室車旗衣服禮儀各眂其命之數如再命則以二為節之類司服中士二人府二人史一人胥一人徒十人已得命則賜服故次於典命之下掌王之吉凶衣服吉祭服也凶喪服也辨其名物與其用事名以命之物以色之用事如祀昊天上帝之類王之吉服此下言祭祀之服祀昊天上帝祀於圜丘則服大裘而冕大裘黑裘也內服大裘外服衮衣冕冠也其制後方前圜玄表朱裹祀五帝亦如之祀於四郊則服大裘而冕享先王則衮冕享先王於宗廟則服衮衣九章一曰龍二曰山三曰華蟲四曰火五曰宗彛皆繪之於衣六曰藻七曰粉米八曰黼九曰黻皆繡之於裳享先公饗射則鷩冕享先公謂后稷之後大王之前與享食賓射之禮鷩謂華蟲以下其衣三章其裳四章鷩鱉祀四望山川則毳冕望祀四方名山大川也毳謂宗彛以下其衣三章其裳四章祭社稷五祀則希冕社土神稷榖神五祀門户竈行中霤也希但刺粉米以下無畫也其衣一章其裳一章希注改作絺祭羣小祀則玄冕羣小祀謂林澤墳衍四方百物之屬也玄者衣無文裳刺黼而已几兵事韋辨服韋謂革之熟者辨冠也其服用十五升白布積素以為裳王以為兵事之服眂朝則皮辨服衣裳與韋辨同但以鹿皮為辨也王以為視朝之服凡甸冠辨服冠辨委貌也其服緇布衣亦積素以為裳王以為甸獵之服凡凶事服辨服凡弔事辨絰服凡喪為大王斬衰為王后齊衰王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆辨絰大札大荒大災素服公之服九命之服自衮冕而下如王之服其服九章侯伯之服七命之服自鷩冕而下如公之服其服七章子男之服五命之服自毳冕而下如侯伯之服其服五章孤之服公之孤四命之服自希冕而下如子男之服其服二章卿大夫之服公侯之卿三命其大夫再命子男之卿亦再命自玄冕而下如孤之服其服一章其凶服加以大功小功士之服自皮辨而下如大夫之服其凶服亦如之其齊服有玄端素端凡大祭祀大賓客共其衣服而奉之各共奉上之衣服而用之大喪共其復衣服斂衣服奠衣服廞衣服皆掌其陳序典祀中士二人下士四人府二人史二人胥四人徒四十人主國外之祀掌外祀之兆守外祀在四郊兆為之壇也守守其兆也皆有域域塋也掌其禁令禁其不敢為令其所當為若以時祭祀每歲以時祀于四郊則帥其屬而修除帥其胥徒而修其廢壞除其草萊徴役于司𨽻而役之徴召也司𨽻掌徒𨽻之官也謂以司𨽻主衆𨽻而供役也及祭帥其屬而守其厲禁帥胥徒為蕃厲禁止之地而蹕之止行人也守祧奄八人女祧每廟二人奚四人逺廟為祧親盡則遷主而藏焉掌守先王先公之廟祧先王之主藏於文武之廟先公之主藏於后稷之廟守祧守之其遺衣服藏焉先王先公大斂之餘衣服亦藏於此若將祭祀則各以其服授尸其廟則有司修除之其祧則守祧黝琧之既祭則藏其隋與其服世婦每宫卿二人下大夫四人中士八人以宫中之女卿大夫士為之掌女宫之宿戒女宫謂刑女給宫役者宿戒謂前期齊戒也及祭祀當祭祀之時比其具比次也具謂所濯溉及粢盛也比鼻又音庇詔王后之禮事詔告也禮事謂祼獻薦徹之節也帥六宫之人共齍盛六宫之人謂世婦女御也黍稷曰齍在器曰盛相外內宗之禮事外內宗謂女之有爵者后之禮事則以言詔之外內宗之禮事則以力相之大賓客之饗食亦如之賓客饗食后有亞祼亞獻之禮外內宗佐之而世婦相之也大喪比外內命婦之朝莫哭不敬者而苛罰之凡王后有􅉔事於婦人則詔相凡內事有達於外官者世婦掌之內宗凡內女之有爵者者王同姓之女凡有爵掌宗廟之祭祀當祭祀時薦加豆籩薦加豆加籩以象饋食之有加也及以樂徹祭畢奏樂而徹則佐傳豆籩后徹傳之內宗又遞傳之外宗有司也賓客之饗食亦如之徹豆籩亦如祭祀也王后有事則從大喪序哭者哭諸侯亦如之凡卿大夫之喪掌其弔臨外宗凡外女之有爵者爵王姑姊妹之女凡有者掌宗廟之祭祀當祭祀時佐王后薦玉豆眂豆籩王之豆籩皆飾以玉視豆籩者視其實也及以樂徹亦如之亦佐后也又為內宗佐傳也王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯小祭祀掌事賓客之事亦如之大喪則敘外內朝莫哭者哭諸侯亦如之冢人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族凡死於兵者不入兆域凡有功者居前以爵等為丘封之度與其樹數大喪既有日請度甫竁遂為之尸及竁以度為丘隧共喪之窆器及葬言鸞車象人及窆執斧以涖遂入藏凶器正墓位蹕墓域守墓禁凡祭墓為尸凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數使皆有私地域凡爭墓地者聽其獄訟帥其屬而巡墓厲居其中之室以守之職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔贊主人凡其喪祭詔其號治其禮凡公有司之所共職喪令之趨其事周禮句解卷五
