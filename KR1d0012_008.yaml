body:
  text: 周禮句解卷八宋朱申撰夏官司馬下司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人此掌羣臣之版蓋自公至于士總而言之皆曰士也掌羣臣之版羣臣之名皆書於版版板以治其政令下文所云皆政令也歲登下其損益之數損益謂黜陟也有損冇益則有登有下其數有多寡也故每歲登之下之辨其年歲與其貴賤辨其年則知其齒之壯老辨其歲則知其任之久近貴謂大夫以上賤謂士以下周知邦國都家縣鄙之數周遍也邦國謂諸侯也都家謂大都小都家邑也縣鄙謂六遂也卿大夫士庶子之數士謂卿大夫之適子已命者庶子謂卿大夫之庶子未命者以詔王治告於王以所當進退之治以德詔爵公侯伯子男孤卿大夫士皆爵也有德者告於王而爵之以功詔祿祿有官者之俸也有功者告於王而祿之以能詔事有才能者則告王使各治其事以久奠食食者有司之餼廪也不待詔王特以任事之久而定其多寡爾唯賜無常賜者出於王之特恩無常數也正朝儀之位朝儀謂視朝於路門外之儀也正其位則使之不差朝潮辨其貴賤之等貴賤謂自王公以下至大僕從者也辨其等則使之不亂王南鄉聖人南靣而聽天下故王南向鄉向三公北面東上三公面向王故北面而以東為上孤東面北上孤佑王者故在王之右而東面以北為上卿大夫西面北上卿大夫佐王者故在王之左而西面亦以北為上王族故士虎士在路門之右南面東上王族故士謂王之同族故為士而留宿衛者虎士虎賁之士也皆從王者立於路門之右而南面以東為上大僕大右大僕從者在路門之左南面西上大僕侍御之長大右司右也大僕從者小臣祭僕之類也亦從王者故立於路門之左而南面以西為上大音太從去聲司士擯擯相王眂朝之事擯必刃反孤卿特揖三孤六卿職尊故逐一揖之大夫以其等旅揖旅衆也大夫稍卑有中下二等故各於其等而衆揖之士旁三揖士又卑而有上中下故旁三揖焉王還揖門左揖門右還回旋也以在路門左名者皆南面故還揖之也大僕前大僕近前正王眂朝之位王入內朝皆退王視朝畢乃入路門內朝朝者皆退掌國中之士治士之仕於王國者則治其進退損益也凡其戒令戒其怠忽令其當為掌擯士者膳其摯凡祭祀掌士之戒令詔相其法事及賜爵呼昭穆而進之帥其屬而割牲羞爼豆凡㑹同作士從賔客亦如之作士適四方使為介大喪作士掌事作六軍之士執披凡士之有守者令哭無去守國有故則致士而頒其守凡邦國邦國之士皆命於王三歲則稽士任其任冇功過三歲則稽考之而進退其爵祿有功者進其爵祿有過者退其爵祿諸子下大夫二人中士四人府二人史二人胥二人徒二十人國子之適則為正而其庶介於適者則謂之倅倅七內反掌其戒令與其教治戒其怠忽令其有為教以其藝治以其事治直吏反辨其等明貴賤也正其位别上下也國有大事國有大事在祀與戎則帥國子而致於大子公卿大夫聽於王故其于聽於大子也大音太唯所用之唯大子之所用若有兵甲之事兵甲謂征伐也則授之車甲授以車則馬可知授以甲則兵可知合其卒伍聨之有數卒子忽反置其有司師之有人以軍法治之其坐作進退如軍旅之事司馬弗正以其為國之貴遊故司馬不得以兵賦征之也正音征國正同凡國正弗及鄉遂所有甸徒力役之事皆不及也大祭祀正六牲之體正其牲體以序而獻凡樂事作樂之事正舞位正舞者所立之位授舞器授舞者所執之器大喪正羣子之服位㑹同賔客作羣子從凡國之政事即兵甲之事也國子存遊倅遊倅謂倅之未仕遊暇無事者蓋政事但及於國子故遊倅則存之於未用使之修德學道德可據故使之修道可志故使之學春合諸學春則聚於大學而教之學秋合諸射秋則聚於射宫而教之射以考其藝而進退之其才藝長者進與官爵短者退之使更習業也司右上士二人下士四人府四人史四人胥八人徒八十人勇士為軍右者司右主之掌羣右之政令羣右謂戎右齊右道右也政以正之令以命之凡軍旅㑹同軍旅戎事㑹同賔事合其車之卒伍卒伍謂車僕所掌車之倅也而比其乘比其所乘之馬使之齊力乘去聲屬其右屬其為右之人使之同心屬音燭凡國之勇力之士能用五兵者屬焉以車右必任勇力之事也五兵戈殳㦸酋矛夷矛也掌其政令政以正之令以命之虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人主虎士者賁奔掌先後王而趨以卒伍王出則以虎賁趨於前後以衛王也言卒伍則有行列也先去聲軍旅㑹同亦如之亦同用虎士衛王也舍則守王間間王所舍之防也王出而舍於外則以虎士守王間舍赦王在國則守王宫王入而在於國則以虎士守王宫國有大故則守王門國有災兵之故則以虎士守王門大喪亦如之及葬從遣車而哭適四方使則從士大夫若道路不通有徵事則奉書以使於四方旅賁氏中士二人下士十有六人史二人徒八人以旅力而衛王掌執戈盾夾王車而趨王出則以下士十六人執戈盾夾王車而行盾常凖左八人八人在車之左右八人八人在車之右車止則持輪使王車安固也凡祭祀㑹同賔客則服而趨喪紀則衰葛執戈盾軍旅則介而趨節服氏下士八人徒四人節其所著服與王為掌祭祀朝覲衮冕六人維王之太常服衮冕者從王服也太常王所建旗六人維之則一畔有三人持之也諸侯則四人諸侯建交龍之旗一畔有兩人維之其服亦如之亦同諸侯之服郊祀裘冕二人尸服與王同大裘節服氏亦大裘故二人皆裘冕執戈送逆尸從車送尸迎尸皆執戈而從尸車之後從去聲方相氏狂夫四人掌蒙熊皮黃金四目𤣥衣朱裳執戈揚盾帥百𨽻而時難以索室毆疫大喪先匶及墓入壙以戈擊四隅毆方良大僕下大夫二人長僕侍御之官大僕其也大太掌正王之服位王之吉服有六所立有位大僕正之使當其禮出入王之大命出大命則宣之於外入大命則納之於內掌諸侯之復逆復有報乎上也逆有言乎上也王眂朝則前正位而退前正位則司士所謂大僕前也退則立於路門之左也入亦如之正燕朝之位亦如外朝也建路鼓于大寢之門外路鼓四面以象無所不通也大寢路寢也其門外則曰內朝而掌其政謂鼓節與早晏以待達窮者與遽令無告困窮之民四方急遽之令二者欲其聞之速也故使之鳴鼓焉遽詎令零也聞鼓聲大僕聞有鳴鼓者則速逆御僕與御庶子御僕御庶子皆直事鼓所者大僕速逆此二官即受其事以聞祭祀賔客喪紀正王之服位詔法儀贊正牲事王出入則自左馭而前驅王出入面乘車則自車之左馭而前行也凡軍旅田役贊王鼓軍旅田役王皆親鼓大僕贊之救日月亦如之日月薄蝕則擊鼓以祛隂慝大僕亦贊其事大喪始崩戒鼓傳達于四方窆亦如之縣喪首服之法于宫門掌三公孤卿之弔勞王燕飲則相其法王之燕飲雖無酌數然亦有法大僕則相之王射則贊弓矢王之大射燕射冇事於弓矢大僕則贊之王眂燕朝則正位王與族人燕處大僕皆正其位掌擯相擯則助賔相則助主王不眂朝則辭於三公及孤卿以不眂朝之意而告之也小臣上士四人大僕之屬掌王之小命大僕出入王之大命故小臣掌其小命也詔相王之小法儀詔者告之以言相者助之以力小法如行以肆夏之類小儀如大揖同姓之類掌三公及孤卿之復逆大僕掌諸侯之復逆故小臣掌三公孤卿之復逆也正王之燕服位王退朝而適燕寢則正其服與位王之燕出入則前驅燕私之出入則馭而前驅大祭祀朝覲沃王盥沃水盥手小祭祀賔客饗食賔射掌事如大僕之法掌士大夫之弔勞凡大事佐大僕祭僕中士六人之代王躬行祭祀事掌受命于王以眂祭祀謂王於祭祀有故而不與之時也而警戒祭祀有司有司有事於祭祀者警以言而戒以事也糾百官之戒具前期則有戒既戒則其具皆糾察之既祭帥羣有司而反命受命以祭故祭畢則帥有司而反命以王命勞之復以王命勞與祭之有司勞去聲誅其不敬者有司不敬則以王命誅責之大喪復于小廟凡祭祀王之所不與則賜之禽都家亦如之凡祭祀致福者展而受之御僕下士十有二人府二人史四人胥二人徒二十人僕臣之屬于尊者如馬之在御也掌羣吏之逆及庶民之復羣吏之逆謂自士以下有言於上者庶民之復謂惸獨老幼有復於上者大祭祀相盥而登盥洗手也登謂登牲體於爼也相相王也大喪持翣掌王之燕令以序守路鼓𨽻僕下士二人府一人史二人胥四人徒四十人掌五寢之掃除糞灑之事祭祀修寢王行洗乘石掌蹕宫中之事大喪復于小寢大寢辨師下士二人工四人史二人徒四人掌五冕之官掌王之五冕王之冕有六大裘冕衮冕鷩冕毳冕希冕𤣥冕而此云五冕者大裘與兖同一冕也皆𤣥冕朱裏冕以版為之廣八寸長尺六寸𤣥表而朱裏延紐延即冕之覆而在上也紐小鼻也綴於武上四旁以笄貫之五采繅十有二就以五采絲為繩如繅之文以貫玉而垂於延之前後各十有二就也就成也繅音藻皆五采玊十有二以五采玉相間用五采繅貫而垂之每就各十有二旒也玉笄朱紘以玉為笄橫貫於紐以朱為紘綴於笄之兩端而結於頷下諸侯之繅斿九就冕之前後各九就每就綴九旒侯當為公斿留瑉玉三采瑉玉石似玉者也三采朱白蒼也瑉音民其餘如王之事謂𤣥冕朱裏延綴玉笄朱紘也繅斿皆就此總言侯伯子男之冕也侯伯七命則七就子男五命則五就玉瑱玉笄以玉為瑱所以塞耳也玉笄見上注王之皮辨㑹五采皮辨王眂朝之服其縫中結五采玉為飾也玉璂象邸玉璂即五采玉十二也象邸以象骨飾采內頂上之邸也玉笄王之辨絰辨而加環絰諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令司甲下大夫二人中士八人府四人史八人胥八人徒八十人闕司兵中士四人府二人史四人胥二人徒二十人掌兵器者掌五兵五盾此言步卒五兵弓矢戈殳矛也五盾則授兵舞者之盾謂二車之盾乘車之盾旅賁之盾虎士之盾藩盾也各辨其物與其等辨其物則其用各有所宜也辨其等則其制有長短小大也以待軍事除戎器以戒不虞也及授兵以兵器授軍旅從司馬之法以頒之師旅卒兩人數合頒所用多少並從司馬之法及其授兵輸亦如之謂師還而有司還兵也及其用兵亦如之謂出給守衛也二者皆從司馬之法祭祀授舞者兵干戚之舞大喪廞五兵軍事建車之五兵㑹同亦如之司戈盾下士二人府一人史二人徒四人戈今之㦸也盾常允掌戈盾之物而頒之如下文祭祀軍旅㑹同之屬祭祀授旅賁殳旅賁掌執戈盾而趍及祭祀則但執殳也故士戈盾故士王族故士也以其從士故授之戈盾以為衛授舞者兵亦如之軍旅㑹同授二車戈盾二車副車也若有軍旅㑹同則司戈盾以戈盾授之建乘車之戈盾王所乘車不授之但建其戈盾而已乘去聲授旅賁及虎士戈盾旅賁虎士趍而衛王故亦授以戈盾賁奔及舍設藩盾王所止舍之所設盾以為藩衛行則斂之王行則無所用故收斂之斂去聲司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人掌弓弩矢箙官之長掌六弓四弩八矢之法六弓謂王弓弧弓夾弓庾弓唐弓大弓也四弩謂夾庾唐大也八矢謂枉矢潔矢殺矢鏃矢矰矢茀矢恆矢庳失也法謂曲直長短之數也辨其名物名以命之物以色之而掌其守藏守之則有人藏之則有府守音狩藏去聲與其出入出則頒之入則授之中春獻弓弩弓弩成於陽氣方和之時故中春獻之中音仲中秋獻矢箙箙盛矢器也以獸皮為之矢與箙成於隂氣將堅之時故仲秋獻之及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者其矢箙皆從其弓凡弩夾庾利攻守唐大利車戰野戰凡矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢庳矢用諸散射天子之弓合九而成規往體寡來體多則合多往體多來體寡則合少天子之弓王弓弧弓也其體不甚曲故合九弓而成一規諸侯合七而成規諸侯之弓唐弓大弓也其體稍曲故合七弓而成一規大夫合五而成規大夫之弓夾弓庾弓也其體愈曲故合五弓而成一規士合三而成規士之弓斗力也其體極曲故合三而成規句者謂之弊弓句曲也弊惡也句者弊則直者為良矣句鈎弊婢凡祭祀共射牲之弓矢射牲示親殺也殺牲非尊者所親故用弓矢澤共射椹質之弓矢澤謂澤宫將祭而習射以選士之處也質止也言樹椹以為射正而共其弓矢大射燕射大射擇士助祭燕射燕飲而射共弓矢如數并夾如數謂如當射者之數也并夾謂矢之高者以夾取之也大喪共明弓矢凡師役㑹同頒弓弩各以其物物謂弓弩矢箙之類從授兵甲之儀田弋充籠箙矢共矰矢凡亡矢者弗用則更繕人上士二人下士四人府一人史二人胥二人徒二十人繕治弓弩矢箙之類掌詔王射告王以當射之節質王弓矢之事當射則以弓矢授王已射則受之凡乘車充其籠箙載其弓弩既射則斂之無㑹計槀人中士四人府二人史四人胥二人徒二十人箭簳曰槀槀杲掌受財于職金以齎其工弓弩矢箙冬官百工所造也槀人則受財于職金之官以給其直齎音咨弓六物為三等弓六物謂王弧夾庾唐大也其斗力強弱分為上中下三等弩四物亦如之弩四物謂夾庾唐大也其斗力亦分三等矢八物皆三等矢八物謂枉潔殺鏃矰茀恆庳也皆分三等箙亦如之盛矢之箙亦分三等春獻素春獻弓弩之胎素秋獻成弓弩備四時之氣而後成及秋乃可獻也書其等以饗工書其工拙之等降為酒食以享勞之也乘其事乘其治兵大閲之事試其弓弩當大閲時試其弓弩良否試當作考以下上其食而誅賞弓弩善則上其祿甚則賞之不善則下其祿甚則誅之上時掌乃入功于司弓矢及繕人既考其功乃入之于司弓矢以待頒賜入之于槀人以供王用也凡齎財與其出入皆在槀人以待㑹而考之亡者闕之戎右中大夫二人上士二人此充戎路之右掌戎車之兵革使王乘戎車則在弓之右執兵被甲以充役使使去聲詔贊王鼓詔謂告以當鼓之節質謂助擊之也傳王命于陳中以軍衆所在懼王命有所不聞也傳直宣陳陳㑹同充革車㑹同王乘金路而革車從則充革車之右也齊右下大失二人齊充玉路金路之右音齊掌祭祀㑹同賔客馬前齊車祭祀王乘王路㑹同賔客王乘金路王未乘車之時立於馬前以備驚奔王乘則持馬王登車則持馬以備駭輿之患乘去聲行則陪乘王既乘而行則在車為參乘也凡有牲事則前馬王見牲則拱而式齊右居馬前以備驚奔道右上士二人右此充象路之掌前道車道車象路視朝之車也前車與齊車同王出入則持馬陪乘如齊車之儀乘則持馬行則陪乘自車上諭命于從車王行則以車從王有命則自車上宣諭之從去聲詔王之車儀動容周旋之儀皆詔告之王式則下前馬與齊右牲事前馬同王下則以蓋從王下車則執蓋而從大馭中大夫二人最此玉路之馭馭之尊者掌馭玉路以祀見巾車注及犯軷行山曰軷蓋封土為山於國門之外祭之以牲也軷音跋王自左馭大馭將下車故王自車左代之為馭馭下祝大馭乃下車而祝神祝之又反登受轡犯軷已祭而登車乃受轡而犯軷遂驅之乃驅馬登其山而去之所謂犯軷也及祭酌僕僕即大馭也王以祭之餘酒酌之僕左執轡大馭以左手執轡右祭兩軹以右手酹酒祭左右兩轂之末軹只祭軌又祭軾前軌犯乃飲祭畢然後飲之凡馭路總言馭五路也行以肆夏行謂大寢至門外行欲緩故歌肆夏以為節趨以采薺趨謂路門至應門趨欲速故歌采薺以為節薺音咨凡馭路儀總言馭五路之儀以鸞和為節鸞和金鈴也鸞在衡和在軾取其聲以為車行之節也戎僕中大夫二人革路之馭掌馭戎車見巾車革路注掌王倅車之政倅副車也掌其政所以正之倅萃內反正其服正乘戎車者服犯軷如玉路之儀一如大馭之儀凡巡守及兵車之㑹亦如之巡守謂巡諸侯之所守兵車之㑹謂盟㑹用兵車二者皆乘革路也掌凡戎車之儀戎以威為主若甲胄有不可犯之色是也齊僕下大失二人事金路之馭也言齊者王敬賔如祭也齊音齊掌馭金路以賔見巾車注朝覲宗遇饗食皆乘金路此皆所以接賔故皆乘金路也乘去聲其法儀各以其等為車送逆之節法謂度數儀謂動容蓋主送逆公侯伯子男各以其爵位尊卑之等而為逺近之節也道僕上士十有二人象路之馭掌馭象路以朝夕燕出入出入謂旦暮乘象路以之內外朝也燕謂自內外朝乘象路以還燕寢也象路見巾車注朝潮其法儀如齊車亦以其等為節掌二車之政令二車道車之副也政以正之令以命之田僕上士十有二人木路之馭掌馭田路以田以鄙田路即巾車之木路也田田獵也鄙巡行縣鄙也掌佐車之政佐車田車之副二也設驅逆之車驅車謂驅禽使前趍獲也逆教也逆還之使禽不出圍也令獲者植旌令獲禽者致於虞人所植之旌植直吏反及獻比禽及獻禽則比次其大小而數之比鼻凡田田獵驅馳之法王提馬而走提猶舉也使人扣而舉之諸侯晉晉猶抑也使人扣而抑之皆所以止奔也大夫馳馳則放而不扣也馭夫中士二十人下士四十人二車從車使車之馭掌馭二車從車使車二車象路之副也從車戎車田車之副也使車驅逆之車也從去聲使去聲分公馬而駕治之三者皆公車故用公馬駕謂以舟駕馬治謂理其行也校人中大夫二人上士四人下士十冇六人府四人史八人胥八人徒八十人馬官之長校效掌王馬之政政謂差擇養乘之數辨六馬之屬馬之屬不同而所駕亦異故辨之種馬一物種謂馬之至良而可以為種者王路用之一物者謂以一類相從也種上聲戎馬一物戎路駕戎馬齊馬一物金路駕齊馬道馬一物象路駕道馬田馬一物田路駕田馬駑馬一物以給宫中之役凡頒良馬而養乘之頒良馬謂頒之于圉師圉人趣馬馭夫僕夫也養之乘之然後教也乘馬一師四圉四匹曰乘養馬曰圉乘馬分為四圉圉師一人主之圉魚吕反三乘為皂馬十二匹為皂皂才早反皂一趣馬下士一人主之三皂為繫馬三十六匹為繫繫音計繫一馭夫中士一人主之六繫為廄馬二百一十六匹為廄廄一僕夫上士一人主之廄九又反六廄成校六馬各一廄共成一校凡千二百九十六匹而王馬少備校有左右二校分為左右駑馬三良馬之數五馬皆為良馬惟駑馬一物獨三倍良馬之數麗馬一圉二馬為麗是二駑馬共為一圉八麗一師馬十六匹共一圉師八師一趣馬馬百二十八匹共一趣馬八趣馬一馭夫馬一千二十四匹共一馭夫也駑馬三良馬之數五良一駑凡三千四百五十六匹而王馬大備矣天子十有二間間必木為之以防馬也六廄成校校有左右故十二間也馬六種種馬戎馬齊馬道馬田馬駑馬邦國六間諸侯良馬三間駑馬三間馬四種無種馬戎馬也家四間卿大夫良馬一間駑馬三間馬二種止有田馬駑馬凡馬特居四之一特牡馬也三牝一牡欲其生之衆也春祭馬祖祭天駟星執駒馬二歲為駒性未定執之無令近母夏祭先牧祭始養馬者頒馬攻特牡馬蹄齧不可乘用故因夏頒馬而攻鑿其蹄也秋祭馬社祭始乘馬者臧僕簡為馭者令皆善也冬祭馬步祭神為災害馬者獻馬獻成馬於王講馭夫馭夫馭二車從車使車者講簡習也凡大祭祀朝覲㑹同皆有合用之馬毛馬而頒之齊其毛色而頒授之飾弊馬以馬賜遺則校人飾之執撲而從之馭者執鞭策而從之撲普卜反凡賔客諸侯朝王受其弊馬受其庭實之馬大喪飾遺車之馬及葬埋之田臘則帥驅逆之車凡將事于四海山川行祭事於四海山川之神則飾黃駒黃中之色也謂殺駒以祈沈也凡國之使者天子使人於侯國使去聲共其弊馬弊馬或以賜諸侯或以私覿凡軍事用兵之事物馬而頒之齊其足力而頒授之等馭夫之祿自馭馬以下皆冇祿舉馭夫以見之也宫中之稍食稍食者餼廪也謂馬皆有養乘於宫中者趣馬下士皂一人徒四人趣養馬者趣蒼走反掌贊正良馬贊助校人而止良馬之弗良者而齊其飲食所以養之使無飢渴之害簡其六節所以間之以辨六馬之等掌駕說之頒駕以行說以止有勞逸之節故叙而頒之說稅辨四時之居治居謂牧廄所處之宜治謂執駒攻特之屬治直吏反以聽馭夫惟馭夫之所役巫馬下士二人醫四人府一人史二人賈二人徒二十人掌養疾馬而乘治之相醫而藥攻馬疾受財于校人馬死則使其賈粥之入其布于校人牧師下士四人胥四人徒四十人掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊庾人上士間三人史二人徒二十人搜庾隱也以間者馬之所隱也庾音掌十有二間之政教天子十有二間政以正之教以導之以阜馬使馬壯盛佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬正校人員選圉師圉人之員不應其選者正之馬八尺以上為龍此天子所駕五路之馬故稱龍上時掌反七尺以上為騋此諸侯之上物故稱騋六尺以上為馬此特常馬故但稱馬圉師乘一人徒二人掌教圉人養馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔圉人良馬匹一人駑馬麗一人掌養馬芻牧之事以役圉師凡賔客喪紀牽馬而入陳廞馬亦如之職方氏中大夫四人下大夫八人中士十有六人府四人史十冇六人胥十冇六人徒百有六十人主四方之職貢地圖掌天下之圖天下山川之圖以掌天下之地天下之地至廣按其圖而掌之辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民邦國諸侯也都鄙采邑也東方有四夷南方冇八蠻東南有七閩西北有九貉西方有五戎北方冇六狄其人民風俗皆辨之閩亡巾反又亡千反又音文貉孟曰反與其財用九穀六畜之數要財用之所出九穀之所生六畜之所産莫不辨其數要焉數謂別而計之要謂總而計之也畜許六下同周知其利害凡利人害人之事皆遍知之乃辨九州之國天下九州每州各置方百里七十里五十里三等之國使同貫利事之有條謂之貫可以生養人者謂之利東南曰揚州揚州在東南方其山鎮曰㑹稽山曰鎮者以鎮安於一州也㑹稽山在今越州㑹檜稽雞其澤藪曰具區水所鍾曰澤草所生曰藪具區在今之蘇州其川三江水流而趍海者曰川三江即禹貢所謂三江既入是也其浸五湖水積而成淵者曰浸五湖即范蠡所泛者是也浸子鴆反其利金錫竹箭其民資以為生者曰利金黃金也錫白鑞也竹竹之大者箭小竹可為箭者其民二男五女七人之中二為男而五為女其畜宜鳥獸其民待以為養者曰畜飛曰鳥走曰獸其穀宜稻其土宜之以為食者曰穀正南曰荆州荆州在正南方其山鎮曰衡山今潭州南嶽也其澤藪曰雲瞢雲在江北夢在江南瞢亡貢切其川江漢江出岷山漢出嶓冡其浸頴湛頴出陽城湛未聞湛直咸其利丹銀齒革丹朱砂也銀白金也齒象齒也革獸皮也其民一男二女三人之中一男二女女倍於男也其畜宜鳥獸與揚州同其穀宜稻荆州皆宜稻者以厥土惟塗泥故也河南曰豫州豫州在大河之南荆山之北其山鎮曰華山今華隂西嶽也其澤藪曰圃田在中牟其川熒雒熒在熒陽雒在雒邑其浸波溠禹貢所謂伊洛瀍澗滎波既瀦是也溠詐其利林漆絲枲漆木成林絲蠶絲也枲麻也枲思似其民二男三女五人之中二為男而三為女其畜宜六擾擾馴也六擾馬牛羊豕犬雞也擾而小反其穀宜五種黍稷菽麥稻也正東曰青州青州在正東方其山鎮曰沂山沂水所出在蓋縣沂魚祈其澤藪曰望諸在雎陽其川淮泗淮今淮河泗在泗州其浸沂沭沂出沂山沭出東莞沭述其利蒲魚蒲水草其地水多故産蒲魚其民二男二女男女相等其畜宜雞狗禽宜雞獸宜犬其穀宜稻麥夏有麥冬有稻河東曰兖州兖州在大河之東其山鎮曰岱山今之東嶽泰山其澤藪曰大野在巨野其川河泲河大河也泲與濟同出沇水泲子禮其浸盧維盧當為雷即雷夏也維當為雍即灉水也盧雷維雍其利蒲魚與青州同其民二男三女與豫州同其畜宜六擾亦同豫州其穀宜四種黍稷稻麥正西曰雍州雍州在正西方雍去聲其山鎮曰嶽山吳嶽也其澤藪曰弦蒲吳與嶽皆在汧其川涇汭涇出涇陽汭在豳地汭如鋭反其浸渭洛渭出烏鼠同汀洛出熊耳其利玉石石美石也其民三男二女男多於女其畜宜牛馬六擾之中但宜牛馬其穀宜黍稷五種之中但宜黍稷東北曰幽幽州在東北方其山鎮曰醫無閭在遼東其澤藪曰貕養在長廣其川河泲與兖州同其浸菑時菑出萊蕪時出般陽其利魚鹽近海故也其民一男三女男最少女最多其畜宜四擾馬牛羊豕其穀宜三種黍稷稻河內曰冀州冀州在河北東西南三靣距河其山鎮曰霍山在彘陽其澤藪曰揚紆所在未聞其川漳出長子縣其浸汾路汾出汾陽潞出歸德汾棼其利松柏多山故也其民五男三女男最多女最少其畜宜牛羊六擾之中但宜牛羊其穀宜黍稷與雍州同正北曰并州并州在正北方其山鎮曰恆山在上曲陽今北嶽恆音常其澤藪曰昭餘祁在塢其川呼池嘔夷呼池出鹵城嘔夷出平舒呼呼池駝嘔謳其浸淶易淶出廣昌易出故安淶來其利布帛宜於蠶績其民二男三女與兖州同其畜宜五擾馬牛羊犬豕其穀宜五種與豫州同乃辨九服之邦國即大司馬九畿也以其服事天子故曰九服方千里曰王畿即大司馬之國畿也其外方五百里曰侯服在王畿外又其外方五百里曰甸服在侯服外又其外方五百里曰男服在甸服外又其外方五百里曰采服在男服外又其外方五百里曰衛服在采服外又其外方五百里曰蠻服在衛服外又其外方五百里曰夷服在蠻服外又其外方五百里曰鎮服在夷服外又其外方五百里曰藩服在鎮服外凡邦國千里一州之地其方千里封公以方五百里則四公以其千里封公則可為方五百里者四國方四百里則六侯以其千里封侯則可為方四百里者六國方三百里則七伯七伯當為十一伯字之誤也以其千里封伯則可為方三百里者十一國方二百里則二十五子以其千里封子則可為方二百里者二十五國方百里則百男以其千里封男則可為方百里者百國以周知天下如此則天下之地可以遍知矣凡邦國凡治邦國諸侯之法小大相維使大國比小小國事大以相維屬王設其牧王設九州之牧以統諸侯制其職建立諸侯職事各以其所能不強之以所不能也制其貢建立諸侯貢賦各以其所有不責以其所不有也王將巡守巡諸侯之所守則戒于四方前期警戒四方諸侯曰各修平乃守守謂國境之內修之平之使各當其分也考乃職事考察之不使有曠職廢事也無敢不敬戒無敢不敬而違命不戒而荒政也國有大刑違其所戒則加於大刑不特常刑也及王之所行王巡守所行之處先道帥其屬而巡戒令其屬即土方氏以下也先道則在王前而巡行前日所施戒令也王殷國亦如之十二歲不巡守則六服盡朝謂之殷國其戒四方諸侯與巡守同土方氏上士五人下士十人府二人史五人胥五人徒五十人主四方邦國之土地掌土圭之法土圭長尺五寸以量日景以致日景立八尺之表夏至則景尺五寸冬至則景大三尺以土地相宅而建邦國都鄙土地猶度地也度地勢而相其可居者以建諸侯之邦國公卿之都鄙相去聲以辨土宜土化之法而授任地者土宜謂九穀所宜土化謂糞種所用授任地者謂授之以地而任其耕種也王巡守則樹王舍王之所舍為之藩籬也懷方氏中士八人府四人史四人胥四人徒四十人主懷來四方之民者掌來逺方之民懷來逺方四夷之民致方貢招致四方所貢之物致逺物招致逺人所獻之物而送逆之其去也送之其來也逆之達之以節達民以旌節達貢以璽節治其委積館舍飲食委積以備其用館舍以安其居飲食以順其好合方氏官屬如懷方氏者主合同四方之事掌逹天下之道路道路所以通往來逹之使無阻也通其財利懋遷有無以相濟也同其數器十百千萬之數吉凶禮樂之器使無異同一其度量分寸尺大之度籥合升斗之量使之齊一除其怨惡邦國相怨相惡者除之使相和睦同其好善邦國相好相善者同之使相堅固訓方氏官屬如合方氏者主訓道四方之民掌道四方之政事道猶言也四方諸侯大之為政小之為事皆言於王與其上下之志上而為君下而為臣其志亦告之於王也誦四方之傳道四方傳說往古之事亦為王誦之也傳直專反正歲則布而訓四方布告以教天下使知世之善惡而觀新物新物出而觀之以知民志之好惡形方氏官屬如訓方氏形主制四方邦國之體掌制邦國之地域邦國地域廣狹犬小各制其形體也而正其封疆境界分明不使侵爭攘奪無有華離之地析而不絶為華絶而不續為離無華離之地則封疆正矣華依江作􅏠音誇使小國事大國以小事大不得怠慢大國比小國以大比小不得侵陵山師中士二人下士四人府二人遙掌畿外邦國之山林掌山林之名積石曰山竹木曰林辨其物與其利害物乃山林所産利謂利益人者害謂毒害人者而頒之于邦國頒布於畿外之邦國使致其珍異之物有珍異之物則使致于天子川師官屬如山師川遙掌畿外邦國之澤掌川澤之名流水曰川積水曰澤辨其物與其利害而頒之于邦國使致其珍異之物並同山師邍師中士四人下士八人府四人史八人胥八人徒八十人邍與原同謂地之廣平者邍原掌四方之地名如大原嶽陽之類辨其丘陵墳衍邍隰之名此土名也土高曰丘大阜曰陵水涯曰墳下平曰衍高平曰原下濕曰隰墳扶去聲物之可以封邑者相度其地可以居民立邑者匡人中士四人史四人徒八人主正諸侯以法則掌逹法則八法八則推而逹之匡邦國而觀其慝以正邦國而觀其姦僞之惡使無敢反側不得背違法度以聽王命惟王命之所使撢人官屬如匡人告撢猶探也主探王意以天下撢貪掌誦王志志者心之所之誦王之言可以見志道國之政事道猶言也大曰政小曰事以巡天下之邦國而語之巡行天下邦國而以王之志慮國之政事告於諸侯語去聲使萬民和說而正王面如此則天下之民無不和恱皆舉首而面於王矣說恱都司馬每都上士二人中士四人下士八人府二人史八人胥八人徒八十人都謂王子弟及公鄉之采地也司馬主其軍賦掌都之士庶子及其衆庶車馬兵甲之戒令土謂公卿大夫之適子庶子則衆子也衆庶謂其都之民也司馬兵官故掌其車馬兵甲之戒令以國法掌其政學以學而後入政故必使之曉國法也政征以聽國司馬車馬兵甲掌於大司馬故聽命焉家司馬亦如之家謂大夫之采邑也其司馬所掌如都之事家司馬各使其臣以正於公司馬周禮句解卷八
