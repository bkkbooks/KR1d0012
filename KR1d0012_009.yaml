body:
  text: 周禮句解卷九宋朱申撰秋官司冦第五象秋所立之官也秋隂氣肅殺之時故立司冦掌刑禁之官以應天道焉秋官司冦上惟王建國辨方正位體國經野設官分職以為民極見天官冢宰注乃立秋官司冦建立秋官司冦之職使帥其屬而掌邦禁邦禁即六典之刑典也用刑本以禁暴也故曰禁秋官其屬六十司冦帥之而掌邦禁焉以佐王刑邦國王者明刑以弼教司冦則佐助之也大司冦之職卿一人刑司冦掌獄訟而至於冦則官之職無不舉也掌建邦之三典三者乃刑典之大綱領要在建而立之以佐王刑邦國詰四方邦國政之所加故曰刑四方則以文誥威讓而已故曰詰一曰刑新國用輕典新建之國未習於教宜以柔克治之也二曰刑平國用中典平定之國已熟於教宜以正直治之也三曰刑亂國用重典暴亂之國不率於教宜以剛克治之也此三者所謂惟敬五刑以成三德者也以五刑糾萬民用五刑之法以糾察萬民一曰野刑施於六遂者上功糾力以成功為上以不致力為糾察也二曰軍刑施於軍旅者上命糾守以用命為上以不死守為糾察也三曰郷刑施於六鄉者上德糾孝以成德為上以不致孝為糾察也四曰官刑施於官府者上能糾職以賢能為上以不稱職為糾察也五曰國刑施於王國者上愿糾暴暴當為恭謂以謹愿為上以不致恭為糾察也以圜土聚教罷民圜土獄城也罷民謂民之不服教而困乏於禮義者故聚之圜土而教焉凡害人者謂有過失而害及於人者寘之圜土而施職事焉以其非故犯法姑置之圜土而役使之以明刑恥之明書其惡於方版負之於背以愧恥之其能改者反于中國其能改過自新者則還之於故鄉里也不齒三年雖還鄉里猶三年不得以年齒序列於平民之中也其不能改而出圜土者殺其怙惡不改而逃亡者殺之以兩造禁民訟兩造謂兩辭俱到也禁止也訟謂以貨財相告者也入束矢於朝百矢為一束必入矢者取其直也不入矢則自服不直矣然後聽之然後聽其訟之曲直以兩劑禁民獄劑劵也蓋一札而為兩書也獄謂以罪名相告者入鈞金三十斤為鈞必入金者取其剛而不變也不入金亦是自服不直矣三日乃致于朝必待三日乃致於朝者重置民于獄也然後聽之然後聽其獄之曲直以嘉石平罷民嘉石文石也平成也謂成之使為善也凡萬民之有罪過而未麗於法而害於州里者民有罪過而未附麗於法若舍而不治則害於州里之善俗也然曰未麗於法則得罪輕於圜土者矣桎梏而坐諸嘉石木在足曰桎在手曰梏坐於嘉石使省其過也役諸司空坐曰既滿乃役使於司空贖其過也重罪旬有三日坐重罪坐於嘉石十三日朞役役於司空一年其次九日坐其次罪坐於嘉石九日九月役役於司空九月其次七日坐又其次罪坐於嘉石七日七月役役於司空七月其次五日坐又其次罪坐於嘉石五日五月役役於司空五月其下罪三日坐罪之下者坐於嘉石三日三月役役於司空三月使州里任之役日既滿乃召其州里保任之則宥而舍之乃宥其罪而縱釋之以肺石達窮民肺石赤石也以通天民之窮而無告者凡逺近惸獨老㓜之欲有復於上而其長弗逹者無兄弟曰惸無子孫曰獨此等窮民欲以言報於上而長官不為通逹者也立於肺石三日來立於肺石之上三日肺赤石也取其吐露肝肺之義士聽其辭士刑官也聽其有復于上之辭以告於上以其辭告於上而罪其長為官長而遏絶下情故加之罪正月之吉始和布刑于邦國都鄙乃縣刑象之灋于象魏使萬民觀刑象挾日而歛之皆如大宰布治之灋凡邦之大盟約王與諸侯大㑹同而盟有約誓之辭者約音要涖其盟書為盟書之時司冦臨之而登之于天府既盟則上其書于天府大史内史司㑹及六官皆受其貳而藏之六官六卿之官也皆受其副本而藏之以備失亡也凡諸侯之獄訟諸侯以罪名相告曰獄以貨財相告曰訟以邦典定之邦典大宰之六典也定正之也凡卿大夫之獄訟卿大夫有獄訟以邦灋斷之邦法八法也斷比定為詳矣凡庶民之獄訟庶民有獄訟者以邦成弊之邦成八成也弊比斷尤詳矣弊音蔽大祭祀奉犬牲犬金畜屬西方故司冦奉之若禋祀五帝精意以享曰禋則戒之日前十日而卜日既得日則戒執事者涖誓百官涖臨也誓百官大宰也司冦臨之戒于百族百族者王之族姓與祭者也司冦則親戒之及納亨前王納牲於鑊以烹則前行導王祭之日亦如之亦前王也奉其明水火司烜氏取明水於月取明火於日司冦則奉而進之凡朝覲㑹同前王大喪亦如之大軍旅涖戮于社凡邦之大事使其屬蹕小司冦之職中大夫二人司冦之貳掌外朝之政外朝在雉門之外小司冦於此聽政以致萬民而詢焉詢謀也謂聚萬民而與之謀也一曰詢國危冇兵冦之難則謀所以安之也二曰詢國遷徙都改邑則謀所以居也三曰詢立君君無適子將選於庶則謀所以嗣也其位此言外朝詢謀之時君臣與民所立之位王南郷天子南郷而立三公及州長百姓北面三公郷老也言州長則郷官皆在也百姓即萬民也郷官帥民北面而立羣臣西面羣臣謂卿大夫士也列於其東西面而立羣吏東面羣吏謂府史也列於其西向東而立小司冦擯小司冦則揖之使前也以叙進而問焉其進也以貴賤之叙而逐一問之以衆輔志而弊謀弊斷也以衆之謀輔王之志而又斷之於王也弊蔽以五刑聽萬民之獄訟五刑墨劓剕宫大辟也以此聽民之獄訟而治其有罪者附于刑以所犯罪附著於五刑也用情訊之猶恐有枉濫故用情實訊問之訊信至于旬乃弊之至于十日乃斷其罪謹之至也讀書則用灋讀其服罪之書然後用其五刑之法凡命夫命婦不躬坐獄訟夫婦受爵命者不親坐獄而訟使其屬若于弟代之所以貴貴也凡王之同族有罪不即市王之同族人有罪不刑于市而刑於甸師所以親親也以五聲聽獄訟求民情民之獄訟以情求之其聽有五然以辭聽為主故五者同謂之聲也一曰辭聽觀其出言不直則煩二曰色聽觀其面顔不直則赧三曰氣聽觀其鼻息不直則喘四曰耳聽觀其聆聽不直則惑五曰目聽觀其眸子不直則眊以八辟麗邦灋附刑罰辟亦法也麗亦附也八者冇罪麗於邦法則議其輕重刑罰未定也一曰議親之辟王之宗族有罪則議其法二曰議故之辟王之故舊有罪則議其法三曰議賢之辟有德者或䧟於罪則議其法四曰議能之辟有才者或䧟於罪則議其法五曰議功之辟有功勲者或䧟於罪則議其法六曰議貴之辟有爵位者或䧟於罪則議其法七曰議勤之辟勤王事者有罪則議其法八曰議賔之辟四方賔客有罪則議其法此八辟必議者以其或可赦宥也以三刺斷庶民獄訟之中刺殺也中者事實之書也三訊然後殺者則求其事實而已一曰訊羣臣先問之於卿大夫士二曰訊羣吏次問之於府史胥徒三曰訊萬民然後問之萬民聽民之所刺宥衆人皆曰可殺然後殺之衆人皆曰可宥然後宥之以施上服下服之刑衆論已定乃施刑也上服則服刑之重者下服則服刑之輕者及大比三年比校民之衆寡登民數登其數於版也自生齒以上男八月女七月則生齒自生齒以上皆書之登于天府登其數於天府之宫寳而藏之内史司㑹冡宰貳之正本在天府三官則藏其副本以制國用賦歛多寡以民數制之也小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之大賔客前王而辟后世子之喪亦如之小師涖戮凡國之大事使其屬蹕孟冬祀司民孟冬民事成故以此月祀司民之星獻民數於王以其衆寡之民數而獻於王王拜受之重民數也以圖國用而進退之進退猶損益也民數多則國用可益民數少則國用可損歲終則令羣士計獄弊訟羣士謂士師以下至朝士也計其一歲所治之獄與其所斷之訟登中于天府而登其事實之書於天府之官正歲帥其屬而觀刑象大司冦以正月縣刑象之法小司冦則帥其官屬而觀之矣令以木鐸警其聽也曰不用灋者刑官既見象刑而猶或有不用法者國有常刑國有經常之刑不汝赦也令羣士令衆刑官使之禀法乃宣布于四方然後宣昭布露于四方之國使通知之憲刑禁憲表縣之也刑五刑也禁五禁也乃命其屬入㑹乃命刑官之屬入而㑹計刑書也乃致事致其事於王也士師之職下大夫四人曰刑官曰士其長師掌國之五禁之灋五禁皆禁之於未然之前使無犯也以左右刑罰左右助也禁之於先則犯者少故可以助刑罰也左佐一曰宫禁王宫之禁二曰官禁官府之禁三曰國禁城中之禁四曰野禁郊野之禁五曰軍禁軍旅之禁皆以木鐸徇之于朝使之内有所聞書而縣于門閭使之外有所見以五戒先後刑罰戒飭之使知所守也以五戒左右其刑罰之用毋使罪麗于民戒之既詳則民無犯法而麗于罪者一曰誓以言折之用之于軍旅軍旅用誓若湯誓秦誓之類二曰誥以言告之用之于㑹同㑹同用誥如康誥洛誥之類三曰禁止使勿為用諸田役若遂人田役掌其禁令之類四曰糾察其有犯用諸國中若刑典以糾萬民之類五曰憲表而縣之用諸都鄙若布憲掌憲邦之刑禁之類掌鄉合州黨族閭比之聨所以聨其居也與其民人之什伍所以聨其人也使之相安相受居處相安而不相疾往來相受而不相拒以比追胥之事如此則可以聨比其追逐胥伺盗賊之事矣以施刑罰慶賞廢事者施刑罰有功者施慶賞掌官中之政令掌刑官之屬所行政令察獄訟之辭獄訟必有辭在察其曲直而已以詔司冦斷獄弊訟既得其曲直則告於司冦而斷之弊之致邦令令之施於邦國者士師則從而致之掌士之八成士刑官也八成謂正亂之成法也一曰邦汋汋酌也謂刺探邦之機宻而泄於外者二曰邦賊謂潛謀隂結將為逆亂者三曰邦諜謂敵國行間覘伺虚實者四曰犯邦令謂故恃傲狠以干號令者五曰撟邦令謂詐偽符璽以行號令者六曰為邦盗謂竊取國之寶藏者七曰為邦朋謂為私黨以亂政者八曰為邦誣謂造訛言以惑衆者若邦凶荒年穀不熟則以荒辨之法治之辨讀為貶荒貶之法謂减膳自貶責之類令移民民可徙則移之就谷通財不可徙則移穀賙之糾守防冦盗也緩刑恤災殍也凡以財獄訟者謂爭財而興獄訟者正之以傅别約劑聽稱責以𫝊别聽買賣以約劑二者皆劵書之名所以正實偽者也約要若祭勝國之社稷則為之尸王燕出入則前驅而辟祀五帝則沃尸及王盥洎鑊水凡刉珥則奉犬牲諸侯為賔則帥其屬而蹕于王宫大喪亦如之大師帥其屬而禁逆軍旅者與犯師禁者而戮之歲終則令正要㑹刑禁之事亦有月要歲㑹士師正之正歲帥其屬而憲禁令于國及郊野憲表縣之也國謂六郷郊野謂六遂憲禁令者亦使之不犯也郷士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人六郷獄官掌國中六郷在國中各掌其郷之民數而糾戒之郷士八人以四人主三郷之民數也糾謂五刑之所糾戒謂五戒之先後聽其獄訟六郷之民有獄訟則郷士聽之察其辭察其辭之虚實辨其獄訟辨其獄訟之曲直異其死刑之罪而要之即其犯死刑者則殊異其文書也要之者謂為之罪法之要辭也要腰旬而職聽于朝囚雖伏辜必旬日無悔異然後以職事聽於外朝也司冦聽之司冦又從而審聽之斷其獄弊其訟于朝審聽得實然後就外朝而斷獄弊訟焉弊亦斷也羣士司刑皆在衆士官與司刑之官皆在朝也各麗其法衆官各以囚所犯罪附之於法以議獄訟合衆官所麗之法而叅議之獄訟成衆官既定士師受中士師乃受其事實之書協日刑殺協日亦旬日也又旬日無悔異始加刑殺肆之三日肆其尸於市朝三日若欲免之王欲赦之則王㑹其期則王會於司冦聽之之日而用八議之法以免之也大祭祀大喪紀大軍旅大賔客則各掌其郷之禁令帥其屬夾道而蹕三公若有邦事則為之前驅而辟其喪亦如之凡國有大事征伐田獵之事則戮其犯命者干犯天命者鄉士戮之遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人六遂獄官掌四郊六遂在四郊各掌其遂之民數而糾其戒令遂士十二人二人共主一遂之民數而糾察其五戒之令聽其獄訟聽六遂之獄訟察其辭辨其獄訟異其死刑之罪而要之並同郷士二旬而職聽于朝六遂去王城稍逺故増二旬之期司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其灋以議獄訟獄訟成士師受中並同卿士協日就郊而刑殺六遂在郊故就郊而刑殺各於其遂肆之三日此六遂之獄訟故各肆其尸於遂也若欲免之則王令三公㑹其期王欲赦之則令三公往議之若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕六卿若有邦事則為之前驅而辟其喪亦如之凡郊有大事則戮其犯命者六郷在内故曰國六遂在外故曰郊縣士中士三十有二人府八人史十有六人胥十有六人徒百有二十人五鄙為縣五縣為遂比掌縣之獄官掌野郊外曰野各掌其縣之民數糾其戒令縣士三十二人各主其縣之民也而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之並同郷士三旬而職聽于朝野去王城尤逺又增一旬之期司冦聽之斷其獄弊其訟于野羣士司刑皆在各麗其灋以議獄訟獄訟成士師受中協日刑殺並同郷士各就其縣肆之三日各於所主之縣而肆其尸若欲免之則王命六卿㑹其期令六卿主議之若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之凡朝有大事則戮其犯命者方士中士十有六人府八人史十有六人胥十冇六人徒百有六十人主四方都家之獄官也掌都家都謂王子弟及公卿之采地家謂大夫之采地聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國都家又逺故以三月為期都家各有主君不得自斷故上其獄訟於王國司冦聽其成于朝成謂平也羣士司刑皆在各麗其灋以議獄訟獄訟成士師受中並同郷士書其刑殺之成欲知其所犯之罪也與其聽獄訟者欲知其聽獄訟之人也都家自有主君故不言刑殺及肆尸也凡都家之大事聚衆庶則各掌其方之禁令以時修其縣法若歲終則省之而誅賞焉凡都家之士所上治則主之訝士中士八人府四人史八人胥八人徒八十人主迎四方賔客掌四方之獄訟掌四方諸侯獄訟之事諭罪刑于邦國以附罪制刑之意告諭于邦國諸侯凡四方之有治於士者造焉四方諸侯有疑獄而治正於士官者則造於訝士以求達也四方有亂獄謂君臣宣淫上下相虐者則徃而成之則徃其國而正其罪邦有賔客四方諸侯來朝覲者則與行人送逆之行人掌賔客之官也賔客之來則與行人逆之去則送之入於國賔入國門則為之前驅而辟則訝士先賔客而驅且辟止行人也野亦如之在野亦然居館則帥其屬而為之蹕誅戮暴客者客出入則道之有治則贊之凡邦之大事聚衆庶謂征伐之類有用於衆庶者則讀其誓禁則訝士讀其誓命之辭與五禁也朝士中士六人府三人史六人胥六人徒六十人主列朝之士掌建邦外朝之灋外朝在庫門之外其位不得相踰越所謂法也左九棘朝之下左九棘木取其赤心而能制禦於外也孤卿大夫位焉位於左九棘之下羣士在其後羣士上中下士也位於孤卿大夫之後也右九棘與左同公侯伯子男位焉位於右九棘之下羣吏在其後羣吏府史也位於公侯伯子男之後面三槐朝之前有三槐木取其黄中之美暢於四支也三公位焉位在三槐之下州長衆庶在其後郷官帥衆民而列於三公之後左嘉石嘉石設於左平罷民焉平罷急之民而使之自强於善右肺石肺石設於右逹窮民焉逹窮困之民而使伸其情帥其屬而以鞭呼趨且辟禁慢朝錯立族談者慢朝則不敬錯立則不正族談則諠譁故皆禁之也凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之凡士之治士官治獄有期日皆有期限國中一旬謂郷士旬而職聽于朝也郊二旬謂遂士也野三旬謂縣士也都三月謂方士也邦國期邦國諸侯之國故以一年為期期内之治聽在期之内者則聽其訟期外不聽出其日之外則不聽亦所以息訟也凡有責者有判書以治則聽凡民同貨財者令以國法行之犯令者刑罰之凡屬責者以其地傅而聽其辭凡盜賊軍郷邑及家人殺之無罪凡報仇讎者書於士殺之無罪若邦凶荒札喪冦戎之故則令邦國都家縣鄙慮刑貶司民中士六人府三人史六人胥三人徒十人主民數者掌登萬民之數登載也自生齒以上皆書於版男女自生齒以上皆書其數於版籍辨其國中王國之内與其都鄙王子弟公卿大夫之采色及其郊野謂郷遂也自國中至郊野民數皆辨别之異其男女男女各異其籍歲登下其死生每歲有生者登而載之死者下而除之及三年大比三年比校民數以萬民之數詔司冦司民則以所登民數告於司冦司冦及孟冬祀司民之日小司冦以孟冬祀司民之星獻其數于王以司民所詔之數獻之于王王拜受之重民數也登于天府藏於天府之官内史司㑹冡宰貳之收其副本以贊王治以民數多少黜陟主民之吏司刑中士二人府一人史二人胥二人徒二十人主五刑者掌五刑之法五刑所用各有其法以麗萬民之罪以其法而附麗萬民之罪墨罪五百墨謂刺其面以墨湼之以麗此罪者有五百條下四刑同劓罪五百劓謂截其鼻也宫罪五百宫淫刑也男子則割其勢女人幽閉宫中刖罪五百刖斷足也殺罪五百殺死刑也然此與吕刑五刑之屬不同也蓋自重而之輕也若司冦斷獄弊訟謂斷其獄弊其訟於朝也則以五刑之灋詔刑罰而以辨罪之輕重司刑則以五刑之灋告於司冦辨所犯之輕重而施於刑罰也司刺下士二人府一人史二人徒四人主刺殺者掌三刺三宥三赦之灋刺殺之也宥寛之也赦釋之也以贊司冦聽獄訟司刺以是法而贊助司冦以聽獄訟也壹刺曰訊羣臣訊問也以司冦已成獄訟先問之於羣臣再刺曰訊羣吏再問之於羣吏三刺曰訊萬民三問之於萬民訊之而皆曰有罪則刺而殺之故曰三刺之法壹宥曰不識謂若報讎者誤以甲為乙而殺之也再宥曰過失謂若舉刄斫伐而誤中人也三宥曰遺忘若遺忘法禁之所而偶有小犯以上三者致訟或可以寛之故曰三宥之法壹赦曰㓜弱年少而㣲弱再赦曰老旄年老而昏耄旄耄三赦曰惷愚性惷愚而不曉以上三者非人之能為可以釋之故曰三赦之法惷勅江以此三灋者求民情斷民中以刺宥之三法而求氏之情實斷民獄訟之中而施上服下服之罪情重者服上刑情輕者服下刑然後刑殺如此則或刑或殺各當其罪矣司約官屬如司刺束約謂言語之約掌邦國及萬民之約劑六者之約自諸侯及萬民皆有之焉劑則其劵書也治神之約為上神約謂命祀郊社四望及祖宗也治民之約次之民約謂征稅也治地之約次之地約謂經界也治功之約次之功約謂王公之屬也治器之約次之器約謂吉凶禮樂車服所用也治摯之約次之謂玉帛禽鳥以為摯見之禮也凡大約劑書於宗彛邦國之大約劑則書於宗廟之六彛小約劑書於丹圖萬民之小約劑則書於丹圖猶後世之鐵劵卅書也若有訟者有爭約劑而訟者則珥而辟藏珥謂殺牲以釁也既珥乃開辟府藏取約書而視之藏去聲其不信者服墨刑其不如約書者施以墨刑若大亂謂僣忒而變先王之典刑者則六官辟藏約劑之書其副本皆藏於六官至是則六官皆開辟府藏而視之也其不信者殺其大亂約書者施以死刑司盟官屬如司約神盟謂以約辭告於也掌盟載之灋謂㰱血告神而載其辭於書也凡邦國有疑㑹同諸侯有不叶於㑹同者則掌其盟約之載司盟則掌其盟約所載之辭及其禮儀禮謂其物儀謂其容北面詔明神北面而告於神之明察者既盟則貳之既以載書告神乃寫副本以授六官也盟萬民之犯命者犯命謂犯君令也盟者托神以結其信也詛其不信者亦如之不信謂違約者詛者托神以禍其不信也此二者亦詔明神而貳之也詛側慮凡民之有約劑者民之約劑其書司約掌之其貳在司盟司盟則藏其副本也有獄訟者則使之盟詛凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯職金上士二人下士四人府二人史四人胥八人徒八十人掌金罰貨罰之事掌凡金玉錫石丹青之戒令丹丹砂也青空青也數種同出於山故職金緫主其戒令受其入征者有地産者以金玉之類入為征稅則受之辨其物之􅍇惡辨其貴賤與其數量與其多寡揭而璽之標其數目而用印以記之入其金錫于為兵器之府謂入于槀人也入其玉石丹青于守藏之府謂入于玉府也入其要入其計書於太府也掌受士之金罰貨罰金罰所謂贖刑之罰貨罰若司關所謂舉其貨者也二者皆受之入于司兵既受其金貨乃入于司兵之官旅于上帝則共其金版金版以金飾屏風也旅祭上帝則共之饗諸侯亦如之敬賔亦如敬神也凡國有大故而用金石則掌其令司厲下士二人史一人徒十有二人犯政為惡曰厲掌盗賊之任器貨賄任器謂盗賊所用傷人兵器也貨賄謂所盗財物也辨其物別其名也皆有數量皆冇多寡之數量去聲賈而揭之定其所直之價而標識之賈值入于司兵沒而入于司兵之官其奴男子入于罪𨽻女子入于舂槀凡有爵者與七十者與未齔者皆不為奴犬人下士二人府一人史二人賈四人徒十六人犬金畜故屬秋官掌犬牲以犬為性則掌之凡祭祀共犬牲祭祀用犬則共奉之用牷物用純色物伏瘞亦如之伏謂伏犬以王車轢之瘞謂埋祭也二者亦用牲物凡幾珥沈辜用䮾可也凡相犬牽犬者屬焉掌其政治司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人主圜土者掌收教罷民罷民困乏於禮義故収於圜土而教之凡害人者謂惡人為民所患而未入於刑者弗使冠飾而加明刑焉弗使冠飭去其冠也加明刑謂以版書罪狀著之於背也任之以事而收教之任以勞役之事乃所以收教之也能改者其能改過自新者上罪三年而舍罪重者拘之三年乃縱之舍捨中罪二年而舍其次拘之二年下罪一年而舍罪輕者拘之一年其不能改而出圜土者殺不改過而逃亡者殺之雖出三年不齒雖得縱舍猶三年不與平民齒也凡圜土之刑人也不虧體但加以明刑而不傷其體其罰人也不虧財但罰以勞役不傷其財也掌囚下士十有二大府六人史十有二人徒百有二十人主拘係當刑殺之囚掌守盗賊竊賄為盗傷人為賊守謂囚而守之凡囚者凡拘囚罪人上罪梏拲而桎木在手曰梏在足曰桎兩手共二木曰拲拲拱中罪桎梏不拲之也下罪梏不桎之也王之同姓拲王之同姓族人則拲其手有爵者桎有官爵者則桎其足以待弊罪囚之以待斷罪及刑殺及當刑殺之時告刑于王當刑則曰某之罪在小辟當殺則曰某之罪在大辟奉而適朝為王欲冇所赦宥也士加明梏以適市而刑殺之加明刑之版與梏以適於市而刑之殺之凡有爵者與王之同族此二者刑殺不適於市奉而適甸師氏甸師屬天官以待刑殺甸師曰王之同姓有罪則死刑焉必適甸師而刑殺者刑于隱親親貴貴之義也掌戮下士二人史一人徒十有二人主斬殺戮辱之事掌斬殺賊諜而摶之諜謂敵人為奸細者賊與諜大者斬以鈇鉞小者殺以刀刃摶之謂去衣而磔其尸也摶當為膊凡殺其親者焚之殺五服之親者則燒焚之不存其形也殺王之親者辜之殺王之親者則辜而磔之不全其體也凡殺人者踣諸市踣謂僵尸於市使衆視而懲之也踣皮北肆之三日陳其尸三日乃除之刑盗于市盗之罪未至死者亦刑于市以辱之凡罪之麗於法者亦如之其他罪犯法者亦刑之於市也惟王之同族與有爵者殺之于甸師氏所以親親而貴貴也凡軍旅田役斬殺刑戮亦如之各隨其罪之輕重亦司戮司之也墨者使守門黥者無妨於禁禦故可使守門劓者使守關截鼻者不以貌惡逺之故可使守關宫者使守内宫刑則人道絶矣故使之守内刖者使守囿斷足者驅禽獸無急行故可使守囿髠者使守積貨財積於隱處故可使髠髪守之司𨽻中士二人下士十有二人府五人史十人胥二十人徒一百人𨽻給勞辱之役者掌五𨽻之灋一曰罪𨽻盗賊之家為奴者二曰蠻𨽻征南蠻所獲者三曰閩𨽻征閩越所獲者四曰夷𨽻征東夷所獲者五曰貉𨽻征東北夷所獲者辨其物辨其衣服兵器之屬而掌其政令正之則有政使之則有令帥其民而摶盗賊盗賊之未獲者司𨽻則帥其衆而摶執之曰摶役國中之辱事中國汚辱之事司𨽻則帥其衆而勞役之為百官積任器百官任用之器亦其衆為積之也凡囚執人之事邦有祭祀賔客喪紀之事則役其煩辱之事掌帥四翟之𨽻但言四翟則罪𨽻不與也使之皆服其邦之服以其所素安也執其邦之兵以其所素習也此所謂修其教不易其俗也守王宫與野舍之厲禁野舍王行所止也内則使之守王宫外則使之守野舍之厲禁此亦司𨽻率之也罪𨽻百有二十人掌役百官府與凡有守者掌使令之小事凡封國若家牛助為牽徬其守王宫與其厲禁者如蠻𨽻之事蠻𨽻百有二十人掌役校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁閩𨽻百有二十人掌役畜養鳥而阜蕃教擾之掌子則取𨽻焉夷𨽻百有二十人掌役牧人養牛馬與鳥言其守王宫者與其守厲禁者如蠻𨽻之事貉𨽻百有二十人掌役服不氏而養獸而教擾之掌與獸言其守王宫者與其守厲禁者如蠻𨽻之事周禮句解卷九
