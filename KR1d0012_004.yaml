body:
  text: 周禮句解卷四宋朱申撰地官司徒下載師掌任土官之長其屬上士二人中士四人府二人史四人胥六人徒六十人掌任土之法任土之所宜以制賦以物地事物色之而知其種植所宜授地職既知地利所宜則授有職事於地者而待其政令因其職事使出貢賦以㕓里任國中之地任見上注㕓民居之區域也里居也國中王國之內也㕓地在於王國之中㕓直連反以場圃任園地圃植果蓏之屬季秋於中為場以納稼樊圃謂之園以宅田士田賈田任近郊之地宅田致仕者所受田士田仕者所受之圭田賈田吏為縣官賣財者之田五十里為近郊賈古以官田牛田賞田牧田任逺郊之地官田公家所耕藉田牛田以養公家之牛賞田賞賜之田牧田牧六畜之田百里為逺郊以公邑之田任甸地公邑之田謂六遂之餘地逺郊之外曰甸以家邑之田任稍地家邑之田謂大夫所食采邑三百里曰稍稍去聲以小都之田任縣地小都之田謂卿所食采邑四百里曰縣以大都之田任疆地大都之田謂公及親王子母弟所食采邑五百里曰疆地疆姜凡任地總言任土制賦之去國宅無征征稅也周稅輕近而重逺近者多役故也國宅凡官所有宫室故無征園㕓二十而一園少利㕓無穀故二十分而稅其一分薄其征也近郊十一十分取其一分比園㕓為重矣逺郊二十而三二十分而取其三分比近郊又重矣甸稍縣都皆無過十二十分而取其二分比逺郊又重矣唯其漆林之征二十而五二十分而取其五分漆林利厚重其征者所以抑末作也凡宅不毛者有里布不毛者不種桑麻也布泉也宅不毛者罰以一里二十五家之泉凡田不耕者出屋粟夫三為屋有田而不耕者罰之出三家之稅粟凡民無職事者出夫家之征夫征者百畝之稅也家征者出士徒車輦給徭役也凡民無九職三事者罰之使出夫稅家稅以時徴其賦謂園㕓以下之稅賦皆以時取之也閭師中士二人史二人徒二十人賦二十五家為閭閭師主征六鄉貢之稅掌國中及四郊之人民六畜之數國中及四郊謂園㕓至逺郊也數謂登耗多寡之數以任其力人民兼六畜而言者牛馬之類亦可任其力也以待其政令待貢賦之政令以時徴其賦稅賦以時而取凡任民總言任民之法任農以耕事任使也農即九職之三農貢九穀貢獻也三農生九穀故也任圃以樹事即九職之園圃貢草木園圃育草木也任工以飭材事即九職之百工貢器物百工飭化八材以成器用任商以市事即九職之商賈貢貨賄商賈阜通貨賄也任牧以畜事即九職之藪牧貢鳥獸藪牧養蕃鳥獸也任嬪以女事即九職之嬪婦貢布帛嬪婦化治絲枲以成布帛任衡以山事即九職之衡任山林之衡者貢其物物謂山之材任虞以澤事即九職之虞任山澤者貢其物物謂澤之材凡無職者出夫布無事於九職者罰之使出一夫之泉凡庶民不畜者祭無牲不自養牲者祭不得用牲不耕者祭無盛黍稷曰粢在器曰盛不自耕田者祭不得用盛盛成不樹者無椁椁外棺也不自種木者葬不得用椁不蠶者不帛不自養蠶者寒不得衣帛不績者不衰不自績麻者喪不得衣衰凡此皆以恥不勉也縣師上士二人中士四人府二人史四人胥八人徒八十人此間田之縣縣師主徴野賦貢掌邦國都鄙稍甸郊里之地域邦國謂王畿外接諸侯之封疆者都謂大都小都鄙謂公邑稍謂采邑甸謂六遂郊里謂六鄉皆先正其地域而辨其夫家人民田萊之數夫家謂男女人民謂奴婢田萊謂見其田及荒不耕者則皆辨其數矣及其六畜車輦之稽六畜馬牛羊豕犬雞也車所以駕馬輦人挽行之稽計也三年大比三年一次大按此戶口則以考羣吏考校主民之羣吏功過而以詔廢置有過者廢而不用有功者置之以爵若將有軍旅㑹同田役之戒則受法于司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至凡造都邑並見上注邑家邑也量其地家邑二十五里大都百里小都五十里辨其物三等之地所産不同而制其域封疆大小之異以歲時徴野賦貢野謂甸稍縣都也賦謂上之所取貢謂下之所供各以其時也遺人中士二人下士四人府二人史四人胥四人徒四十人遺饋也掌委積之官職掌邦之委積以待施惠委積國用之餘少曰委多曰積自鄉里至縣都其委積皆以待邦之施惠也鄉里之委積以恤民之艱厄鄉里謂六鄉之民以里居艱厄謂年穀不熟則賑恤之門關之委積以養老孤在國曰門在郊曰關老孤謂死政之老孤郊里之委積以待賓客郊里謂四郊之民以里居賓客至郊即與餼廩野鄙之委積以待羇旅野鄙謂郊外六遂羇旅謂客之羇繫不得去者於此惠之縣都之委積以待凶荒縣四百里都五百里凶荒謂移民就穀之時也凡賓客㑹同師役此皆衆之所聚掌其道路之委積道路皆有委積以待之凡國野之道凡國中野外之道路十里有廬廬小室也廬有飲食十里憩息之所故設飲食三十里有宿三十里為一舍可以宿焉宿有路室路室大室也路室有委委比於積為少五十里有市五十里則四方交易皆可日中而至故有市市有候館有候賓旅之館候館有積積比於委為多凡委積之事總而言之巡而比之校其多寡以時頒之以預備其所需也均人中士二人下士四人府二人史四人胥四人徒四十人均平也主平土地之力政者掌均地政政讀為征謂地守地職之稅也均地守虞衡之屬均地職農圃之屬均人民牛馬車輦之力政人民則治城郭溝渠牛馬車輦則轉委積之屬凡此皆力役之征也凡均力政凡均力政之法以歲上下以歲事之豐殺定役數之多寡上時掌反豐年則公旬用三日焉公事也旬均也古者用民之力歲不過三日旬音均中年則公旬用二日焉中年不豐不殺故免一日無年則公旬用一日焉無年則穀不熟又免一日凶札則無力政凶謂飢荒札謂疾疫併與力政免之無財賦免其稅賦不收地守地職免其地守地職之征不均地政亦不平計地稅三年大比則大均合有年無年而太平計之師氏中大夫二人上士二人府二人史二人胥十有二人徒百有二十人師者教人以道之稱掌以媺詔王媺美也謂告王以善道也媺美以三德教國子三德其目在下國子謂王太子以下至元士之適子也一曰至德至極也以為道本苟不至德則至道不凝故以至德為道本二曰敏德敏速也以為行本君子欲敏於行故以敏德為行本行去聲三曰孝德善事父母為孝以知逆惡以孝事父母則無犯上作亂之事故以孝德知逆惡知智教三行在心為德施之為行一曰孝行以孝德見於行事之間以親父母則可以親愛於父母二曰友行君子以友輔仁故友行次之以尊賢良則可以尊敬於賢良賢有德者良有善者三曰順行事師無隱無犯故順行次之以事師長則可以奉事於師長師有德者長有年者居虎門之左天子路寢之門畫虎以明勇猛司王朝王日視朝於路寢門外師氏居其左以司察之掌國中失之事中中禮者失失禮者以教國子弟以教國之子弟使無違禮凡國之貴遊子弟學焉國之子弟謂貴而有職守與在學者貴遊子弟謂貴而無職守不在學者亦使之學於師氏焉凡祭祀賓客㑹同軍旅王舉則從聽治亦如之王有舉動師氏皆從而詔媺及視朝亦然使其屬帥四夷之𨽻各以其兵服守王之門外且蹕朝在野外則守內列保氏下大夫一人中士二人史二人胥六人徒六十人師道之教訓保保其身體掌諫王惡惡者媺之反師氏語其媺故保氏諌其惡而養國子以道以道養其心也乃教之六藝古之為教德行道藝而已師氏教國子以德行故保氏養以道而教以六藝焉一曰五禮吉凶軍賓嘉二曰六樂雲門大韶大咸大夏大濩大武三曰五射一和二容三主皮四和容五曰興舞四曰五馭一鳴和鸞二逐水曲三過君表四舞交衢五逐禽左五曰六書一象形二㑹意三轉注四處事五假借六諧聲六曰九數一方田二粟米三差分四少廣五商功六均輸七方程八贏不足九旁要乃教之六儀教國子以六者之儀容一曰祭祀之容容即儀也祭祀以敬二曰賓客之容賓客以和三曰朝廷之容朝廷以肅四曰喪紀之容喪紀以哀五曰軍旅之容軍旅以嚴六曰車馬之容車馬以謹凡祭祀賓客㑹同喪紀軍旅王舉則從保氏隨王之舉動從而諌其惡聽治亦如之使其屬守王闈司諫中士二人史二人徒二十人諌猶正也掌糾萬民之德而勸之朋友德成乎朋友糾其德則使之勉而無渙散勸之朋友則使之致力以相輔正其行而强之道藝行成乎道藝正其行則使之羞而無竒邪强之道藝則使之自强而不息巡問而觀察之巡問則詢之以言觀察則考之以事以書其德行道藝擇其有德行道藝者以時書之辨其能而可任於國事者其有才能可任國事則辨之以待用也以考鄉里之治六鄉之吏其治有能否司諌悉考之以詔廢置能者詔於王而置之否者詔於王而廢之以行赦宥民有過失則行赦宥以與其自新也司救官屬如司諫救猶禁也掌萬民之邪惡過失而誅讓之邪惡在心過失在事誅讓責也以禮防禁而救之禮以防民之僞聖人以禮防禁所以救其惡也凡民之有邪惡者邪惡謂未麗於法者三讓而罰罰捶楚也三讓而不悛則加之以罰三罰而士加明刑士獄官也明刑謂去冠飾而書其邪惡之狀於背也三罰而不悛則加以明刑恥諸嘉石嘉石在外朝之門左使坐焉以恥辱之役諸司空使事官勞役之也其有過失者過失謂已麗於法者三讓而罰三次以言責之三罰而歸于圜土圜土獄城也其罪已著未忍刑之凡歲時有天患民病天降災害而民有疾病則以節巡國中及郊野節旌節也巡行也而以王命施惠恩當自上出也調人下士二人史二人徒十人調猶和也掌司萬民之難而諧和之難謂相為仇讐也相比之謂諧相濟之謂和凡過而殺傷人者過無意也以民成之成平也謂立證佐成其罪也一說以鄉民共和解之鳥獸亦如之過失殺傷人之畜産者亦然凡和難總言和難之法父之讐辟諸海外此以下言人有父兄君長之讐不可同處為讐人者當避復讐之人也父之讐人子所必報故使之辟諸海外辟避兄弟之讐辟諸千里之外兄弟之讐為兄弟者所必報故使之避諸千里之外從父兄弟之讐不同國從父兄弟謂同祖兄弟比親兄弟不同矣故但使之不同其國君之讐眂父亦避諸海外師長之讐眂兄弟謂見受業與兄弟同亦避諸千里之外主友之讐眂從父兄弟主大夫君也友朋友也亦不同國弗辟讐人不肯避復讐者則與之瑞節而以執之瑞節玉節剡圭也不從王命故王以瑞節與調人使執而治其罪凡殺人有反殺者使邦國交讐之凡殺人而義者不同國令勿讐讐之則死凡有鬬怒者成之不可成者則書之先動者則誅之媒氏官屬如調人官主合婚姻之掌萬民之判判别也男女之合必行媒者以有别也凡男女自成名以上成名謂子生三月父名之上時掌反皆書年月日名焉書其所生年月日及其父所命之名令男三十而娶陽數竒故男之娶以三十為限女二十而嫁隂數耦故女之嫁以二十為限過此則失時也凡娶判妻入子者皆書之謂再嫁而攜其子入丈夫之家者中春之月仲春隂陽交㑹之月令㑹男女順天時以成婚禮於是時也奔者不禁若無故而不用令者罰之若猶及也於是時而男女相奔父母不禁與夫無喪禍之變而不用婚姻之令者則媒氏皆罰之司男女之無夫家者而㑹之司猶察也女無夫男無家而鰥寡不能自存者亦不待中春然後㑹也凡嫁子娶妻入幣嫁子以女家言娶妻以夫家言男女非授幣不交不親故入幣純帛無過五兩其帛用純色以五兩為一束純緇兩亮禁遷葬者與嫁殤者凡男女之隂訟聽之于勝國之社其附于刑者歸之于士司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人市官之長掌市之治教政刑量度禁令治以理之教以化之政以正之刑以制之量以量多寡度以度長短止使勿為則有禁命使為之則有令以次叙分地而經市市官各以所居之次為叙分其地而掌之以立一市之大經也以陳肆辨物而平市陳物於市肆而辨其物使各以類相從則皆平而有辨也以政令禁物靡而均市以政令禁物貨之侈靡者則民不貴異物賤用物而市物均也以商賈阜貨而行布以商通物以賈賣物則貨賄阜盛而泉布得行以量度成賈而徴儥徴召也儥買也物之多寡長短以度量平定其價則買者來也賈價儥育以質劑結信而止訟質劑券書也民有違約失信而興訟者則以券書結信而止其訟也劑子隨反以賈民禁僞而除詐賈民能知物之僞民之詐故使之禁僞除詐也賈古以刑罰禁暴而去盜以刑罰禁止暴亂之人乂去其相竊盜者暴暴以泉府同貨而斂賖以泉府所藏與民同之民無貨者則賖貸而豫之大市交易衆多日昃而市日昃日過中也百族為主族姓也大市人多故百姓為主朝市朝時之市朝時而市朝日出時也商賈為主四方有無相交故商賈為主夕市夕時之市夕時而市夕日入時也販夫販婦為主細民之販以日之餘力故販夫販婦為主凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌于思次以令市市師涖焉而聽大治大訟胥師賈師涖于介次而聽小治小訟凡萬民之期于市者辟布者量度者刑戮者各於其地之叙凡得貨賄六畜者亦如之三日而舉之凡治市之貨賄六畜珍異亡者使有利者使阜物之無者當使之有利益者當使之阜阜盛也害者使亡靡者使微物之害財者當賤其價而使之亡侈靡者當抑其末而使之少凡通貨賄通逹也金玉曰貨布帛曰賄以璽節出入之璽節印章也貨賄自內出者由市而達之門及關自外入者由關而通之門及市也國凶荒札喪則市無征而作布凡市僞飾之禁僞飾如用器不中度布帛精粗不中數之類在民者十有二十有二禁謂用器一兵車二布三帛四奸色五五穀六果實七木八禽九獸十魚十一鱉十二牝羊苟有僞飾則民不得畜在商者十有二商不得資在賈者十有二賈不得粥在工者十有二工不得作市刑市之刑罰小刑憲罰刑之小者則書其罰而播於衆中刑徇罰刑之中者執其人聲其罪巡市而徇衆也大刑撲罰刑之大者則撻以辱之撲音普其附于刑者歸于士士獄官也其罪麗于五刑則歸之士官而治其罪也國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事質人中士二人下士四人府二人史四人胥二人徒二十人質平也主平定物賈者掌成市之貨賄人民牛馬兵器珍異成謂平其價也人民奴婢也珍異四時食物也凡賣儥者質劑焉凡以物賣儥者則為之立劵書也儥育劑子隨大市以質大市人民牛馬之屬則用長劵小市以劑小市兵器珍異之屬則用短券掌稽市之書契稽考也書契取豫物之券也同其度量度謂丈尺量謂斗斛同者欲其短長淺深之不異也一其淳制淳謂幅廣制謂匹長一者欲其合於度也淳準巡而考之巡行於市而考校之犯禁者舉而罰之犯禁謂度量不同淳制不一者則舉其貨而罰其人凡治質劑者謂齎契券來訟則治之國中一旬王國之中以十日為限郊二旬國外曰郊以二十日為限野三旬郊外曰野以三十日為限都三月大都小都以三月為限邦國朞諸侯之國以一年為限期內聽其在限內來者則聽其訟期外不聽其在限外來者則不聽其訟㕓人中士二人下士四人府二人史四人胥二人徒二十人㕓市中空地也掌斂市絘布總布質布罰布㕓布而入于泉府布泉也絘布列肆之稅也總布無肆立地者之稅也質布質人所罰犯禁之泉也罰布所罰買賣不平者之泉也㕓布貨賄諸物邸舍之稅也此五布者斂之入於泉府絘次總杜音才凡屠者屠殺六畜者斂其皮角筋骨入于玉府皮角筋骨堪飾器物故斂之而入于玉府凡珍異之有滯者四時食物在市不售者斂而入于膳府官為買之而入于膳羞之府胥師二十肆則一人皆二市中羣胥之長各掌其次之政令次治事之所也市有政則下之所正市有令則衆之所聽而平其貨賄貨賄之價不得擅為髙下憲刑禁焉憲刑禁以示之使不敢違察其詐僞飾行儥慝者而誅罰之儥買也慝惡也詐以飾行僞以儥慝皆責罰之聽其小治小訟而斷之大治大訟則司市斷之賈師二十肆則一人皆二史知物價者賈古各掌其次之貨賄之治貨賄之次則治其事辨其物而均平之辨其美惡使各從其類則市物均平展其成而奠其賈展其成謂視其物之成而可儥奠其賈則使之有常也奠定賈價然後令市如此則可以令市也凡天患凶荒札喪之時禁貴儥者不得輸增其價使有恆賈使有一定之價恐其乘民之急而侵其利也四時之珍異亦如之恐其因民之好而侵其利也凡國之賣儥各帥其屬而嗣掌其月凡師役㑹同亦如之司暴十肆則一人暴主禁暴亂暴掌憲市之禁令憲表縣也禁以止之令以諭之禁其鬭囂者鬭以力爭囂以口競與其暴亂者暴者虐物亂者逆理出入相陵犯者謂私惡以致凶以屬遊飲食于市者謂私好以結亂凡此者皆禁之若不可禁其有不從禁者則搏而戮之則搏執而戮辱之搏音博司稽五肆則一人人主在市稽留之掌巡市而察其犯禁者與其不物者而搏之巡行也犯禁謂犯上之禁令不物謂竒言異服怪民也搏執也掌執市之盜賊以徇盜取非有賊則害人執之以徇于衆也且刑之既徇于衆乃施刑也胥二肆則一人者市中給繇役各掌其所治之政各主所令一市之地執鞭度而巡其前鞭度以殳為鞭而量物也巡行也掌其坐作出入之禁令作起也禁令見司暴注襲其不正者坐作出入行不正者則掩捕之凡有罪者市之麗于罪者撻戮而罰之撻捶也戮辱也罰之使出布也肆長每肆則一人亦是市中給繇役者胥則十肆一人肆長則每肆一人各掌其肆之政令各掌所治一肆之政令陳其貨賄陳列其所賣之貨賄名相近者相逺也假如均之名為布帛而精粗貴賤之則甚相逺近丢聲實相近者相爾也爾與邇同亦近也實相近則精粗貴賤相邇者也而平正之平者分而有别正者定其名實而無欺也斂其總布掌其戒禁總布乃列肆之稅又以戒令而施於一肆之內泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人司市泉布委積之府掌以市之征布斂市之不售貨之滯於民用者征布即㕓人所斂之五布也市貨有積滯而不售者則以征布買而收之售受以其賈買之使民不喪其本而貨得行也物楬而書之逐物表楬而書其價楬竭以待不時而買者以待民之乏用不時而求買者買者各從其抵都鄙從其主國人郊人從其有司然後豫之凡賖者祭祀無過旬日喪紀無過三月凡民之貸者其有貧民而借用者與其有司辨而授之有司謂其所屬之官别其所貸之物定其賈而與之以國服為之息國服謂生民於國所服之業如農圃之類也息者保之使生息也蓋因其所服之業以資其生生之計焉凡國之財用取具焉有司為國事興作用財者取具于泉府歲終則㑹其出入而納其餘㑹計也納入也其羡餘者不入職幣司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府二人史二人徒四人主王城十二門掌授管鍵以啓閉國門管鑰也鍵牡也授管以閉門授鍵以啓門鍵蹇又其展反幾出入不物者幾猶察也不物謂竒言異服也正其貨賄謂不中器不中度之類正音征凡財物犯禁者舉之幾之正之而猶犯禁則舉其財物而入之于官以其財養死政之老與其孤死政之老謂死國事者之父母也孤其子也以犯禁之財而養之祭祀之牛牲繫焉監門養之凡歲時之門受其餘凡四方之賓客造焉四方賓客造國門而朝聘者則以告告之於王以禮迎之司關上士二人中士四人府二人史四人胥八人徒八十人每鬬下士二人府一人史二人徒四人關謂境上之門掌國貨之節通貨賄之璽節以聯門市自外入者通之門與市自內出者通之門與關司貨賄之出入者主貨賄之出入於關者掌其治禁與其征㕓治謂其貨賄之增減禁謂察其違國之禁征謂稅而正之㕓謂舍而禁之凡貨不出於關者謂出於私道而避征稅者舉其貨沒入其貨罰其人撻罰其人凡所達貨賄者謂不犯禁當達之者則以節傳出之節以驗其物傳以書其數乃聽其出傳音轉讀為傳者非也國凶札則無關門之征猶幾凡四方之賓客叩關叩猶至也叩叩則為之告告之于王以禮逆之有內外之送令奉命送迎賓客則以節傳出內之謂以節送迎往來也掌節上士二人中士四人府二人史四人胥一人徒二十人節謂行者所執之信掌守邦節而辨其用邦節謂玉節以下之八節也辨其用者或用以守或用以使以輔王命執節為信以佐王命守邦國者用玉節君子以玉比德守邦國為諸侯者其德宜如是也守都鄙者用角節角善抵觸守都鄙為采邑長者其材宜如是也凡邦國之使節諸侯使卿大夫聘於天子諸侯所執之節山國用虎節山多虎故鑄虎於節土國用人節平地多人故鑄人於節澤國用龍節澤多龍故鑄龍於節皆金也三者皆以金為之而鑄其象以英簜輔之英節也簜竹也以竹為之加之畫飾以盛其節門關用符節門關司門司關也符節以竹符而合之也貨賄用璽節掌貨賄者司市也璽節者既為符又加璽於其上也道路用旌節掌道路者鄉遂大夫也旌節用旌以彰其節也皆有期以反節立為期限事畢則納其節凡通達於天下者必有節凡以王命往來必有節以為信以傳輔之又有文書以輔其節也無節者有幾則不達其無節者遇門關幾察之處則執之而不使行也遂人中大夫二人之遂人掌六遂猶司徒六鄉也掌邦之野在百里之外二百里之內以土地之圖經田野以土地之圖經界其田野造縣鄙形體之法其縣鄙地域有形其井邑溝涂有體其制而成之則有法五家為鄰鄰則相聯比猶六鄉之比也五鄰為里里則同井里猶六鄉之閭也四里為酇酇有相酇助之意猶六鄉之族也酇音纘五酇為鄙鄙如邊鄙同患守禦之意猶六鄉之黨也五鄙為縣縣則首於遂猶六鄉之州也五縣為遂遂則遂於外也百里內為六鄉外為六遂皆有地域溝樹之地有廣狹域有逺近溝以通水為限樹以植木為固使各掌其政令刑禁使在遂之吏各謹其所治以歲時稽其人民以歲之四時計其所管男女多少而授之田野一家授田百畝簡其兵器以禦害也教之稼穡以興利也凡治野總言治野之法以下劑致氓氓即民也下地可任者家二人下劑致氓謂皆以下地為率一為正卒二為羡卒其外為餘夫氓萌以田里安氓出耕同田入居同里則民安也以樂昏擾氓擾順也合婚姻以樂之順民欲也以土宜教氓稼穡辨十二田之宜而教之稼穡也以興鋤利氓鋤耕也興起其氓以相佐助是與民為利也以時器勸氓耕耨之器各以其時則相勸勉也以疆豫任氓民治一夫之田而有餘力則更與之田故有力之民可任用也疆其良仄豫與以土均平政政與征同以土均之法平其力役之征也辨其野之土以上色分上中下上地中地下地分為三等以頒田里頒田里以分之於民上地夫一㕓人各受二畝半以為宅也田百畝各受田百畝以為世業畝畝同萊五十畝萊謂田之休不耕者餘夫亦如之所頒田里父祖子孫不可分故餘夫别給其數亦同中地夫一㕓田百畝萊百畝中地不及上地故倍其萊之數餘夫亦如之下地夫一㕓田百畝萊二百畝下地不及中地故萊又倍其數餘夫亦如之凡治野夫間有遂遂溝洫澮皆所以通水於川也遂廣深各二尺凡一夫所受之田間必有遂焉遂上有徑徑畛涂道路皆所以通行於國都也徑之廣可容牛馬行也十夫有溝十夫千畝之田也溝深廣倍於遂溝上有畛畛之廣可容大車百夫有洫百夫萬畝之田也洫之廣倍於溝洫上有涂涂之廣可容乘車一軌千夫有澮千夫十萬畝之田也澮廣二尋深二仞澮上有道道之廣可容車二軌萬夫有川萬夫百萬畝之田也川所以受遂溝洫澮之水川上有路路之廣可容車三軌以達于畿畿六遂之境逹千里畿內而行之也以歲時登其夫家之衆寡及其六畜車輦見鄉大夫族師注辨其老幼廢疾與其施舍者老幼廢疾不任征役與貴者賢者皆所施舍也以頒職作事職為太宰之九職事為司徒之十二事以令貢賦貢九貢賦九賦並見太宰以令師田春搜夏苗秋獮冬狩以起政役力役之征政征若起野役六遂在野故云野役則令各帥其所治之民而至酇都縣遂之長各帥所治之民而至以遂之大旗致之遂人雖是大夫而得用熊虎之旗以致民者以掌衆與大司徒同也其不用命者誅之以旗致之而不至是不用上命故誅之凡國祭祀共野牲令野職几賓客令修野道而委積大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役凡事致野役而師田作野民帥而至掌其政治禁令遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人鄉遂師猶鄉之有師各掌其遂之政令戒禁四人同主六遂政以正之令以命之戒其怠忽禁其淩犯以時登其夫家之衆寡六畜車輦登其籍於遂人辨其施舍與其可任者遂人辨其施舍者遂師併與可任者辨之經牧其田野經其田而任民以耕事牧其野而任民以畜事辨其可食者上地食者三之二中地食者半下地食者三之一皆辨之周知其數而任之遍知其數以任民也以徴財征然後可以收賦稅也作役事則聽其治訟役事力役之征也理其事而有所治爭其事而有所訟則役而聽之也巡其稼穡巡行也春種曰稼秋斂曰穡而移用其民謂如以此遂之民移用於彼遂也以救其時事謂如水潦暴至非一遂之民獨能隄防故移用以相救也凡國祭祀國家有祭祀之事審其誓戒誓以折衆戒以飭衆遂師則審聽而辨之共其野牲共於六遂故曰野牲入野職野賦于玉府野之九職九賦所得入于玉府以供王之玩好賓客則巡其道修道者賓客往來之衝要當修治庀其委積委積以給賓客館舍之食用故庀而具之大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役軍旅田獵軍旅以用衆田獵以簡衆平野民役之輕重必使均平掌其禁令禁其無犯令之必從比叙其事而賞罰比其勞逸叙其先後有功者賞無功者罰比匹爾反遂大夫每遂中大夫一人夫猶六鄉之有鄉大各掌其遂之政令每遂一人掌之以歲時稽其夫家之衆寡六畜田野遂師言車輦此言田野蓋互見也辨其可任者與其可施舍者遂師同以教稼穡春種秋斂以稽功事九職之事民所以為功業掌其政令戒禁聽其治訟並同遂師令為邑者六遂之吏歲終則㑹政致事㑹其所掌之政致其所治之事正歲簡稼器簡猶閲也稼器耒耜之類修稼政修猶治也稼政土宜任土之類三歲大比則帥其吏而興氓興舉也猶六鄉之興賢能也明其有功者農功之修者則明之屬其地治者屬猶聚也地事之治者必屬之屬燭凡為邑者凡六遂所聚之邑以四達戒其功事四方戒敕其農功之事而誅賞廢興之勤而有功則賞而興之怠則誅責而廢之縣正每縣下大夫一人也五鄙為縣正其長各掌其縣之政令徴比政以正之令以命之徴其財征比其衆寡以頒田里一㕓百畝以分職事九職十二事掌其治訟理其事則有治爭其事則有訟趨其稼事趨猶催也稼事耕耘收斂之事也趨如字又作趍音促而賞罰之勤者賞之怠者罰之若將用野民師田行役移執事師軍旅也田畋獵也行役巡守功役也移執事移徙用民以執事也以此四者用野民則帥而至各帥其縣之民而至治其政令使之聽從既役則稽功㑹事而誅賞事訖乃稽考其功之多少計㑹其事之能否而賞罰之也鄙師每鄙上士二人也五酇為鄙師亦長各掌其鄙之政令祭祀政令以治人祭祀以事神凡作民則掌其戒令作民謂師田行役也戒其怠忽令其稟行以時數其衆庶稽登比校鄙師無與焉特數之而已而察其媺惡而誅賞衆庶之中美者有賞惡者有罰媺美歲終則㑹其鄙之政而致事要為政語為事歲終則㑹計之酇長每酇中士一人士四里為酇酇音纘長丈各掌其酇之政令政令見上以時校登其夫家校其數而登之於遂大夫比其衆寡聯比其民之什伍也以治其喪紀祭祀之事祭祀吉禮之事喪紀凶禮之事若作其民而用之師田行役則以旗鼓兵革帥而至旗以屬民鼓以作衆兵革以示有事於武帥而至於其長也若歲時簡器與有司數之凡歲時戒令皆聽之自逺人至於鄙師凡其戒令皆聽而行之也趨其耕耨勸衆事也趨促稽其女功勸蠶事也里宰五鄰為里掌比其邑之衆寡與其六畜兵器邑猶里也比其人民之多少六畜之登耗兵器之備乏治其政令政令之施於里者以歲時合耦于鋤耦並耕也鋤與助同歲之四時合耦以相佐助鋤藉又助以治稼穡春稼秋穡趨其耕耨趨猶催也深耕易耨行其秩叙秩者常賜之多寡叙者其事之次第以待有司之政令上至遂人下至酇長皆有政令而徴斂其財賦里宰待其政令以徴其財斂其賦也鄰長五家則一人五家為鄰掌相糾相受五家有過則相糾察宅舍有故又相容受凡邑中之政相贊里宰有政令則五鄰共相贊助徙于他邑不便其居遷于他里則從而授之隨即付其所居旅師中士四人下士八人府二人史四人胥八人徒八十人主斂縣師所徴野之賦稅掌聚野之鋤粟屋粟間粟野謂六遂在郊外鋤粟謂一井九夫相助作之稅粟屋粟謂民有田不耕所罰三夫之粟間粟謂間民無職事所出一夫之征粟而用之而讀為若若用之謂恤民之艱厄也以質劑致民質劑劵書也給多者以質給少者以劑平頒其興積平其所興發頒其所積聚積漬施其惠因民之惠而惠之施者不責償也散其利因民之利而利之散者不一端也而均其政令逺近勞佚皆使均平凡用粟總言用粟之法春頒而秋斂之春興作因其不足而頒之秋收成因其有餘而斂之凡新氓之治皆聽之新氓新徙來者有治皆聽其所求使無征役無征以寬其財無役以養其力以地之􅍇惡為之等家七人則受以上地之美家五人則受以下地之惡稍人下士四人史二人徒十有二人主為縣師令都鄙丘甸之政掌令丘乘之政令四邑為丘共出革車一乘稍人則掌其政令若有㑹同師田行役之事㑹同謂時見殷見師田謂征伐及田獵行役謂巡守及興役則以縣師之法作其同徒輂輦同徒謂丘地之徒役也駕車曰輂人挽曰輦甸人受法於縣師而作起之輂居六反帥而以至帥其徒役輂輦而至治其政令政以正之令以命之以聽於司馬縣師屬大司馬故聽其命大喪師蜃車與其役以至掌其政令以聽於司徒委人中士二人下士四人府二人史四人徒四十人主斂甸稍芻薪之賦委去聲掌斂野之賦掌斂野之園圃山澤之賦斂去聲斂薪芻凡疏材木材凡畜聚之物薪以烹鼎芻以牧牲疏材疏之可食者木材木之可食者與凡畜聚之物皆斂之疏音疏以稍聚待賓客稍聚三百里稍地之畜聚也賓客羇旅並見遺人注以甸聚待羇旅二百里甸地之畜聚待羇旅於此而未得去者凡其餘聚以待頒賜二者畜聚之餘則以待不時之頒賜以式法共祭祀之薪蒸木材賓客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻凡疏材共野委兵器與其野囿財用凡軍旅之賓客館焉土均上士二人中士四人下士八人府二人史四人胥四人徒四十人主均平土地之政令掌平土地之政以均地守山澤虞衡之屬政征以均地事三農園圃之屬以均地貢諸侯之九貢也以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀邦國在畿外都鄙在畿內政令之緩急刑禁之寬猛施舍之可否禮俗之因革喪紀之豐約祭祀之隆殺均使之調和也皆以地媺惡為輕重之法而行之視地之媺而重行之視地之惡而輕行之掌其禁令宜行者令之不宜行者禁之草人下士四人史二人徒十有二人主殺草以種物掌土化之法化移易也瘠而移之肥惡而移之美以物地相其宜而為之種物之在地各有所宜草人相視之而糞其種凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕疆㯺用蕡輕爂用犬稻人上士二人中士四人下士八人府二人史四人胥十人徒百人主水利以種穀掌稼下地下地水澤之地也稼種穀也以瀦畜水瀦積也積水陂塘以備旱也瀦張如以防止水增之隄防則所止者深也以溝蕩水又為之溝引所瀦水播蕩諸遂也蕩吐黨反以遂均水遂者均布溝水俾盈于列也以列舍水列者塍其町畦必使坦平則水可止舍也以澮寫水列有餘水則寫之於澮以備小潦之害也以涉揚其芟作田步履播揚其所芟之腐草則可以作其田變瘠而為肥也凡稼澤夏以水殄草而芟夷之當夏之時以水殄絶其草芟毁而夷平之使草不生澤草所生種之芒種旱暵共其雩斂喪紀共其葦事土訓中士二人下士四人史二人徒八人土訓說逺方土地之宜掌道地圖以詔地事道說也地事若職方所紀之利害也言土訓說九州之地圖而告王以地事也道地慝以辨地物慝惡也地有惡則所生之物有害人者故辨之而原其生以詔地求地之所生有利於人則詔於王以時求之王巡守則夾王車王巡守於四方則土訓夾王車而行以便於詔王也誦訓官屬如土訓事主訓說四方之掌道方志以詔觀事四方之事皆有書以志之王欲觀焉則詔之以告也掌道方慝以詔辟忌四方有惡氣能害人者則詔於王以辟忌之辟音避以知地俗如志淫好僻之類王巡守則夾王車與土訓同山虞每大山中士四人下士八人府二人史四人胥六人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人虞度也度山之大小及物之所生掌山林之政令主治山林之事物為之厲而為之守禁厲蕃界也守巡護也禁止遏也皆所以禁民非時之採伐也仲冬斬陽木陽木生山南必斬以仲冬者欲其濡也仲夏斬隂木隂木生山北必斬以仲夏者欲其堅也凡服耜斬季材以時入之令萬民時斬材有期日萬民以時入山斬材者限以日數凡邦工入山林而掄材不禁邦工謂國之梓匠輪輿也掄猶擇也不禁者山林國之所有不拘日也春秋之斬木不入禁非冬夏之時不得入所禁之山斬木也凡竊木者有刑罰若祭山林則為主而修除且蹕若大田獵搜苗獮狩則萊山田之野除其草萊及弊田田者止也植虞旗于中樹虞人之旗于其中植時力反致禽而珥焉令獲者致其禽取其左耳以效功也珥二又音爾林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞小衡平也平林麓之大及物之所生掌巡林麓之禁令而平其守巡行也林麓生平地曰林山足曰麓巡其禁令要知其所守而平之也以時計林麓而賞罰之以時考計其守護之功若林麓茂盛則賞之否則罰之若斬木材取木材而用之則受法于山虞而掌其政令法如山虞所掌者是也林衡則受之而掌其斬木之政令川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人徒二十人平川之深淺及物之所出掌巡川澤之禁令而平其守流水曰川水鍾曰澤餘同林衝以時舍其守案視守者於其舍申戒之犯禁者執而誅罰之犯禁者謂非時而取及以數罟入汙池之類皆執而責罰之祭祀賓客共川奠進川物之類如魚鱐之類澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡所度澤之大小及物之生掌國澤之政令凡國家之大藪澤掌其政令為之厲禁見山虞注使其地之人守其財物居其地者知所守之要所取之宜故使之守其財物以時入之于玉府以時取之入于玉府之官頒其餘于萬民官所取之餘則頒賜於萬民凡祭祀賓客共澤物之奠喪紀共其葦蒲之事若大田獵則萊澤野及弊田植虞旌以屬禽並同山虞但山虞用旗則畫熊虎澤虞用旌則析羽為之迹人中士四人下士八人史二人徒四十人謂獸可從迹而獵從者掌邦田之地政為之厲禁而守之平地有常之田示以政令使之蕃息守以厲禁則不敢輕往凡田獵者受令焉凡有田獵者皆受其令禁麛卵者與其毒矢射者草人中士二人下士四人府二人史二人胥四人徒四十人掌金玉錫石之地金玉函於石謂之草草礦而為之厲禁以守之為之厲以限其取為之禁以止其往若以時取之若有時而取用則物其地圖而授之産物之地使之按圖而取之巡其禁令角人下士二人府一人徒八人掌以時徴齒角凡骨物角人以時徴召齒象牙之類角犀角之類與凡骨物於山澤之農以當邦賦之政令因其所有以當邦賦以度量受之度知長短量知多寡也以共財用以共國家之用羽人官屬如角人掌以時徴羽翮之政翮羽本也于山澤之農以當邦賦之政令因所有以當邦賦凡受羽十羽為審小束為審百羽為搏十審為搏十搏為縳千羽為縳掌葛下士二人府一人史一人胥二人徒二十人掌以時徴絺綌之材于山農葛上出於山精者為絺粗者為綌徴草貢之材于澤農草貢紵之屬也水鍾曰澤以當邦賦之政令亦土之所有可準為賦以權度受之掌染草下士二人府一人史一人徒八人掌以春秋斂染草之物以權量受之以待時而頒之掌炭下士二人史二人徒二十人掌灰物炭物之徴令以時入之以權量受之以共邦之用凡炭灰之事掌荼下士二人府一人史一人徒二十人掌以時聚荼以共喪事徴野疏材之物以待邦事凡畜聚之物掌蜃下士二人府一人史一人徒八人掌斂互物蜃物以共闉壙之蜃祭祀共蜃器之蜃共白盛之蜃囿人中士四人下士八人府二人胥八人徒八十人掌囿游之獸禁牧百獸祭祀喪紀賓客共其生獸死獸之物場人每場下士二人府一人史一人徒二十人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀賓客共其果蓏享亦如之廩人下大夫一人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人主藏米之官長掌九穀之數九穀黍稷稻粱秫苽麻麥豆也掌其所藏之數以待國之匪頒賙賜稍食匪頒謂委人之委積也賙賜謂王之賜豫好用之式也稍食祿廩也匪分又如字以歲之上下數邦用上謂豐年下謂歉歲以歲之豐歉計國之用也以知足否量入為出以知所用之足與不足也以詔穀用年豐不侈於有餘年凶不苦於不足以治年之凶豐凡此皆以治年之豐凶也凡萬民之食以民數計度所食之數食者人四釜上也六斗四升曰釜每人一月食穀四釜則年之上也釜音甫人三釜中也每人一月食穀三釜則年之中也人二釜下也每人一月食榖二釜則年之下也若食不能人二釜若計度其數且不足以給二釜之食則令邦移民就穀則移民之不足以就榖之有餘也詔王殺邦用凶年邦用宜從減省故以詔於王也殺色界反凡邦有㑹同師役之事則治其糧與其食行道曰糧止居曰食大祭祀則共其接盛舍人上士二人中士四人府二人史四人胥四人徒四十人主宫中用穀者掌平宫中之政掌給米於宫中而平其政分其財守凡宫中之財守皆分掌之以法掌其出入掌給米之法也出入謂出於舍人入於宫中也凡祭祀共簠簋外方內圓曰簠外圓內方曰簋共恭簠甫簋軌實之陳之簠實以稻簋實以黍稷而又陳列之也賓客亦如之亦共簠簋而實之陳之也共其禮車米筥米芻禾米百筥陳于中庭禾三十車芻薪倍禾聘禮所言是也喪紀共飯米熬穀以歲時縣穜稑之種以共王后之春獻種掌米粟之出入辨其物米之或出或入皆制其物色歲終則㑹計其政㑹用粟之政令倉人中士四人下士八人府二人史四人胥四人徒四十人廩主藏倉主散掌粟入之藏凡穀皆藏焉而以粟為主藏去聲辨九穀之物以待邦用九穀之物皆辨之以待邦國之用若穀不足則止餘法用若法式所當用而有不足則待餘財而後用之有餘則藏之穀雖有餘不可妄費必藏之以備不足以待凶而頒之年穀不登則以所藏者頒賜於民凡國之大事國之大事在祀與戎共道路之穀積食飲之具戎以出征祀以出郊故倉人共其道路之穀積食飲之具焉司祿中士四人下士八人府二人史四人徒四十人關司稼下士八人史四人徒四十人奚五人主種榖者掌巡邦野之稼巡行視也郊外曰野而辨穜稑之種先種後熟曰穜後種先熟曰稑穜直龍稑六種章勇周知其名與其所宜地周遍也既辨其種又遍知其名與其所宜種之地以為法而縣于邑閭以為稼者之式法而縣之于邑門使夫人皆知之巡野觀稼秋熟時巡行於野以觀稼之善惡以年之上下出斂法稅斂之法年豐則取盈年凶則取寡掌均萬民之食均平也猶上則人四釜下則人二釜之類而賙其急民有艱厄之急則賙賜之不責償也而平其興謂興粟以賙急則均平其役也舂人奄二人女舂枕一人奚五人掌共米物祭祀共其齍盛之米賓客共其牢禮之米凡饗食共其食米掌凡米事饎人奄二人女僖八人奚四十人掌凡祭祀共盛共王及后之六食凡賓客共其簠簋之實饗食亦如之槀人奄八人女槀每奄二人奚五人掌共內外朝冗食者之食若饗耆老孤子士庶子共其食掌豢祭祀之犬周禮句解卷四
