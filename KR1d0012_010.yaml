body:
  text: 周禮句解卷十宋朱申撰秋官司寇下布憲中士二人下士四人府二人史四人胥四人徒四十人主表刑禁者布以敷施之憲以表示之憲音獻掌憲邦之刑禁憲表也刑即司寇之五刑禁即士師之五禁也正月之吉正月朔日執旌節以宣布於四方道路用旌節故布憲執之以宣布刑禁於四方也而憲邦之刑禁表示四方使皆知之以詰四方邦國及其都鄙詰者以威讓文誥為主邦國諸侯之國都鄙采邑也達於四海極於六服之外四海之逺凡邦之大事合衆庶大事謂祀與戎合衆庶則用人民也則以刑禁號令號以召之令以命之蓋以五刑五禁號令之也禁殺戮下士二人史一人徒十有二人禁民不得相殺戮掌司斬殺戮者司猶察也斬殺戮謂使民相斬相殺相戮也凡傷人見血而不以告者匿其事而不聞之於官也攘獄者攘劫獄囚遏訟者止遏民訟以告而誅之察此四者以告於司寇而誅戮之禁暴氏下士六人史三人胥六人徒六十人禁民暴亂掌禁庶民之亂暴力正者禁止也亂謂悖於人倫暴謂敢作威怒力正謂脅衆從已以邪為正也嬌誣犯禁者嬌曲為直誣善為惡以冒犯刑禁也作言語而不信者造作無誠實之言語以惑民也以告而誅之禁此三者以告於司寇而誅戮之凡國聚衆庶以大事聚衆庶則戮其犯禁者以徇衆庶有犯禁者則戮之以徇衆凡奚𨽻聚而出入者則司牧之戮其犯禁者野廬氏下士六人胥十有二人徒百有二十人野道廬舍止宿之地掌達國道路至于四畿此遂人所謂澮上有道川上有路以達於畿也比國郊及野之道路宿息井樹國國中也郊國外也野郊外也遺人三十里有宿十里有廬即宿息之地也井所以共飲食樹所以為藩蔽廬氏則巡行而校比之也若有賓客四方諸侯朝聘則令守塗地之人聚􅝵之塗地皆有人以為之守有賓客則令其人相聚擊析以待暴客也有相翔者誅之有翺翔覘伺欲為寇盜者誅之凡道路之舟車轚互者道路車舟之行或迫隘而相轚觸相差互者敘而行之敘其先後之行凡有節者秉節而行及有爵者至有官者來則為之辟止行人禁野之橫行徑踰者凡國之大事比修途道路者掌凡道禁邦之大師則令掃道路且以幾禁行作不時者不物者蠟氏下士四人徒四十人掌除胔凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賔客亦如之若有死於道路者則令埋而置楬焉書其日月焉縣其衣服任器於有地之官以待其人掌凡國之胔禁雍氏下士二人徒八人謂隄防止水者掌溝瀆澮池之禁溝瀆澮田間通水者池謂陂障之水道必有禁然後可興利除害也凡害於國稼者恐其水害於國及稼也春令為阱擭溝瀆之利於民者穿地為穴以陷禽獸謂之阱設機以載禽獸使足不及地謂之擭春農事方興故為阱擭以禦獸害為溝瀆以通水利也秋令塞阱杜擭秋農事已成故塞之杜之禁山之為苑澤之沈者依山為苑就澤為沈則專利於已而肆害於物故禁之萍氏如雍氏浮主水禁者以萍為名比其於水上不沈溺也掌國之水禁水有灌載之利而犯之則沈溺故有禁幾酒司察非時飲者謹酒使民節用酒凡此者以酒之能溺人猶水也禁川遊者禁不乘舟而浮遊者亦以防沈溺也司寤氏如萍氏覺寤覺也主夜者掌夜時一日一夜有十二時此專掌夜之時以星分夜夜則星見曉則星沒以詔夜士夜禁詔告也夜士夜巡徼之士主夜禁者禦晨行者日未旦為晨禦之者使須明而後行也禁宵行者夜遊者半夜前曰宵遊非夜時雖不行亦禁止之也司烜氏下士六人徒十有二人烜火也掌以夫燧取明火於日夫燧取火器也日太陽之精故取明火焉以鑒取明水於月鑒取水鏡也月太隂之精故取明水焉以共祭祀之明齍明燭以明水為粢盛以明火爇燭也共明水以充玄酒也凡邦之大事謂祀賔之大事共墳燭庭燎設於門外曰墳燭設於門內曰庭燎中春以木鐸修火禁於國中為季春將出火先事而戒也軍旅修火禁大衆所聚宜致謹也邦若屋誅則為明竁焉條狼氏下士六人胥六人徒六十人條除也除道上之狼扈也掌執鞭以趨辟執鞭策以作威使行道者趨而避也王出入則八人夾道天子用八人夾道而趨辟公則六人降於王也侯伯則四人降於公也子男則二人降於侯伯也凡誓凡設誓士軍旅執鞭以呼於前且命之羣吏聽誓則執鞭使前來聽命誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨修閭氏下士二人史一人徒十有二人修治也閭里門也掌比國中宿互􅝵者宿謂守衛互謂行馬􅝵謂擊柝修閭氏則校比之也與其國粥行而賣物於國中者亦比校之而比其追胥者而賞罰之追胥謂伺逐寇盜者既比其人數則勤怠可見勤者賞之怠者罰之禁徑踰者行不由正路與以兵革趨行者用兵器趨行道路者與馳騁於國中者奔走馳騁於國中之道者二者皆有禁邦有故喪亂寇盜則令守其閭互互謂行馬所以斷出入也守閭門也互之所以防非常之變也惟執節者不幾有節以達者則無所用乎幾察也冥氏下士二人徒八人掌設弧張為阱擭以攻猛獸以靈鼓驅之若得其獸則獻其皮革齒須備庶氏下士一人徒四人掌除毒蠱以攻説禬之嘉草攻之凡歐蠱則令之比之冗氏如庶氏掌攻蟄獸各以其物火之以時獻其珍異皮革翨氏下士二人徒八人掌攻猛烏各以其物為媒而掎之以時獻其羽翮柞氏下士八人徒二十人主除木者柞側百反掌攻草木及林麓攻治也積木曰林山足曰麓夏日至夏至之日令刋陽木而火之刋謂斫去其皮也山南曰陽陽木以至陽之日刋而火之冬日至冬至之日令剝隂木而水之剝亦刋也山北曰隂隂木以至隂之日剝而水之則陽木隂木皆不復生矣若欲其化也欲其化而為日則春秋變其水火則隂木至春又從而火之陽木至秋又從而水之則無萌蘖之生矣凡攻木者掌其政令凡治木者皆有政以正之令以命之剃氏下士二人徒二十八主除草者剃替掌殺草草害稼穡故殺之春始生而萌之春生氣始達故萌之而弗治也夏日至而夷之夷平也謂迫地而刈之也夏至一隂生故可以夷之也秋繩而芟之含實曰繩芟其繩則不成熟矣繩孕冬日至而耜之冬至一陽生則用耒耜以去根也若欲其化也欲化為土則以水火變之以火而燒其芟夷之本末又從而加之以水也掌凡殺草之政令硩蔟氏下士一人徒二人掌覆夭鳥之巢以方書十日之號十有二辰之號十有二月之號十有二嵗之號二十有八星之號縣其巢上則去之翦氏下士一人徒二人掌除蠧物以攻禜攻之以莽草熏之凡庶蠱之事赤叐氏如翦氏掌除牆屋以蜃炭攻之以灰酒毒之凡隙屋除其貍蟲蟈氏如赤叐氏掌去蛙黽焚牡蘜以灰灑之則死以其煙被之則凡水蟲無聲壼涿氏如蟈氏掌除水蟲以炮土之鼓毆之以焚石投之若欲殺其神則以牡橭午貫象齒而沈之則其神死淵為陵庭氏下士一人徒二人掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢夜射之若神也則以犬隂之弓與枉矢射之銜枚氏下士一人徒八人掌司囂國之大祭祀令禁無囂軍旅田役令銜枚禁嘂呼歎嗚於國中者行歌哭於國中之道者伊耆氏如銜枚氏掌國之大祭祀共其杖咸軍旅受有爵者杖共王之齒杖大行人中大夫二人官主賔客之長掌大賔之禮及大客之儀大賔謂五等諸侯大客謂諸侯之孤卿大夫士禮以本言儀以文言以親諸侯禮儀所以親睦諸侯春朝諸侯而圖天下之事春見曰朝因而圖其事之可否秋覲以比邦國之功秋見曰覲因而比其功之髙下夏宗以陳天下之謨夏見曰宗謨謀也因而陳其謨之是非冬遇以協諸侯之慮冬見曰遇因而合其慮之同異時會以發四方之禁時見曰會謂無常時相見也發禁謂征伐有罪也殷同以施天下之政衆見曰同謂十二嵗王不巡守則衆諸侯皆來朝也施政謂考其制度也時聘以結諸侯之好時聘曰問謂諸侯使大夫來聘親以禮見之所以結其恩好也殷俯以除邦國之慝殷俯曰視謂一服來朝之嵗天子命以政禁之事所以除其惡行也間問以諭諸侯之志天子遣使間嵗一問諸侯所以通其志於上下歸脈以交諸侯之福天子祭祀以胙分賜諸侯所以同其福於上下脤上忍反賀慶以贊諸侯之喜諸侯有喜則賀慶以贊之而與之同其樂致禬以補諸侯之災禬祈禳之祭也諸侯有災則致禬以補之而與之同其憂禬會以九儀辨諸侯之命等諸臣之爵九儀謂諸侯之命五公侯伯子男也諸臣之爵四孤卿大夫士也以同邦國之禮而待其賔客九儀之名位不同乃所以同邦國之禮也待賔客如下文所云上公之禮此九儀之一也執桓圭九寸公執桓圭其長九寸繅藉九寸以織組而成藻飾所以藉玉也其長與桓圭同繅早藉在夜反冕服九章龍山華蟲火宗彛五章畫之於衣藻粉米黼黻四章繡之於裳建常九斿常即交龍之旗也其旒有九樊纓九就樊馬腹帶也纓馬韁也以五采飾之而成九匝樊盤二車九乘二車副車也無飾介九人介相賔者也陳於大門外禮九牢三牲備曰牢朝享後乃陳於館其朝位賔主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮此九儀之二也執信圭七寸繅藉七寸冕服七章自華蟲以下建常七斿樊纓七就二車七乘介七人禮七牢以上皆降於上公二等朝位賓主之間七十步立當前疾擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭此九儀之三也其他皆如諸侯之禮自躬圭外皆同諸侯諸子執穀璧五寸此九儀之四也繅藉五寸冕服五章自宗彛以下建常五斿樊纓五就二車五乘介五人禮五牢以上皆降於侯伯二等朝位賓主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧此九儀之五也其他皆如諸子之禮自執蒲璧外皆如諸子凡大國之孤孤以君命來聘此九儀之六也執皮帛以繼小國之君執束帛為摯而飾以豹皮繼於子男之後出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君凡諸侯之卿卿以君命來聘此九儀之七也其禮各下其君二等比其君之禮皆降二等以下及其大夫士皆如之亦下其君二等大夫九也儀之八也士九儀之九邦畿方千里王畿地方千里其外方五百里謂之侯服在王畿外嵗一見其地近故每年一朝見現其貢祀物共祭祀之用者又其外方五百里謂之甸服在侯服外二嵗一見地稍逺故二年一朝其貢嬪物共嬪婦之用者又其外方五百里謂之男服在甸服外三嵗一見地又逺故三年一朝其貢器物共器物之用者又其外方五百里謂之采服在男服外四嵗一見地又逺故四年一朝其貢服物共衣服之貢者又其外方五百里謂之衛服在采服外五嵗一見地又逺故五年一朝其貢材物共材用之貢者又其外方五百里謂之要服在衛服外要腰六嵗一見地尤逺故六年一朝其貢貨物共寶貨之貢也九州之外謂之蕃國六服在九州內其外則夷服鎮服蕃服皆謂之蕃國也世一見以其地極逺故嗣君即位乃朝各以其所貴寶為摯不拘其所貢也王之所以撫邦國諸侯者天子撫安諸侯之法如下文所云嵗遍存每嵗遍問其安否三嵗遍俯三嵗則遍視其治效五嵗遍省五年則遍察其風俗七嵗屬象胥象胥通言語之官也諭言語五方言語不通故使象胥諭之協辭命諸侯無辭不相接故使象胥協之此二者七年一次舉行九嵗屬瞽史瞽史樂官諭書名書名所以同其文故使瞽史諭之聽聲音聲音所以和其聲故使瞽史聽之此二者九年一次舉行十有一嵗達瑞節六瑞見宗伯六節見掌節所以達四方而文之也同度量度謂丈尺量謂斗斛所以同四方而一之也成牢禮若掌客之所掌是也同數器若合方氏之所掌是也修法則法謂八法則謂八則修謂損益因革之也此五者十一年一次舉行十有二嵗王巡守殷國每十二年王巡守諸侯如不巡守則諸侯皆來朝也凡諸侯之王事諸侯朝王之事辨其位辨其朝廷賔主之位正其等正其尊卑上下之等協其禮協其饔餼積膳之禮賔而見之使諸侯以賔禮見之若有大喪則詔相諸侯之禮若有四方之大事則受其幣聽其辭凡諸侯之邦交鄰國往來嵗相問也比年一小聘也殷相聘也三年一大聘也世相朝也嗣君即位乃親相朝以見聘問皆遣臣也小行人下大夫四人行人之副掌邦國賔客之禮籍諸侯名位尊卑之書以待四方之使者以待諸侯之臣來使於王國者令諸侯春入貢春朝之時入貢謂六服所貢也秋獻功秋覲之時獻功謂考績之功也王親受之親受其貢與功所以敬諸侯也各以其國之籍禮之國有小大故禮有等差必按其書而禮待之也凡諸侯入王則逆勞於畿及郊勞視館將幣為承而擯凡四方之使者大客則擯小客則受其幣而聽其辭使適四方天子使人於諸侯協九儀賔客之禮協合也賔禮五公侯伯子男也客禮四孤卿大夫士也共為九儀朝覲宗遇會同見前大行人注君之禮也六者諸侯事君之禮存俯省聘問見大行人注臣之禮也五者天子撫臣之禮達天下之六節龍節虎節人節旌節符節管節山國用虎節土國用人節澤國用龍節見掌節注皆以金為之為尊者將命取不可變為義也道路用旌節門關用符節見掌節注都鄙用管節都鄙采邑也管節如後世之竹使符也此與掌節守都鄙者用角節不同皆以竹為之竹有自然之節將命者期於無失節而已成六瑞六等合瑞之玉也四圭二璧王用瑱圭公用桓圭侯用信圭伯用躬圭子用穀璧男用蒲璧宗伯言執謂執之以行禮也此皆言用謂用之以合符也瑱鎮合六幣六幣諸侯所以享王也合者如圭合馬璋合皮之類圭以馬鋭首曰圭其幣用馬璋以皮半圭曰璋其幣用豹皮圭與璋二王之後用之璧以帛璧員而中虛其幣用帛琮以錦琮方而八面其幣用錦璧與琮侯伯用之琥以繡琥為虎形其幣用繡璜以黼半璧曰璜其幣用黼琥與璜子男用之此六物者總説上文六幣以和諸侯之好故以其通情而來則謂之好以其因事而來則謂之故若國札喪則令賻補之若國凶荒則令賙委之若國師役則令稿禬之若國有福事則令慶賀之若國有禍災則令哀弔之凡此五物者治其事故及其萬民之利害為一書為此一書所以興利除害也其禮俗政事教治刑禁之逆順為一書為此一書所以去逆而成順也其悖逆暴亂作慝猶犯令者為一書為此一書將以嚴而制之其札喪凶荒厄貧為一書為此一書所以寬而恤之其康樂和親安平為一書如此則康樂和親可致矣故又為此一書凡此五物者總上文五書每國辨異之每國各為五書以反命於王行人巡行天下録成五書然後復命於王以周知天下之故如此則天下之事可得而遍知矣司儀上士八人中士十有六人掌賔客擯相之禮掌九儀之賔客擯相之禮公侯伯子男五者為賔孤卿大夫士四者為客共為九儀接賔曰擯贊禮曰相以詔儀容辭令揖讓之節儀以文言容以貌言以言達意謂之辭參合乎上謂之令以手拱人謂之揖先人後已謂之讓司儀則以言而詔其節也將合諸侯有事而會則令為壇三成為壇於國外三成三重也宫旁一門為宫方三百步每旁一門詔王儀告王以見諸侯之儀南鄉見諸侯南者離明之方取鄉明之義也鄉向土揖庶姓土揖下手揖之庶姓者非王之親也時揖異姓時揖平手揖之異姓者王之外親也天揖同姓天揖舉手揖之同姓者王之族人也及其擯之擯諸侯以前王各以其禮以爵之尊卑而為隆殺公於上等壇有三重擯公於第一重侯伯於中等擯侯伯於第二重子男於下等擯子男於第三重其將幣亦如之將幣以享亦分三等其禮亦如之祼將禮同王燕則諸侯毛謂以髮白黑分尊卑也朝事尚爵而燕尚齒者燕以示慈惠故也凡諸公相為賔諸公之國相朝主國五積三問主國主人之國也積財用也於其止宿則有五積以其間闊則有三問皆三辭拜受賔三辭不獲乃拜而受之皆旅擯公之擯九人旅則陳之也再勞以其道路之苦故再勞之三辭三揖賔三辭每辭一揖登拜受賔三辭不獲乃登堂拜受拜送勞禮重於積問故拜送使人也主君郊勞積問勞特遣使而已主君又親勞之於郊焉交擯賔主各陳擯者九人以傳賓主之辭三辭賓三辭其郊勞之禮車送拜辱賓以主君親勞故乘車出舍門而迎之乃下車拜其屈辱而來也三揖三辭三揖以致恭三辭以致讓拜受賓三辭不獲乃拜而受車送主君既出賓又乘車送之三還主君三還辭之再拜賓乃再拜送之致館亦如之賔始至國使大夫受館主君又以禮親致亦如郊勞之禮也致飱如致積之禮夕食曰飱小禮也故但遣大夫如致積之禮及將幣賔致幣以享主君交擯賔始入廟主君迎賔故交擯以傳辭三辭賔三辭主君之迎車逆拜辱主君乘車出大門迎賔而拜其辱賔車進賔車於是前進答拜主君拜辱而賔答之三揖三讓主君揖而賔讓每門止一相相謂主之擯賔之介也將致敬於廟故每門止用一相及廟及至廟中惟上相入惟上擯上介入賔三揖三讓將登堂故揖而讓主君也登再拜授幣賔既登堂將授幣以享主君故主君拜之授當為受賔拜送幣賔則拜而送幣於主君也賔當為擯每事如初送幣如初將幣之禮賔亦如之賔讀如擯謂以鬱鬯禮賔也及出賔將出廟車送主人以車送賔三請三進主君請賔就車每一請則一進欲逺送之也再拜既請進則再拜賔三還三辭主君每一請則賔亦一還一辭告辟賔告主君言已辟去也辟音避致饔餼熟食曰饔生物曰餼主君致之於賓還圭賔以圭享主君禮畢則還之也饗食享以飲為主食以食為主皆所以待賔也致贈賔去而主君贈之以財也郊送主君又親送賔於郊皆如將幣之儀送逆揖讓辭受之節皆同將幣賔之拜禮拜饔餼拜饗食賔繼主君皆如主國之禮諸侯諸伯諸子諸男之相為賔也侯伯子男之國相朝各以其禮相待也各視其命之數而為之隆殺也如諸公之儀其行禮之節一與諸侯同諸公之臣相為國客則三積皆三辭拜受及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賔使者如初之儀及退拜送致館如初之儀及將幣旅擯三辭拜逆客辟三揖每門止一相及廟惟君相入三讓客登拜客三辟授幣下出每事如初之儀及禮私面私獻皆再拜稽首君答拜出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟致饔餼如勞之禮饗食還圭如將幣之儀君館客客辟介受命遂送客從拜辱於朝明日客拜禮賜遂行如入之積凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之凡四方之賓客禮儀所以相接辭命所以相與餼牢所以致賜賜獻及用禽鳥之屬以二等從其爵而上下之皆自上而下降殺以兩一從其爵命而已凡賔客送逆同禮來則逆之而有問勞之禮去則送之而有贈送之禮凡諸侯之交邦交之禮各稱其邦而為之幣各稱其邦之大小而致其幣如二王後用圭璋侯伯用璧琮之類以其幣為之禮因其幣之隆殺而為禮之厚薄凡行人之儀擯相傳辭之威儀不朝不夕日出為朝面東也日入為夕面西也不正其主面不南向亦不背客不北向但居賔主之間而已行夫下士三十有二人府四人史八人胥八人徒八十人主國使之禮掌邦國傳遽之小事謂乘郵傳急遽之事蓋事之小而欲速達者􅍇惡而無禮者􅍇惡謂吉凶之小事禮籍所不載者凡其使也行夫出而為使必以旌節執旌節以通道路也雖道有難而不時必達居於其國則掌行人之勞辱事焉使則介之環人中士四人史四人胥四人徒四十人主圍賔客任器為之守備掌送逆邦國之通賔客邦國賔客取道往來者則送迎之以路節達諸四方路節謂道路用旌節也達諸四方使無阻也舍則授館令聚柝有任器則令環之凡門關無幾賔客有路節以出入門關故無幾察之者送逆及疆送賔迎賔皆及於國之境象胥每翟上士一人中士二人下士八人徒二十人主通夷狄之言掌蠻夷閩貉戎狄之國使八蠻四夷七閩九貉五戎六狄之國遣使來朝貢者掌傳王之言而諭説焉逺人不曉中國言語故象胥傳王言而開諭解説之以和親之如此則逺人之心和而不乖親而不疏也若以時入賔謂蕃國之君世一見之則協其禮逺人之禮不同於中國象胥則教之協其禮也與其辭言傳之逺人之言不通於中國象胥則傳其言辭也凡其出入送逆之禮節幣帛辭令出則送之入則逆之禮節以相接幣帛以致享辭令以相與而賔相之接賔曰擯贊禮曰相賔擯凡國之大喪詔相國客之禮儀而正其位凡軍旅會同受國客幣而賔禮之凡作事王之大事諸侯王者征伐四夷之事則用諸侯捍屏次事卿若威令文誥之辭次事大夫次事上士下事庶子皆量其事體之輕重用之掌客上士二人下士四人府一人史二人胥二人徒二十人掌賔客牢禮之法掌四方賔客之牢禮餼獻飲食之等數牢禮謂三牲也餼獻謂禽獸也飲謂酒醬食謂膳羞皆以等級而異其殺與其政治政以正之治以理之王合諸侯而饗禮合五等諸侯而行享食之禮則具十有二牢牢具十二者王禮之數也庶具百物備庶羞之具百物之品莫不咸具諸侯長十有再獻諸侯長謂上公之命作伯者用十二獻者所以優尊之也王巡守殷國王十二年而一巡守則衆國皆朝則國君膳以牲犢所過之國其君以犢牲供王之膳貴其誠也令百官百牲皆具掌客令主國具百牲以供王之百官從者三公視上公之禮王之從行三公其禮比於上公卿視侯伯之禮王之從行卿其禮比於侯伯大夫視子男之禮王之從行大夫其禮比於子男士視諸侯之卿禮王之從行上士其禮比諸侯之卿庶子一視其大夫之禮庶子兼中士下士而言其禮比諸侯之大夫凡諸侯之禮此下言王者待諸侯之禮上公五積此言待上公之禮其未至也於其止宿先致五積積音漬皆視飱牽其始至也則致夕食視謂視其五牢之數也牽謂牽牢而致之也三問皆修以其間闊故致三問也修者脯之加薑桂者也羣介行人宰史皆有牢言公所從行之人皆有牢禮也飱五牢此即夕食五牢之數也食四十庶羞可食者凡四十品簠十簠盛稻梁其數有十豆四十豆所以盛醢其數四十鉶四十有二鉶盛羮器也其數四十二壺四十壺所以盛酒其數四十鼎簋十有二鼎以烹牲簋盛黍稷二者之數各十有二牲三十有六牛羊豕三牲具為一牢每牢以九為列牲三十六者則上公四牢也皆陳以上皆陳設之饔餼九牢饔熟食餼則生氣存焉此朝享之後所致之大禮也其死牢如飱之陳如飱五牢之數陳於門外牽四牢米百有二十筥醯醢百有二十甕車皆陳車米視生牢牢十車車秉有五籔車禾視死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數惟上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積此言待侯伯之禮四積者比於上公降一等也皆視飱牢視飱四牢之禮再問皆修侯伯止再問又無羣介行人牢史之牢飱四牢食三十有二簠八豆三十有二比於上公皆減五分之一鉶二十有八上公堂上二十二東西夾各十故其數四十二侯伯堂上十二東西夾各八故其數二十八壺三十有二亦減五分之一鼎簋十有二其數與上公同腥二十有七變牲言腥者互見也二十七者三九之數也皆陳饔餼七牢降於上公二等其死牢如飱之陳如飱四牢之數牽三牢米百筥醯醢百甕皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飱饔餼以其爵等為之禮惟上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積此言待子男之禮三積者又降於侯伯一等也皆視飱牽視飱三牢之數一問以修亦降一等飱三牢食二十有四簠六豆二十有四比於侯伯皆減四分之一鉶十有八堂上十東西夾各四壺二十有四亦減四分之一鼎簋十有二惟鼎簋之數公侯伯子男同牲十有八二九十八也牲當為腥皆陳饔餼五牢降於侯伯二等其死牢如飱之陳如飱三牢之數牽二牢米八十筥醯醢八十甕皆陳米二十車禾三十車芻薪倍禾皆陳乘禽日五十雙一饗一食一燕凡介行人宰史皆有飱饔餼以其爵等為之禮惟上介有禽獻夫人致禮六壺六豆六籩膳視致饗親見卿皆膳特牛凡諸侯之卿大夫士為國客謂諸侯不親來使卿大夫來聘問也則如其介之禮以待之如待諸侯上介之禮凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮凡賔客死致禮以喪用賔客有喪惟芻稍之受遭主國之喪不受饗食受牲禮掌訝中士八人府二人史四人胥四人徒四十人訝與迓同主迎賔客者掌邦國之等籍謂九儀之等差載於書籍者以待賔客以其等差而為隆殺之節若將有國賔客至國賔謂諸侯國客謂諸侯之臣至謂來朝聘也則戒官修委積遺人掌郊里之委積以待賔客掌訝則戒之使供具也與士逆賔於疆與訝士迎賔客於國之境為前驅而入既迎於境則為之前驅而入於國也及宿則令聚􅝵及委則致積至於國賔入館次於舍門外待事於客及將幣為前驅至於朝詔其位入復及退亦如之凡賔客之治令訝訝治之凡從者出則使人道之及歸送亦如之凡賔客凡迎賔客之禮諸侯有卿訝此言使卑者迎尊者也卿卑於諸侯故使卿訝之卿有大夫訝大夫卑於卿故使大夫迎之大夫有士訝士卑於大夫故使士迎之士皆有訝如上士為賔客則使中下士迎之也凡訝者凡迎賔客賔客至而往賔客告至乃往迎之詔相其事詔謂以言告之相謂以力贊之而掌其治令治謂理其事令謂有所使掌交中士八人府二人史四人徒三十有二人掌交通諸侯之好掌以節與幣巡邦國之諸侯及其萬民之所聚者節以為行信幣以見諸侯巡行自王國而及諸侯由諸侯而及萬民所以通上下之情也道王之德意志慮道言也王者德之所存意之所發志之所之慮之所定皆與諸侯萬民言之使咸知王之好惡辟行之使諸侯萬民皆知王之所好而行之知王之所惡而辟之使和諸侯之好謂諧和諸侯之心使之好王也達萬民之説謂通達萬民之情使之悅王也掌邦國之通事而結其交好邦國通事謂諸侯相朝之禮凡此所以結其交與好也以諭九稅之利諭告也九稅謂九職之稅使諸侯征之得以為利也九禮之親九禮謂九儀之禮使諸侯守之各安其分也九牧之維九牧謂九州之牧使之小大相維也九禁之難九禁謂九法之禁使之避免患難也難去聲九戎之威九戎謂九伐之兵使之奉法畏威也掌察四方中士八人史四人徒十有六人闕掌貨賄下士十有六人史四人徒三十有二人闕朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人主都家采邑之國治而命於朝掌都家之國治掌凡公卿王子弟之都大夫之家凡有治於國者日朝以聽國事故所作謂之事所遭謂之故朝大夫每日至朝廷而聽之以告其君長而告之於都家之君長國有政令王國有所正之政有所使之令則令其朝大夫令都家之吏使之告其君長凡都家之治於國者謂都家有事聽命於王國者必因其朝大夫必因朝大夫以達於王國然後聽之然後聽其治也惟大事弗因則冢宰聽之都則中士一人下士二人府一人史二人庶子四人徒八十人闕都士中士二人下士四人府二人史四人胥四人徒四十人闕家士亦如之闕周禮句解卷十
