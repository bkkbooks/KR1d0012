body:
  text: 周禮句解卷二宋朱申撰天官冢宰下醫師醫官之長史上士二人下士四人府二人二人徒二十人掌醫之政令醫之政謂聚毒藥以供醫事醫之令謂使醫分而治之聚毒藥以共醫事毒謂五毒藥謂五藥醫師聚之以共衆醫之所用共音恭凡邦之有疾病者疕瘍者造焉輕曰疾重曰病頭瘡曰疕身瘡曰瘍皆造醫師求藥疕音匕瘍音羊造七到反則使醫分而治之醫師使疾醫治疾病使瘍醫治疕瘍歲終則稽其醫事以制其食每歲之終醫師考衆醫之事功以制其食祿十全為上設如醫治十人皆得全愈則功之上也十失一次之十人之中其一不愈則功之次也十失二次之二人不愈又其次也十失三次之三人不愈又其次也十失四為下四人不愈則為下矣凡此所以勉勵醫者食醫中士二人食恐飲食失節以致疾故有醫食音嗣下同掌和王之六食六飲六膳百羞百醬八珍之齊六食謂六穀六飲謂六清六膳謂六牲百羞謂羞用百二十品百醬謂醬用百二十甕八珍謂八物此反皆膳夫所掌食醫則調和其齊焉和去聲齊才細凡食齊眂春時食宜溫也羮齊眂夏時羮宜熱也醬齊眂秋時醬宜涼也飲齊眂冬時飲宜寒也凡和大凡調和飲食春多酸酸以養肝肝屬木也夏多苦苦以養心心屬火也秋多辛辛以養肺肺屬金也冬多鹹鹹以養腎腎屬水也調以滑甘脾屬土分王四時故皆調以滑甘焉凡會膳食之宜畜與穀各有相宜牛宜稌牛土畜稌上穀稌音杜羊宜黍羊火畜黍火穀此二者以同氣為宜豕宜稷豕土畜稷水穀此以土剋水為宜犬宜粱犬金畜粱土榖此以土生金為宜鴈宜麥鴈火畜麥木榖此以木生火為宜魚宜苽魚水畜苽水榖此亦以同氣為宜苽音孤凡君子之食恆放焉食醫雖以養生為主然君子所以自養者亦可依放之也放甫往反疾醫中士八人之醫師所使以治民疾病者掌養萬民之疾病主治疾病而云養者言療治必須養之也四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾痟酸削也上氣逆喘也以五味五穀五藥養其病五味鹹苦酸辛甘五穀麻黍稷麥豆五藥草木蟲石穀也以五氣五聲五色視其死生五氣五藏所出之氣心肝脾肺腎也五聲言語所出之聲宫商角徵羽也五色面貌所發之色青赤白黑黃也三者皆屬五行相生則生相尅則死故以此視之兩之以九竅之變九竅謂陽竅七兩耳兩目兩鼻口也隂竅二大小二府也兩之謂隂陽變謂隂陽之變竅苦弔反參之以九藏之動九藏謂神藏五即心肺肝脾腎是也形藏四即耳目口鼻是也參之謂隂陽與沖氣動謂脈候之動藏才浪反凡民之有疾病者輕曰疾重曰病分而治之醫各有所長也死終則各書其所以而入于醫師瘍醫下士八人者醫師所使以治疕瘍瘍音羊掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊四種之瘡含膿血者凡療瘍治創之法以五毒攻之五毒五藥之有毒者攻之謂殺之而去其惡也以五氣養之氣當謂穀養之謂生之以致其和也以五藥療之療以治之以五味節之節以成之凡藥治瘍之藥以酸養骨酸木味木立地中似骨也以辛養筋辛金味金之纒合異物似筋也以鹹養脈鹹水味水之流行地中似脈也以苦養氣苦火味火之出入無形似氣也以甘養肉甘土味土之兼載四者似肉也以滑養竅滑滑石也凡諸滑物通利往來似竅也凡有瘍者受其藥焉凡病瘍者必於此求藥焉獸醫下士四人掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之凡獸之有病者有瘍者使療之死則計其數以進退之進退據功過進退其祿也酒正中士四人下士八人府二人史八人胥八人徒八十人酒官之長掌酒之政令酒之式法曰政酒之出入曰令以式法授酒材給用有多少之式造釀有厚薄之法酒材謂秫米麯糵之類凡為公酒者亦如之謂鄉射飲酒以公事作酒者亦以式法授酒材辨五齊之名酒正不自造酒使酒人為之直辨其五齊清濁而已齊才細反一曰泛齊泛者成熟而滓泛泛然也二曰醴齊醴者體也成而上下一體滓汁相將醴音禮三曰盎齊盎者成而蔥白色盎烏浪反四曰緹齊緹者成而紅赤色緹音體五曰沈齊沈者成而滓沈於下辨三酒之物物者材也以三酒所成有時故預給材令作之也一曰事酒酌有事人飲之二曰昔酒久釀乃熟三曰清酒更久於昔祭祀用之辨四飲之物物説見上一曰清清即漿人之醴清也醴濁而泲之則清矣二曰醫謂釀鬻為醴也醫於已反三曰漿即今之酨漿謂米汁相將也四曰酏即今之薄鬻也酏音移掌其厚薄之齊或厚或薄各有多少之齊以共王之四飲三酒之饌及后世子之飲與其酒饌謂具設之也后世子不言饌不復具設也凡祭祖總言三等之祭以法共五齊三酒祭有大小齊有多少各有常法以實八尊五齊實五尊三酒實三尊大祭三二如祀天地宗廟三酒用一尊久副之以兩尊以備之中祭再二如祀日月星辰五祀五嶽用酒一尊又副以一尊小祭一二如司中司命山澤之祭則止以一尊副之皆有酌數酌於尊亦有數唯齊酒不二五齊之酒特用於祭無式尊皆有器量酌器所用注尊中者數量之多少未聞共賓客之禮酒共后之致飲于賓客之禮醫酏糟皆使其士奉之凡王之燕飲酒王與羣臣燕飲之禮共其計計其用酒之數以共於王酒正奉之酒正則如數奉其酒也凡饗士庶子饗耆老孤子皆共其酒無酌數掌酒之賜頒皆有法以行之雖君頒賜之酒亦有一定之式凡有秩酒者以書契授之有職則有秩謂每月所頒各有定數酒正之出謂出以給用也日入其成日計曰成月入其要月計曰要小宰聽之酒正入文書於小宰以待聽斷歲終則會唯王及后之飲酒不會以見世子用酒在所會也以酒式誅賞誅賞作酒之善惡者酒人奄十人女酒三十人奚三百人主造酒者掌為五齊三酒酒正辨其名物使酒人為之祭祀則共奉之以待祭祀而共奉之以役世婦共賓客之禮酒飲酒而奉之凡事共酒而入于酒府凡事非一事也共酒入于酒正之府凡祭祀共酒以往賓客之陳酒亦如之漿人奄五人女漿十有五人奚百有五十人主造飲者掌共王之六飲酒正言四飲而此言六飲者以水涼無厚薄之齊也水漿醴涼醫酏水則臨時取用涼則至用乃和醴醴清也餘見酒正入于酒府酒正之府共賓客之稍禮共夫人致飲于賓客之禮清醴醫酏糟而奉之凡飲共之淩人下士二人府二人史二人胥八人徒八十人主氷室者淩去聲掌氷專主氷也正歲十有二月正月謂夏正十二月即建丑之月也令斬氷其時水澤腹堅故令斬氷三其淩淩氷室也三倍納氷以備消釋春始治鑑鑑盛氷之器治之者謂二月將出氷故也凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑所以禦暑氣也賓客共氷不共鑑也大喪共夷槃氷實氷于夷槃所以寒尸也夏頒氷掌事夏月以氷頒賜羣臣則主其事秋刷刷除氷室以待納新氷也籩人奄一人女籩十人奚二十人籩以竹為之掌肆籩之實四籩謂朝事饋食加籩羞籩各實以當用之物朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗栗桃乾䕩榛實加籩之實菱芡栗脯菱芡栗脯羞籩之實糗餌粉餈凡祭祀祭祀用籩共其籩薦羞之實薦籩謂朝事饋食之籩羞籩則加籩羞籩是也喪事及賓客之事二者亦皆用籩共其薦籩羞籩不言實者蒙上文也為王及后世子共其內羞房中之羞籩為去聲凡籩事掌之凡事非一事也醢人奄一人女醢二十人奚四十人以醢實豆掌肆豆之實豆以木為之四豆與四籩同朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢羞豆之實酏食糝食凡祭祀共薦羞之豆實薦羞見籩人注賓客喪紀亦如之二者亦皆用豆為王及后世子共其內羞房中之羞豆王舉則共醢六十甕即醬用百二十甕之半也以五齊七醢七菹三臡實之五齊謂昌本脾析蜃豚拍深蒲也七醢謂醓螺蠯蚳魚兔鴈也七菹謂韭菁茆葵芹箈筍也三臡謂麋鹿麇也齊子西反臡乃兮反賓客之禮致饔餼時共醢五十甕上公醯醢共百二十甕侯伯百甕子男八十甕此五十甕則百甕之半也蓋指侯伯而言舉中以見上下也凡事共醢凡事非一事也醯人奄二人女醯二十人奚四十人主共醯者掌共五齊七菹見醓人注凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之王舉則共齊菹醯物六十甕齊菹醢也而醯人亦共之者蓋齊菹有須醢以成者也此六十甕亦醬用百二十品之半也共后及世子之醬齊菹凡用醯以成之者皆共也賓客之禮致饔餼時共醯五十甕并醢人五十甕為百甕蓋侯伯之禮也凡事共醯凡事非一事也鹽人奄二人女鹽二十人奚四十人主共鹽者掌鹽之政令謂受入與出給之政令以共百事之鹽用鹽非一事也祭祀共其苦鹽散鹽苦鹽謂不凍治者散鹽煮水為之苦音古散去聲賓客共其形鹽散鹽形鹽象虎之形王之膳羞共飴鹽鹽之飴者今戎鹽有焉后及世子亦如之亦共飴鹽凡齊事鬻鹽以待戒令齊事和五味之事煮鹽凍治之以待上之戒令幂人奄一人女幂十人奚二十人以巾覆物曰幂幂音覔掌共巾幂主共覆尊彛之巾祭祀以疏布巾幂八尊司尊彛有六尊兩之則為十二尊惟四尊致用餘八尊則設而不用示其質也故覆之以疏布以畫布巾幂六彛六彛雞鳥斚黃虎蛻也用之以祼示其文也故覆之以畫布凡王巾皆黼凡四飲三酒用於王者巾皆畫黼文宫人中士四人下士八人府二人史四人胥八人徒八十人主安息王身者掌王之六寢之修六寢者路寢一小寢五也修掃除也為其井匽井以停止水防火燭匽以窒渠流備灑掃匽於建反又音偃除其不蠲蠲潔也去其惡臭欲除不潔去惡臭則決渠匽以滌之共王之沐浴沐以潔首浴以潔身凡寢中之事掃除執燭共爐炭凡勞事四方之舍事亦如之掌舍下士四人府二人史四人徒四十人所託以居曰舍掌王之會同之舍時見曰會殷見曰同王至壇所舍息也設梐枑再重梐枑行馬也以周衛有內外之列故兩重設之梐步禮反枑音互設車宫轅門設車為宫而仰轅為門為壇壝宫棘門為壇於中而壝其外則列棘以表門壝唯季反為帷宫設旌門王在道食息張帷為宫則植旌以表門無宫則共人門王不在車之中則陳列周衛而列人以表門凡舍事則掌之王行所舍止幕人下士一人府二人史二人徒四十人主帷幕者掌帷幕幄帟綬之事在旁曰帷在上曰幕四合象宫室曰幄帟在亦上承塵凡四物者皆以綬連繫焉帟音凡朝覲會同軍旅田役祭祀五者皆用其物共其帷幕幄帟綬幕人共之而掌次則張之大喪共帷幕帟綬三公及卿大夫之喪共其帟掌次下士四人府四人史二人徒八十人所託以上曰次掌王次之法設王者之次幕皆有法度法謂大小丈尺以待張事幕人共之掌次張之王大旅上帝冬至之日祀天於圜丘則張氊案設皇邸氊案牀上著氊也皇邸以版為屏而飾以鳳羽也朝日祀五帝朝日謂春分朝日於東門之外祀五帝謂四時迎氣於四郊朝音條則張大次小次設重帟重案大次以侯止息小次以候行禮重帟謂兩重之帟重案謂案上設重席也合諸侯亦如之如朝日祀五帝之事師田師以用衆田以簡衆則張幕設重帟重案王臨視則張幕于地而設帟案于上以為王之位也諸侯朝覲會同諸侯來朝覲會同于王則張大次小次以待諸侯之止息者師田諸侯從王師田則張幕設案以待諸侯止而據也孤卿有邦事三孤六卿以王命出使也則張幕設案張幕於庭以籍幣設案為位王立於前而授之命焉凡喪王則張帟三重諸侯再重孤卿大夫不重凡祭祀張其旅幕旅衆也以待諸臣助祭者之休息也張尸次尸尊故别設次射則張耦次射禮兩人為一耦張次以待射耦之人也掌凡邦之張事大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人為王治藏之長掌九貢九賦九功之二九功九職也九貢九賦九職太宰掌之而此掌其二者以其物入太府故也以受其貨賄之入金玉曰貨布帛曰賄皆受其入頒其貨于受藏之府受藏內府也頒其賄于受用之府受用外府也蓋太府雖受貨賄之入其物仍分置於衆府也凡官府都鄙之吏及執事者受財用焉官府謂六官都鄙謂采地吏謂羣臣執事謂府史胥徒皆於太府受其財用凡頒財頒財如下文所云以式法授之式謂用財之式法謂治財之法關市之賦以待王之膳服關市以下即太宰之九賦膳服以下即大宰之九式此蓋以關市之賦待膳服之用也膳服大宰作羞服邦中之賦以待賓客以邦中之賦待賓客之用四郊之賦以待稍秣以四郊之賦待稍秣之用稍秣大宰作芻秣稍去聲家削之賦以待匪頒以家削之賦待匪頒之用削所教反與稍同邦甸之賦以待工事以邦甸之賦待工事之用邦縣之賦以待幣帛以邦縣之賦待幣帛之用邦都之賦以待祭祀以邦都之賦待祭祀之用山澤之賦以待喪紀以山澤之賦待喪紀之用喪紀大宰作喪荒幣餘之賦以待賜豫以幣餘之賦待賜豫之用賜豫大宰作好用凡邦國之貢以待弔用以九貢之財給弔用凶禮之事凡萬民之貢以充府庫以九賦之財充足藏貨賄之府庫凡式貢之餘財以共玩好之用謂九式九貢二者所用之餘財乃可共玩好之用明玩好非所急也凡邦之賦用取具焉賦用者以賦之所入而用也取具者取足於太府也歲終則以貨賄之入出會之入謂所收出謂所用至歲終則總計其大數也會音檜玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人主藏金玉器用之府掌王之金玉玩好兵器凡良貨賄之藏金玉人所寶者玩則可悅玩之物好則可樂好之物兵則兌之戈和之弓之類器則赤刀𢎞璧琬琰之類良貨賄則質出於自然而美者皆玉府之所藏共王之服玉佩玉珠玉服玉謂大圭之類佩玉謂珩璜之類珠玉則琢玉為珠以飾冠冕也王齊則共食玉祭祀齊戒則共王所食玉屑大喪共含玉復衣裳角枕角柶掌王之燕衣服袵席牀笫凡褻器燕衣服謂燕私所服袵卧席也席坐席也牀笫簀也褻器私褻所用之器笫側美反若合諸侯謂盟會也則共珠槃玉敦敦亦盤類以珠飾盤以玉飾敦盟會歃血時以盤盛血以敦盛食也敦音對凡王之獻金玉兵器文織良貨賄之物王之獻謂有獻於賓客文織謂帛之有文出於織成者受而藏之以待用也凡王之好賜謂王有私恩頒賜臣下共其貨賄玉府則共其用也內府中士二人府一人史二人徒十人主良貨賄藏在內者掌受九貢九賦九功之貨賄良兵良器貨賄即大府所頒于受藏之府者良兵良器即受于玉府者以待邦之大用非冇國之經用故以待大事之用也凡四方之幣獻之金玉齒革兵器凡良貨賄入焉幣謂諸侯贄禮獻謂諸侯貢物金若惟金三品之類玉若球琳琅玕之類齒若象牙之類革若犀皮之類皆入于內府焉凡適四方使者王遣使至諸侯之國共其所受之物而奉之使者所受以遺諸侯之物內府則共奉之凡王及冢宰之好賜豫則共之冢宰待四方賓客之小治或有所善亦賜豫之外府官如內府數者主泉貨藏在外掌邦布之入出布泉也其藏曰泉其行曰布入出謂受之復出之以共百物而待邦之用凡有法者百物或作之或買之待猶給也言有法則無法者不可用矣共王及后世子之衣服之用以見王及后世子非法弗服也凡祭祀賓客喪紀會同軍旅五者所用亦皆有法共其財用之幣齎幣謂禮幣齎謂行齎齎音咨賜豫之財用王及冢宰之賜豫也凡邦之小用皆受焉細小之用係於邦者受而共之歲終則會唯王及后之服不會以見世子衣服在所會也會音檜司會中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人主會計官之長掌邦之六典八法八則之二以逆邦國都鄙官府之治小宰已掌其二而司會亦掌之者蓋其職在會計故逆受而鉤考之所以計其治也以九貢之法致邦國之財用九貢出於諸侯司會則取一曰祀貢以下之成法貢於天子故云致邦國之財用以九賦之法令田野之財用九賦除關市國中幣餘三者外餘皆出於田野據多言之以九功之法令民職之財用九功者以九職任萬民使之出稅故云民職以九式之法均節邦之財用九式所以用九賦使之均平有節也掌國之官府郊野縣都之百物財用凡在書契版圖者之二諸處百物皆資財用以成司會欲知財用出入之數故掌其書契紀載為書合驗為契欲知夫家山林川澤所入之財數故掌其版圖人民曰版土地有圖二副也以逆羣吏之治而聽其會計逆謂有所治正則司會按書契版圖以逆之而又聽其會計之書焉以參互考日成諸數官府一日所蒞之事有總日其數而計之有目總十之數而結之有凡以凡考目以目考數是之謂參凡與數相考數與目相考是之謂互日成即旬計也以月要考月成月計曰要月成事多於日成故以月要考之以歲會考歲成歲計曰會歲成事多於月成故以歲會考之以周知四國之治如此則四方諸侯之治無不遍知之矣以詔王及冡宰廢置以四國之治告於王及冡宰有功者升而置之有罪者黜而廢之司書上士二人中士四人府二人史四人徒八人主會計之簿書掌邦之六典八法八則九職九正九事邦中之版土地之圖典法則見太宰九正謂九職之正九事謂九職之事邦中之版以考人民之數土地之圖以考邦國之域然司書但掌其書而已參考則在司會正音征以周知入出百物或入而藏或出而用皆遍知之以敘其財然後以敘掌事者之財以知其餘受其幣受官府都鄙凡用邦財之幣所餘使入于職幣以其餘入于職幣使振舉之凡上之用財用公上所用必考于司會司書録其數以待司會之勾考三歲則大計羣吏之治日有成月有要歲有會三歲又總而大計之以知民之財器械之數民財謂幣帛器械謂弓矢殳矛之類以知田野夫家六畜之數田野謂百畝之田在野者夫家謂男女夫婦六畜謂馬牛羊豖雞犬也以知山林川澤之數山林川澤孰廢孰興皆可周知以逆羣吏之徵令恐羣吏橫斂征取於民故逆受而勾考之上有所召曰徵下有所稟曰令凡稅斂謂非特貢賦所出也掌事者受法焉法各有書司書掌之掌稅斂之事者從而受焉及事成則入要二焉要二者物數之要要書之二也事成則入于司書所以備參考也凡邦治考焉比治於邦者司書則早正其事以待其來考也職內上士二人中士四人府四人史四人徒二十人主賦入者掌邦之賦入九職九貢九賦所入皆掌之辨其財用之物而執其總辨其所入財用之物而執其總類之數以二官府都鄙之財入之數二謂副二文書也官府都鄙各有財入總數職內則書其二焉以逆邦國之賦用用賦多少皆可勾考其得失也凡受財者受於職內以給公用者受其二令而書之書其副寫之令而籍之也及會及至歲終會計以逆職歲與官府財用之出官府用財之數與職歲出財之數相參而勾考之而敘其財理其財使有序然後餘財可得而知以待邦之移用故可移此之有餘以補彼之不足職歲上士四人中士八人府四人史八人徒二十人主歲計之所出掌邦之賦出職內主入職歲主出以二官府都鄙之財出賜之數官府都鄙之財各有出賜之數職歲亦書其二焉以待會計而考之以待歲終會計而稽考其數凡官府都鄙羣吏之出財用每歲合出財用受式法于職歲羣吏受財用于大府至其出也則受式法于職歲焉凡上之賜豫謂上以私恩賜豫以敘與職幣授之敘者先後之倫職歲則以敘與職幣授之及會歲終會計以式法贊逆會以式法贊助司會勾考會計之事職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人掌財賦之出者掌式法以斂官府都鄙與凡用邦財者之幣凡用邦財者謂軍旅也三者有餘幣則依式法而收斂之振掌事者之餘財振猶拯也有檢舉之意掌事者足用而有餘則職幣檢舉之以防隱欺之患皆辨其物而奠其録別其物色而定其録籍以書揭之著之於書以表識之揭音碣以詔上之小用賜豫上有小可用度及賜豫則取具於此歲終則會其出會計所出之數以防乏用之患凡邦之會事凡諸官府會計財用之事以式法贊之職幣以式法贊助司會而勾考之司裘中士二人下士四人府二人史四人徒四十人主以獸皮為裘掌為大裘黑羔為之以共王祀天之服祀天尚質故用黑羔為裘中秋獻良裘裘之美者王者所服故於中秋獻之王乃行羽物以羽鳥之物行賜羣臣季秋獻功裘功裘致人功為之卿大夫所服故於季秋獻之以待頒賜以頒賜於羣臣王大射王將祭祀以射選助祭之人則共虎侯熊侯豹侯虎熊豹者各以其皮飾侯之側也虎侯王所射熊侯諸侯所射豹侯孤卿大夫以下所射也設其鵠亦以虎熊豹之皮栖於侯上以為射之的焉諸侯則共熊侯豹侯諸侯謂畿外諸侯也熊侯諸侯自射之豹侯則羣臣共射焉卿大夫則共麋侯卿大夫謂王朝卿大夫也以麋皮飾侯君臣共射之皆設其鵠各以其皮為射之的大喪廞裘飾皮車凡邦之皮事掌之歲終則會唯王之裘與其皮事不會優至尊也掌皮下士四人府二人史四人徒四十人主共皮革以作器物掌秋斂皮秋鳥獸毛毨之時其皮善故秋斂之冬斂革獸皮治去其毛曰革其用功深故冬斂之春獻之皮革乾久乃可用故春獻之遂以式法頒皮革于百工既獻皮革遂以式法頒之百工以作器物共其毳毛為氊其毛之細者以為氊以待邦事若掌次張氊案則共之也歲終則會其財齎泉布曰財行貨曰齎會謂計其費用之數內宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人掌宫中之事掌書版圖之法版謂宫中閽寺之籍圖謂宫中官府之象以治主內之政令內謂宫中政令謂治閽寺之法禁均其稍食均其吏之廩祿分其人民以居之人民謂吏之子弟居之謂使之宿衛也以隂禮教六宫隂禮婦人之禮六宫謂后也王后立六宫正寢一燕寢五也以隂禮教九嬪不言教夫人及世婦者舉中以見上下也以婦職之法教九御婦職謂織維組紃縫線之事九御者女御八十一人九九而御于王謂每九人當一夕也使各有屬每九人屬一嬪以作二事合絲枲之事正其服一其禮也禁其奇邪齊其行也竒紀宜反展其功緒核其事也大祭祀宗廟之祭后祼獻則贊祼謂王既祼而出迎牲后乃從後祼也獻謂王薦牲薦熟后亦從後獻也贊助也瑤爵亦如之尸卒食王既酳后后亞獻之其爵以瑤玉為飾亦內宰贊助其禮正后之服位服謂禕衣以下六服位謂房內戶中及阼所立處而詔其禮樂之儀詔其出入進止之節使與禮樂相應贊九嬪之禮事助九嬪贊后之事凡賓客之祼獻瑤爵皆贊王禮賓而后亞祼王獻賓而后亞獻王酬賓而后以瑤爵酬賓者皆內宰贊之致后之賓客之禮后致飲于賓客之禮則酒人共之而內宰致之也凡喪事佐后使治外內命婦正其服位凡建國建立國都佐后立市王立朝而后立市內宰佐之設其次司市所居置其敘胥師賈師等所居正其肆諸行列肆之等陳其貨賄諸物皆陳列之出其度量淳制度謂丈尺量謂斗斛淳謂幅之廣制謂匹之長淳音準祭之以隂禮婦人之禮中春詔后帥內外命婦始蠶于北郊外命婦諸臣之妻內命婦三夫人以下仲春始蠶之時也北郊正隂之地也以為祭服以親蠶而為祭服敬之至也歲終則會內人之稍食計嬪御之廪給稽其功事考絲枲之功事佐后而受獻功者內宰助后而受女御所獻絲枲之功比其小大與其粗良而賞罰之布帛縷小則良縷大則粗良則賞之粗則罰之會內宫之財用計夫人以下所用財正歲均其稍食均其廩給施其功事施其絲枲之事憲禁令于王之北宫而糾其守北宫後宫也表縣禁令于北宫而糾宿衛之怠慢者上春詔王后帥六宫之人而生穜稑之種而獻之于王先種後熟曰穜後種先熟曰稑上春正歲春事將殷之時以助王親耕也穜五龍反稑音六內小臣奄上士四人史二人徒八人閉此后之小臣以奄人為之奄謂精氣藏者掌王后之命命謂使令所為正其服位見內宰注后出入則前驅以其掌后之命故后出入則前驅而往也若有祭祀賓客喪紀祭祀吉禮賓客賓禮喪紀凶禮則擯詔后之禮事三者有禮必有事擯則若執事介賓也詔則告之以言也相九嬪之禮事相以助之相去聲正內人之禮事正以齊之嬪詔相正不同異尊卑也徹后之俎后於祭祀授俎於房既事則徹去之后有好事於四方則使往好事謂恩好之事四方謂族親為四方諸侯者使往問遺之有好令於卿大夫則亦如之好令謂恩好之令卿大夫謂族親有位於朝者也掌王之隂事隂令隂事謂進御之事隂令謂王有所求為於北宫之令閽人王宫每門四人囿遊亦如之主晨昏之啓閉掌守王宫之中門之禁王之門有五臯門庫門雉門應門路門中門謂雉門喪服凶器不入宫為其不祥潛服賊器不入宫為其害人潛服衣甲之類奇服怪民不入宫為其惑衆凡內人公器賓客無帥則幾其出入以時啓閉凡外內命夫命婦出入內命夫卿大夫之在宫中者命婦見內宰則為之闢開闢左右行人掌掃門庭大祭祀喪紀之事設門燎蹕宫門廟門凡賓客亦如之寺人王之正內五人寺之言侍也掌王之內人及女宫之戒令內人女御也女宫刑女在宫中者戒以飭其怠忽令以使之有為相道其出入之事而糾之相為之右道為之先糾察其違戒令者若有喪紀賓客祭祀之事則帥女宫而致於有司佐世婦治禮事掌內人之禁令凡內人弔臨於外則帥而往立於其前而詔相之內豎倍寺人之數名豎未冠者之官掌內外之通令凡小事內后六宫也外卿大夫也童子出入便疾故使之通命令治小事焉若有祭祀賓客喪紀之事則為內人蹕蹕止行人也王后之喪遷于宫中則前蹕及葬執褻器以從遣車九嬪王后立六宫三夫人九嬪二十七世婦八十一御妻不列夫人於此官者夫人之於后猶三公之於王無官職也掌婦學之法如下文所云以教九御婦德婦言婦容婦功九御詳見內宰注婦德謂貞婦婦言謂辭令婦容謂婉娩婦功謂絲枲各帥其屬而以時御敘于王所女御八十一人分屬九嬪以次序而進于王之燕寢凡祭祀贊玉齍王齍受黍稷器以玉為之齍音咨贊后薦徹豆籩若有賓客則從后大喪帥敘哭者亦如之世婦即二十七世婦也掌祭祀賓客喪紀之事謂在廟時帥女宫而濯溉洗祭器也水滌為濯手拭為溉溉古愛反為齍盛為治擇也黍稷曰齍在器曰盛及祭之日當祭日涖陳女宫之具春官世婦宫卿比女宫之具而此則臨視之涖音利凡內羞之物內羞房中之羞盛物以薦掌弔臨于卿大夫之喪王使往弔女御即八十一御妻也掌御敘于王之燕寢以九九而敘進以歲時獻功事歲終之時獻絲枲之功事凡祭祀贊世婦大喪掌沐浴后之喪持翣從世婦而弔于卿大夫之喪女祝四人奚八人者女人掌祈祝掌王后之內祭祀凡內禱祠之事內祭祀若五祀之類祈福曰禱報福曰祠掌以時招梗禬禳之事招以召祥梗以礙災禬以會福禳以禳禍禬古外反以除疾殃氣不行為疾禍適當為殃四者所以除疾殃也女史八人奚有十六人女人掌文史者掌王后之禮職后於禮事所當職者掌內治之二內宰治王內之政令而女史二之以詔后治內政王后治內政而女史詔之逆內宫於后宫之事有所逆而治正之書內令於后宫之令有所書而宣布之凡后之事以禮從后舉則以禮籍從焉猶太史之從王也典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人主婦人絲枲功官之長掌婦式之法婦式謂婦人事之模範法謂用財舊數也以授嬪婦及內人女功之事齎嬪婦外嬪婦也內人女御也女功絲枲之功齎行費也授事者授其所為女功之事授齎者授其所為女功之齎也凡授嬪婦功授當為受及秋獻功嬪婦所為之功及秋物成之時獻之于后辨其苦良比其小大而賈之布帛縷小則良善縷大則粗苦以此而定其賈良則貴之苦則賤之苦音古賈音價物書而揭之物物而書其價以揭示之以共王及后之用取其良者以共貴者之用頒之于內府以待邦之大用典絲下士二人府二人史二人賈四人徒十有二人主婦功治絲事掌絲入而辨其物絲入謂九職嬪婦所貢之絲因而辨其物之美惡以其賈揭之又以所直之賈揭而示之掌其藏與其出藏以待用出以給用以待興功之時造縑帛織文繡各有所宜之功頒絲于外內工外工外嬪婦也內工女御也當興功之時則各頒之皆以物授之若縑帛則授以素絲文繡則授以采絲凡上之賜豫亦如之亦以其物授之及獻功秋獻女功之時則受良功而藏之良當為苦受其粗苦之功以給有司之功用其良功則典婦功受之辨其物而書其數辨其物之美惡書其數之多寡以待有司之政令上之賜豫有司之政令謂禮物法物之正也上之賜豫謂以絲而頒豫也凡祭祀共黼畫組就之物喪紀共其絲纊組文之物凡飾邦器者受文織絲組焉邦器茵席屏風之屬授之典絲歲終則各以其物會之歲終之時則會計其所用典枲下士二人府二人史二人徒二十人枲麻也主婦功治枲事掌布緦縷紵之麻草之物布緦縷用麻之物紵用草之物以待時頒功而授齎以待興功之時頒之女工而授以所為之齎及獻功秋獻女功之時受苦物其良功入于典婦功以共王及后之用以其賈揭而藏之與典絲同意以待時頒以待用時而頒之也頒衣服授之當頒衣服之時各以其物授之賜豫亦如之上之賜豫亦然歲終則各以其物會之內司服奄一人女御二人奚八人之主裁縫官之長以奄人為掌王后之六服其目在下禕衣禕與翬同伊雒而南素質五色皆備成章曰翬揄狄狄與翟同江淮而南青質五色皆備成章曰揄闕狄闕狄刻而不畫此三者皆祭服鞠衣色象桑葉始生告桑之服也鞠音菊展衣以禮見王及賓客之服也緣衣御于王之服亦以宴居推次其色則緣衣黑展衣白鞠衣黃闕狄赤揄狄青禕衣玄素沙今之白絹也六服皆以素沙為裏辨外內命婦之服外內命婦見內宰注鞠衣展衣緣衣素沙內命婦女嬪服鞠衣世婦服展衣女御服緣衣外命婦孤之妻服鞠衣卿大夫之妻服展衣士之妻服緣衣亦皆以素沙為裏凡祭祀賓客共后之衣服及九嬪世婦凡命婦共其衣服共喪衰亦如之后之喪共其衣服凡內具之物縫人奄二人女御八人女工八十人奚三十人主裁衣者掌王宫之縫線之事掌王宫裁縫及所用之線以役女御為女御所役使以縫王及后之衣服女御掌造王及后之衣服縫人則為之役也喪縫棺飾焉衣翣栁之材掌凡內之縫事染人下士二人府二人史二人徒二十人主染事者染去聲掌染絲帛染絲者染而後織染帛者織而後染凡染所染之時春暴練春陽燥達故暴晒其練暴音曝夏纁玄夏暑潤易可和釋故染纁玄而為祭服秋染夏夏翟至秋五色皆備染者擬以為度秋氣涼可以染五色夏上聲冬獻功冬至功成並獻之于王也掌凡染事追師下士二人府一人史二人工二人徒四人追治玉石者追音堆掌王后之首服如下文所云為副編次副所以覆首為之飾編列髮為之次次第髮長短為之追衡笄追治也王后之衡笄以玉為之副配禕揄編配闕鞠次配展緣衡則維持冠而平之也笄則卷髮而節之使平也笄音雞為九嬪及外內命婦之首服衣鞠衣展衣者服編衣緣衣者服次以待祭祀賓客凡此以待祭祀賓客之用也喪紀共笄絰亦如之屨人下士二人府一人史一人工八人徒四人主為屨者掌王及后之服屨著屨必隨其服之色為赤舄復下四舄赤舄者天子六冕后闕狄之舄也黑舄天子玄端服之赤繶黃繶以赤黃之絲為下緣繶音億青句以青絲飾屨頭之鼻句音劬素屨祿下曰屨素屨有凶去飾用之葛屨夏衫絺綌以葛為屨冬則以皮為之辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之四時祭祀所用之服屨各有其宜夏采下士四人史一人徒四人掌大喪以冕服復于太祖以乘車建綏復于四郊求之王平生常所有之事處乘車玉路于大廟以冕服不出宫也四郊以綏出國門此行道也復謂始死招魂復魂也周禮句解卷二
