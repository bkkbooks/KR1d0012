body:
  text: 周禮句解目録禮類一周禮之屬卷一天官冢宰上卷二天官冢宰下卷三地官司徒上卷四地官司徒下卷五春官宗伯一卷六春官宗伯下卷七夏官司馬上卷八夏官司馬下卷九秋官司寇上卷十秋官司寇下卷十一冬官考工記上卷十二冬官考工記下臣等謹案周禮句解十二卷宋朱申撰是書逐句詮釋大略根據注疏義取簡約其中所見有與注疏異者則顯易其説若太宰之職五曰貢職鄭注曰賦口率出泉也貢功也九職之功所稅也而是書則易之曰賦稅也貢獻也有力主注疏而曲為引證者若大司徒諸公之地封疆方五百里以下則堅守注中半為附庸之説而不執孟子王制以疑周禮至於注疏之是非疑不能決者若小司徒四邑為甸以下注謂旁加之數乃治洫澮之數大司樂圜鍾為宫以下注謂天宫夾鐘不用中吕等律以其與地宫同位之類則皆闕而不載雖循文訓詁無大發明而較之竄亂古經橫生新義者猶不失謹嚴之義惟序官乃經文之綱領申以其無假詮釋遂削而不載頗乖體要是則因陋就簡之失亦不必曲為之諱矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
