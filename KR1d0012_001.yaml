body:
  text: 周禮句解卷一宋朱申撰周禮成王幼周公以叔父而攝政制禮作樂以致太平及歸政之日因典章文物之盛著為六典實周家一代之禮天官冡宰第一周家取法天地四時以建六官冢宰曰天官者以其總御衆官猶天道統理萬物也冢大也司徒司馬司冦司空皆曰司以其各主一官也冢宰兼總六官故不言司也宗伯亦不言司者以祭祀鬼神非人所主也天官冢宰上惟王建國王三代君天下之稱也國王者所都也此言周王之建立都國辨方正位辨別東西南北之四方而正祖社朝市之位體國經野體猶分也經猶畫也城中曰國郊外曰野體國營其國之宫城門涂猶人身之有四體經野治其野之丘甸溝洫如織之有經緯設官分職設置也分别也官猶冢宰司徒之類職猶掌治掌教之類以為民極以為斯民至極之標準乃立天官冢宰於是建立天官冢宰之職使帥其屬而掌邦治邦治謂總六官之職也天官其屬六十冢宰帥之而掌邦治焉帥音率屬音蜀治去聲凡方欲治之者係活字皆平聲已治政治等係死字皆去聲後可以意求之以佐王均邦國以佐助天子而均齊天下之邦國大宰之職卿一人職大宰即冢宰也兼總六官故曰冢宰列於王故曰大宰職所掌之事也掌建邦之六典建立也邦國也典常法也六典其目在下以佐王治邦國不言均邦國者治則理之而已均則治之盛也大宰用此六典輔佐王者理天下一曰治典天官之典以經邦國經猶緯之有經治邦國有節制之道故以經言以治官府百官所居曰府以紀萬民紀猶綱之有紀治萬民者務致其詳故以紀言二曰教典地官之典以安邦國安寧之也以教官府教訓之也以擾萬民擾馴之也謂順民之性而不拂其宜三曰禮典春官之典以和邦國和不乖也以統百官統猶合也禮典以下不曰官府而曰百官者尊天地二官不局其數也以諧萬民諧調也四曰政典夏官之典政軍政也以平邦國軍政所以平定天下故曰平以正百官政者正也以均萬民有貢賦之事故云均五曰刑典秋官之典以詰邦國詰問也隱而難知故謂之詰詰起乙反以刑百官顯而易見則直刑之而已以糾萬民糾猶察也六曰事典冬官之典以富邦國富豐於財也以任百官任猶使也以生萬民生猶養也以八法治官府八法其目在下官府注見上法古法字一曰官屬六官之屬以舉邦治舉而行之二曰官職六官所治之事謂之職以辨邦治其職各有司存故曰辨三曰官聯聯謂通職連事以相佐助以㑹官治邦治總官民而言官治指官府而言衆官共舉則事得㑹合而成四曰官常常謂以昔所常行者著之於例以聽官治百官違其常者則以此而聽察之五曰官成成謂載之簡書以為著令以經邦治經謂以之繩墨於民六曰官法官府所奉行之法以正邦治正謂以之整齊其民七曰官刑治官府之刑以糾邦治糾察也八曰官計平治官吏之計以弊邦治弊斷也弊音蔽以八則治都鄙則亦法也其詳由法其略曰則都鄙公卿大夫所食之采地也以其有邑故謂之都以其在國之鄙故謂之鄙八則其目在下一曰祭祀宗廟社稷諸神之祀以馭其神馭猶馬之在馭祭祀有廢置故言馭其神馭音御二曰法則此宫中之法則以馭其官官之所守惟法則之從故言馭其官三曰廢置有罪則廢有行則置以馭其吏官謂治事者吏謂治人者四曰祿位祿俸也位爵也以馭其士吏謂已仕者士謂未仕者五曰賦貢賦稅也貢獻也以馭其用都鄙之用度量貢賦之所入以為出六曰禮俗以禮節其風俗以馭其民不求變俗而禮行焉七曰刑賞刑以懲惡賞以勸善以馭其威獨言威者欲民之畏刑而為善則蒙賞者衆矣八曰田役因四時之田而役使之以馭其衆田以簡衆役以任衆以八柄詔王馭羣臣柄猶器之有柄詔告也八柄者天子所以馭羣臣非人臣所可預故冢宰以詔於王一曰爵謂內則公卿大夫士外則公侯伯子男也以馭其貴有爵則貴故爵所以馭貴二曰祿祿仕者之俸也以馭其富有祿則富故祿所以馭富三曰豫爵祿之外有所賜也豫音與以馭其幸出於特恩故曰幸四曰置置之於位以馭其行以其人有賢行行下孟反五曰生生猶養也以馭其福臣有勳勞而祿及子孫是福祐之也六曰奪臣有罪而沒其家財以馭其貧奪其所有故貧七曰廢不忍殺之放之以逺以馭其罪以其人有罪也八曰誅責也以馭其過罪重故放之過輕故誅之謂責之以言也以八統詔王馭萬民統言舉於此而彼從之王躬行於上而民從之故八統可以馭萬民也一曰親親親睦九族二曰敬故敬重故舊三曰進賢有德者進用之四曰使能有才者役使之五曰保庸安有功者六曰尊貴榮冇爵者七曰達吏吏謂在下位者達謂進之於上八曰禮賓賓謂諸侯禮謂與之行賓主揖遜之禮以九職任萬民以九者職業任使萬民一曰三農山澤平地三等之農生九穀生種也九穀謂黍稷稻梁秫苽麻麥豆也二曰園圃樹瓜果曰圃園其樊也育草木育與育同謂順草木之性而養之也三曰虞衡掌山澤之官作山澤之材山澤所産之材作而用之四曰藪牧藪無水之地牧有畜之地藪音叟養蕃鳥獸養畜也蕃盛也飛曰鳥走曰獸五曰百工興事造業謂之工飭化八材勤力以化八者之材八材謂珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰柝六曰商賈行貨曰商坐貨曰賈賈音古阜通貨賄阜盛也金玉曰貨布帛曰賄賄呼罪反七曰嬪婦嬪有夫者婦有姑者嬪音頻化治絲枲化治者化而後治之也絲繭之已繅者枲麻之未緝者枲絲里反八曰臣妾臣男之賤者妾女之賤者聚斂疏材聚斂謂蓄積之疏材百草根實可食者疏音疏九曰閒民無事業者閒音間無常職八職有常此獨無常轉移執事若今庸雇為工作者以九賦斂財賄上取於下曰賦斂聚也財帛布也此九者取於任地與餘財非取於民者一曰邦中之賦在城郭者二曰四郊之賦四郊謂四方之郊去國百里六鄉之賦三曰邦甸之賦去國二百里四曰家削之賦去國三百里以大夫所食采邑在焉故曰家削削所教反五曰邦縣之賦去國四百里六曰邦都之賦去國五百里七曰關市之賦關以征其貨之出入市以征其貨之所在八曰山澤之賦虞衡所掌山澤之財九曰幣餘之賦職幣所斂掌事之餘財以九式均節財用式謂用財之節度均節之使無有餘不足之患一曰祭祀之式祭祀有大小其禮各有豐殺二曰賓客之式諸侯之君為賓諸侯之臣為客其禮各有等差三曰喪荒之式喪有賵􅉠含禭之禮荒有散利遺民之費四曰羞服之式羞飲食也服衣裳也五曰工事之式百工之事各有作器物之法六曰幣帛之式幣帛所以贈勞賓客者七曰芻秣之式草謂之芻穀謂之秣所以養牛馬也八曰匪頒之式匪分也頒賜也王所分賜羣臣也九曰好用之式因其所好而用之蓋上之私恩也以九貢致邦國之用下供於上曰貢言致者明非取之而自至也一曰祀貢犧牲苞茅之屬二曰嬪貢絲枲之屬三曰器貢錢鐵石磬之屬四曰幣貢玉馬皮帛之屬五曰材貢栝柏篠簜之屬六曰貨貢金玉龜貝之屬七曰服貢絺紵之屬八曰斿貢珠璣琅玕可供燕游之物斿音游九曰物貢九州所産雜物以九兩繫邦國之民兩猶耦也繫猶綴也所以協耦萬民而聯綴不散者有此九事繫音計一曰牧謂九州之牧也或曰邦國之牧以地得民各有分地得以服民二曰長都鄙之長以貴得民食其祿而不得其地故但以貴得民三曰師謂國家學校之師以賢得民以其賢德可為人之模範也四曰儒謂黨學里校之典教者以道得民以其有道足以感化乎民也五曰宗謂大宗之宗子以族得民先王以大宗合天下之族六曰主大夫之治都鄙而不為長者以利得民采地之利足以得民七曰吏鄉遂都鄙之吏以治得民既專其政則民亦悅其治八曰友鄉田之民出入相友以任得民相任以事故以事相得九曰藪澤藪財物所生以富得民其利富厚故以富得民正月之吉周以建子之月為正吉則其朔日也正音政始和布治于邦國都鄙始調和六典以下之事而頒布此治職文書于邦國之諸侯都鄙之卿大夫乃縣治象之法于象魏象魏即雉門兩觀也以天官之治法畫之為象而縣於象魏縣音𤣥使萬民觀治象使人觀治象而遵行之挾日而斂之一旬為挾必挾日乃收斂者使逺近遍知之挾音浹乃施典于邦國以六典治邦國故也而建其牧牧即所謂以地得民者立其監公侯伯子男各監一國設其參卿三人參七男反傅其伍大夫五人陳其殷殷衆也謂上士中士下士也置其輔府史胥徒乃施則于都鄙以八則治都鄙故也而建其長長即所謂以貴得民者立其兩兩謂兩卿設其伍陳其殷置其輔並見上注乃施法于官府以八法治官府故也而建其正謂總其衆職者立其二謂佐其正官者設其考謂考其成績者陳其殷置其輔並見上注凡治大凡為治之道其目在下以典待邦國之治六典本以治邦國也待謂待其成而考之以則待都鄙之治八則本以治都鄙也以法待官府之治八法本以治官府也以官成待萬民之治八成本以治萬民也以禮待賓客之治禮者本以接賓客也祀五帝祭祀五方之帝謂大昊少昊炎帝黃帝顓頊上古有德之君則掌百官之誓戒與其具修百官謂與祀者誓者折之以言戒者飭之以事具所以供其物修所以理其壞前期十日未祭以前散齊七日致齊三日帥執事而卜日執事謂百官執祭事者大宰帥之以卜祭日遂戒戒散齊也卜既得日遂戒百官以始齊及執事及至祭之前夕執事之時視滌濯滌濯謂洗祭器大宰則親視之及納亨向祭之晨納牲告殺既殺乃授亨人亨音烹贊王牲事君親牽牲大宰贊之及祀之日旦明將祀之時贊玉幣爵之事玉帛以禮神各如其方之色爵所以獻神齊酒也三者執以從王至而授之祀大神示亦如之祀天神地示皆如祭五帝之禮示音祇享先王亦如之享宗廟之禮亦然贊玉几玉爵玉几所以依神别言贊玉几玉爵者以言祀五帝及大神示不用玉几玉爵也大朝覲㑹同春見曰朝秋見曰覲時見曰㑹殷見曰同舉春秋則冬夏可知朝音潮贊玉幣玉獻玉几玉爵玉幣謂諸侯享幣也玉獻獻國珍異也玉几王所依也玉爵王禮諸侯之酢爵也大喪天子之喪贊贈玉含玉贈玉謂既窆以贈先王含玉謂將斂飯含之玉含尸暗反作大事國之大事在祀與戎則戒于百官大宰戒飭百官贊王命贊助王之教令王眂治朝眂朝謂臨朝也治朝在路門外則贊聽治助王以聽天下之治眂四方之聽朝亦如之聽朝謂王巡狩於四方之時亦如贊聽治焉凡邦之小治非關於王視朝之小事則冢宰聽之大事決於王小事冢宰專決待四方之賓客之小治王視四方之朝於方嶽之下則冡宰為之待四方賓客之小治歲終每歲之終則令百官府遍飭百官之府各正其治各使之自正其治受其㑹受其一歲功事之計會音檜聽其致事聽其所致以告於上之事而詔王廢置如此則百官之能否可見矣於是以告於王而廢之置之三歲三年則大比則大計羣吏之治言大計者以見歲終之計為小而誅賞之大無功則不徒廢更加之罪大有功則不徒置更加之賞小宰之職中大夫二人小大宰之二故曰宰掌建邦之宫刑宫刑在王宫中之刑建明而布告之以治王宫之政令凡宫之糾禁違其政令者未發則糾察之既發則禁止之掌邦之六典八法八則之二六典八法八則之書其正在大宰太史司書小宰則副掌其書也以逆邦國都鄙官府之治逆謂迎受勾考也六典以逆邦國之治八法以逆官府之治八則以逆都鄙之治執邦之九貢九賦九式之二三者以大宰所掌故小宰副二以執之以均財節邦用均財使得其平節邦用使之無過以官府之六叙正羣吏以六者叙其倫之先後一曰以叙正其位謂卿大夫朝位有尊卑次列之叙二曰以叙進其治謂有治職功狀進于上者亦有先尊後卑之叙三曰以叙作其事謂有所執掌起事者亦先尊後卑也四曰以叙制其食因爵命之尊卑以制其祿五曰以叙受其㑹謂進㑹計文書受之亦以尊卑為叙六曰以叙聽其情謂獄訟之情聽之亦以尊卑為叙以官府之六屬舉邦治六官之長各有屬官佐之然後邦治可舉而行一曰天官大宰之官其屬六十謂宫正以下曰六十者舉大數也後五官倣此掌邦治皆掌治職大事則從其長事之大者則從于大宰之長小事則專達事之小者則屬官得專行之二曰地官司徒之官其屬六十州長以下掌邦教皆掌教職大事則從其長從大司徒小事則專達同上三曰春官宗伯之官其屬六十鬱人以下掌邦禮皆掌禮職大事則從其長從大宗伯小事則專達同上四曰夏官司馬之職其屬六十司勳以下掌邦政皆掌政職大事則從其長從大司馬小事則專達同上五曰秋官司寇之官其屬六十卿士以下掌邦刑皆掌刑職大事則從其長從大司寇小事則專達同上六曰冬官司空之官其屬六十冬官闕不可考掌邦事皆掌事職大事則從其長從大司空小事則專達同上以官府之六職辨邦治六官之職不同故邦治得以分辨一曰治職天官之職以平邦國邦國不得專利而過制以均萬民萬民不得擅利而獨侈以節財用上下皆無泛用故財用可節也二曰教職地官之職以安邦國修文德以安之以寧萬民修文德以寧之寧者安之至也以懷賓客近者悅而逺者來故賓客可懷也三曰禮職春官之職以和邦國和不乖也以諧萬民諧猶調也以事鬼神人和而神降之福故鬼神可事也四曰政職夏官之職以服邦國服則使之順於王以正萬民正則使之止於一以聚百物貢出於邦賦斂於民服之正之故百物可聚也五曰刑職秋官之職以詰邦國詰問也以糾萬民糾察也以除盜賊姦無所容故盜賊可除也六曰事職冬官之職以富邦國豐其財也以養萬民養其生也以生百物上下兼足則無曠土遊民故百物可生也以官府之六聯合邦治官府六事皆聯事通職然後邦治得以㑹合而成一曰祭祀之聯事謂大宰贊玉幣司徒奉牛牲宗伯視滌濯司馬羞魚牲司冦奉明水火之類二曰賓客之聯事謂大宰大朝覲㑹同贊玉幣玉獻與小宰大宗伯大行人小行人宰夫掌客所掌賓客之事必聯事合治而後成也三曰喪荒之聯事謂大宰大喪贊贈玉含玉大司徒率衆庶屬具六紖大司徒大荒移民通財小行人令賙委之之類四曰軍旅之聯事謂六軍軍將皆命卿大司徒以旗致萬民大司馬仲春教振旅之類五曰田役之聯事田所以簡衆役所以任衆如大小司徒鄉師大司馬所掌田役之事六曰斂弛之聯事斂民之財弛民之力如大宰掌九貢九賦而大府司㑹司書亦掌之此斂之聯事也鄉大夫國中貴者賢者皆舍征而小司徒亦掌之此弛之聯事也凡小事皆有聯上六者皆大事其餘小事亦皆有聯以官府之八成經邦治官府中成事品式有此八者可以經緯邦治一曰聽政役以比居政謂力政役謂徒役民有爭則以其地比居者共聽之政音征比毗志反二曰聽師田以簡稽簡猶閲也稽猶計也師以用衆田以簡衆皆以簡稽之書聽之三曰聽閭里以版圖在鄉則二十五家為閭在遂則二十五家為里有訟則以戶籍之版土地之圖聽之四曰聽稱責以傅别傅别謂劵書也稱謂貸之以物責謂責其所償皆以傅别之書聽之五曰聽祿位以禮命禮命禮之九命也有爭祿之多少位之前後者則以其書聽之六曰聽取豫以書契謂官貸於民者官之所豫民之所取其責償也則以書契聽之七曰聽賣買以質劑謂兩札一書而長者曰質短者曰劑彼之所買此之所賣皆以其書聽之劑子西反八曰聽出入以要㑹歲計曰㑹月計曰要官給於民曰出民輸於官曰入皆以其計簿聽之以聽官府之六計弊羣吏之治聽平治也弊猶斷也平治官府之計有此六事以斷羣吏之治弊音蔽一曰廉善廉察也善謂善其事有稱譽也二曰廉能能謂才能足以辨事者三曰廉敬不解于位也四曰廉正行無傾邪也五曰廉法守法不失也六曰廉辨不疑惑也以此六者廉察之則吏之能否見矣以法掌祭祀朝覲㑹同賓客之戒具法禮法也戒謂飭其事具謂備其物軍旅田役喪荒亦如之亦以法掌其戒具七事者總上兩節謂自祭祀至喪荒七事令百官府共其財用令百官之府共七者之財用治其施舍施謂施恩惠舍謂舍政役舍音捨聽其治訟理其事謂之治爭其事謂之訟凡祭祀遇有祭祀之事贊王幣爵之事又從大宰助王祼將之事祼酌鬱鬯以獻尸也將送也小宰贊王以行其事凡賓客遇有賓客之事贊祼凡受爵之事凡受幣之事賓客有祼神也受爵謂賓所以酢主之爵受幣謂敬賓如敬賓所以享王之幣三者皆小宰贊之喪荒大喪大荒受其含襚幣玉之事口實曰含衣衾曰襚凶荒有幣玉者賓客所賙委之禮含户暗反禭音遂月終每月之終則以官府之叙受羣吏之要月計曰要受之各以尊卑之叙贊冢宰受歲㑹歲計曰㑹大宰受之小宰助之而已歲終每歲之終則令羣吏致事使六官各致一年功狀以待考也正歲正月之吉帥治官之屬而觀治象之法大宰縣治象之法于象魏小宰帥治官六十之屬而往觀焉徇以木鐸鐸鈴也金口而木舌古者有新令必奮木鐸以警衆曰不用法者謂官屬有不用治象之法者國有常刑國有典常之刑不汝赦也乃退已觀治象而退以宫刑憲禁于王宫憲謂表縣之禁謂止絶之令于百官府令于王宫之百官府曰各修乃職各修其所治之職考乃法各考其所用之法待乃事以待所作之事以聽王命其事皆聽王之所命其有不共其或有不共於王事者則國有大刑大刑則重於常刑也宰夫之職下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人所大宰既有副二又有宰夫謂設其考也掌治朝之法治朝在路門外以正王及三公六卿大夫羣吏之位立朝尊卑之位司士掌之宰夫糾其不如儀者掌其禁令禁謂止其非法令為使之有為叙羣吏之治次叙羣吏所治之事以待賓客之令諸臣之復萬民之逆令謂賓客未至而先為之具備復報也反也謂諸臣奏事者自下而上曰逆謂萬民上書者掌百官府之徴令徵召也百官之在官府上有所召而使之從令辨其八職八職既辨然後知所從之徵令一曰正正謂六官之長僚屬所取正者掌官法以治要官法謂官府之八法要則月計之書也二曰師師謂六官之二僚屬受教者掌官成以治凡官成謂官府之八成凡則旬計之書也三曰司若天官宰夫地官鄉師之類各司職事者掌官法以治目官法見上目謂日計四曰旅旅謂上中下士掌官常以治數官常即八法之第四也數謂事之多少也五曰府主蓄藏文書及器物者掌官契以治藏契謂要書藏謂所蓄藏者藏去聲六曰史理文辭而述事者掌官書以贊治書謂史所述者贊治若今文書起草也七曰胥治文書之次叙謂材智為什長者掌官叙以治叙官叙即胥所治者治叙謂應所治之先後也八曰徒趨走以應呼召者掌官令以徵令官令謂官府之令徵令即上所召也掌治法治官之法以考百官府羣都縣鄙之治羣都諸采邑也六遂五百家為鄙五鄙為縣以治法考其治功也乘其財用之出入乘猶計也財錢穀也用貨賄也凡失財用物辟名者物畜獸也辟名謂作僞文書與實不相應者辟音僻以官刑詔冢宰而誅之官刑即八法之第七也告於長官而誅責之其足用長財善物者三者無失又能足之長之善之者賞之能如此則賞之以式法掌祭祀之戒具與其薦羞戒具見小宰注薦脯醢也羞庶羞也凡此皆有舊法式者從大宰而眂滌濯大宰視滌濯宰夫則從之凡禮事遇有行禮之事贊小宰比官府之具小宰已言戒具宰犬則贊之而比校其美惡焉比如字凡朝覲㑹同賓客凡朝覲㑹同之賓客以牢禮之法掌其牢禮委積膳獻飲食賓賜之飱牽與其陳數牢禮之法總言其綱也掌其牢禮以下詳言其目也牛羊豕共為一牢禮委積謂米禾薪芻膳謂熟物齊和者獻謂新物始獻者飲食燕享也飱食也牽牲可牽而行者也賓客未至則有委積已至則有膳獻飲食始至則有飱牽賓之飱牽則有司所供賜之飱牽則王所好賜陳數則以爵等為牢禮所陳之數也凡邦之弔事掌其戒令與其幣器財用凡所共者大喪小喪掌小官之戒令帥執事而治之三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之歲終則令羣吏正歲㑹歲計曰㑹謂一歲㑹稽文書總勾考之月終則令正月要月計曰要旬終則令正日成十日為旬日計曰成而以考其治歲㑹月要日成皆令羣吏正之以考其治治不以時舉者違令失期㑹者以告而誅之告於冢宰而誅責之正歲則以法警戒羣吏法治法也警懲之以言戒謂束之以事令修宫中之職事職事之廢者理治之書其能者與其良者良猶善也羣吏之能者良者皆書之而以告于上告之大宰小宰宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人宫中之長掌王宫之戒令糾禁戒其怠忽糾其緩散令之使有為禁之使勿為以時比宫中之官府次舍之衆寡時四時也比校也次所以待直宿也舍所以待休沐也衆寡不同故以四時比校之舍音赦為之版以待置版以書其人之名以待戒令也夕擊柝而比之柝戒守者所擊也夕比若今酉㸃柝音託國有故則令宿故謂禍災令宿若今坐甲其比亦如之亦如擊柝以上之事辨內外而時禁分別內人外人禁其非時出入稽其功緒考計其功狀與職業糾其德行糾察其在身之德施為之行幾其出入幾察宿衛羣吏之出入者均其稍食均平羣吏之廩祿稍所教反去其淫怠與其奇邪之民淫放濫也怠解慢也奇無常也邪不正也如此者皆除去之去上聲奇音基邪似嗟反㑹其什伍而教之道藝五人為伍十人為什道謂義理藝謂禮樂射御書數月終則㑹其稍食月祿至月終㑹計之歲終則㑹其行事吏職至歲終考其功過也凡邦之大事國之大事在祀與戎令于王宫之官府次舍次舍見前注無去守而聽政令即其所居而待其所為春秋以木鐸修火禁季春季秋火星出入之時則以木鐸警衆使修火政也凡邦之事蹕國有事故王出則蹕止行人若今衛士宫中廟中則執燭大喪則授廬舍辨其親疏貴賤之居宫伯中士二人下士四人府一人史二人胥二人徒二十人伯亦長也副於宫正故以伯稱掌王宫之士庶子凡在版者士衛士也庶子國子之倅未為士也版名籍也掌其政令上所正者為政下所稟者為令行其秩叙秩廩祿也叙才等也作其徒役之事若有役焉則作其徒也授八次八舍之職事衛王宫必居四角四中故云八次八舍次舍說見王宫若邦有大事如國有寇戎之大事作宫衆則令之起宫中之衆吏士庶子行則宫伯戒令之月終則均秩均其廩祿之秩歲終則均叙均其才等之叙以時頒其衣裘夏時頒衣冬時頒裘掌其誅賞有功則賞有罪則誅膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人食官之長掌王之食飲膳羞食飯也飲酒漿也膳牲肉也羞庶羞也食音嗣以養王及后世子王天下之至尊后配王而立內治世子天下之本故兼養之凡王之饋進食於尊者曰饋食用六穀黍稷稻梁苽麥膳用六牲馬牛羊豕犬雞飲用六清水醬醴䣼􅫐酏羞用百二十品羞出於牲及禽獸以備滋味其品有百二十珍用八物淳熬淳母炮豚炮牂搗珍清熬肝膋醬用百有二十罋醢六十罋醯六十罋罋甕同王日一舉一舉謂朝食也殺牲盛饌曰舉鼎十有二牢鼎九陪鼎三物皆有俎物謂牢鼎之實亦九俎以樂侑食用樂勸食膳夫授祭禮飲食必有祭示有所先也膳夫授王以所祭之物品嘗食膳夫每物皆先嘗之防有毒也王乃食然後王乃食也卒食食畢以樂徹于造徹收也作樂畢徹于造食之所王齊日三舉齊謂散齊致齊也齊必變食故特加二舉大喪則不舉王喪大荒則不舉凶年大札則不舉疫癘天地有烖則不舉日月薄蝕為天烖山崩川沸為地烖邦有大故則不舉寇戎之事凡此皆不舉盛饌以自貶損也王燕食謂日中與夕食則奉膳贊祭燕食則其祭不如朝食之盛故膳夫受而贊之凡王祭祀賓客食謂祭祀宗廟及與賓客禮食於廟則徹王之胙俎膳夫徹其胙俎餘則其屬徹之凡王之稍事有小事而飲酒設薦脯醢臘人共脯醢人共醢膳夫則陳而進之王燕飲酒行燕禮與羣臣飲酒則為獻主君尊不與臣敵故膳夫代王酌酒獻賓掌后及世子之膳羞亦主其饌之數但不餽耳凡肉修之頒賜皆掌之王以肉及修餔頒賜羣臣皆膳夫掌之凡祭祀之致福者受而膳之以摯見者亦如之歲終則㑹計頒賜之多少唯王及后世子之膳不㑹不以有司法數拘之也庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人掌庖厨者掌共六畜六獸六禽六畜即六牲也六獸麋鹿狼麕野豕六禽雁鶉鷃雉鳩鴿辨其名物别其名號物色凡其死生鮮薧之物新肉曰鮮乾肉曰薧鮮音鮮薧音稿以共王之膳與其薦羞之物及后世子之膳羞備品物曰薦膳羞並見膳夫注共祭祀之好羞共喪紀之庶羞賓客之禽獸凡令禽獻以法授之其出入亦如之凡用禽獻煎和之以獻王春行羔豚行猶用也羔羊子豚豕子膳膏香膳治也膳膏香謂治羔豚以牛脂夏行腒鱐腒乾雉鱐乾魚腒音渠鱐音膳膏臊治腒鱐以犬膏秋行犢麛犢牛子麛鹿子膳膏腥治犢麛以雞膏冬行鮮羽鮮魚也羽雁也膳膏羶治鮮羽以羊脂歲終則㑹唯王及后之膳禽不㑹以見世子之膳禽在所㑹矣內饔中士四人下士八人府二人史四人胥十人徒百人調和熟食曰饔內饔所主在內掌王及后世子膳羞之割亨煎和之事割肆解肉也亨煮也煎和齊以五味也亨音烹和去聲辨體名肉物體名脊脅肩背臑之屬肉物胾燔之屬辨百品味之物庶羞之屬王舉則陳其鼎俎舉謂王日一舉以牲體實之取於鑊以實鼎取於鼎以實俎選百羞醬物珍物以俟饋選擇其中御者俟待也餘見膳夫注共后及世子之膳羞膳夫掌之內饔共之辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕肓視而交脻腥馬黑脊而般臂螻凡宗廟之祭祀掌割亨之事凡燕飲食亦如之凡掌共羞修刑膴胖骨鱐以待共膳凡王之好賜肉修則饔人共之外饔官屬如內饔所主在外掌外祭祀之割亨外祭祀謂天地四望山川社稷五祀外神共其脯修刑膴脯薄析肉也修煆肉也刑鉶羮也膴䐑肉大臠也膴音呼陳其鼎俎實之牲體魚臘見內饔注凡賓客之飱饔饗食之事亦如之飱謂客始至之禮饔謂既將幣之禮饗嗣謂行饗禮之時食謂行食禮之時食音邦饗耆老孤子耆老謂國老庶老孤子死王事者之子也則掌其割亨之事割亨見內饔注饗士庶子亦如之士庶子衛王宫者師役則掌共其獻賜脯肉之事凡小喪紀陳其鼎俎而實之亨人下士四人府一人史二人胥五人徒烹五十人主為內外饔煮肉也亨音掌共鼎鑊鑊所以煮之鼎所以和之鑊音穫以給水火之齊齊量也水火皆有多少之量亨人給之齊才細反職外內饔之爨亨煮辨膳羞之物祭祀共大羮鉶羮大羹煮肉汁大古不和之羮鉶羮加以五味也鉶音刑賓客亦如之亨食亦用大羮鉶羮也甸師下士二人府一人史二人胥三十人徒三百人郊外曰甸甸師主共野物官之長掌帥其屬而耕耨王藉其屬謂胥徒也耨耘耔也藉之言借也王以季春躬耕藉田胥徒則耕耨終之以時入之時熟則收入之以共齍盛六穀曰齍在器曰盛所以共祭祀也祭祀共蕭茅蕭以祭脂茅以縮酒共野果蓏之薦植生曰果蔓生曰蓏薦進也蓏力果反喪事代王受眚烖王之同姓有罪則死刑焉帥其徒以薪蒸役外內饔之事役給役也木大曰薪小曰蒸以受役於外內饔獸人中士四人下士八人府二人史四人胥四人徒四十人其職共膳羞故屬於此掌罟田獸罟網也以網搏取當田之獸辨其名物野獸皆有名號物色冬獻狼狼膏溫故冬獻之夏獻麋麋膏涼故夏獻之春秋獻獸物春秋寒溫適故獸物皆獻之時田則守罟四時田獵必守罟者謂獸觸網而攫者取之及弊田令禽注于虞中凡祭祀喪紀賓客共其死獸生獸凡獸入于臘人皮毛筋角入于玉府凡田獸者掌其政令凡有田獵獸人皆掌其田獵之政令漁人中士二人下士四人府二人史四人胥三十人徒三百人其職共魚物故屬於此漁音漁掌以時漁季冬乃取魚為梁偃水為關空以取之春獻王鮪月令季春薦鮪于寢廟鮪位軌反辨漁物辨魚之名物為鮮薧鮮生魚薧乾魚以共王膳羞共於膳夫以共王凡祭祀賓客喪紀共其魚之鮮薧凡漁者掌其政令凡漁征入于玉府魚之鬚骨堪飾器物者所有征稅入于玉府以當邦賦也鱉人下士四人府二人史二人徒十有六人其職亦共食物掌取互物互謂有甲介者以時簎魚鱉龜蜃凡貍物簎投也刺於泥中以取貍藏之物蜃大蛤也生育之時不可取故云以時蜃七軫反貍莫皆反春獻鱉蜃春謂子丑寅之月秋獻龜魚秋謂午未申之月凡此皆以避其生育之時祭祀共蠯螺蚳以授醢人掌凡邦之簎事臘人下士四人府二人史二人徒二十人乾物曰臘掌乾肉凡田獸之脯臘膴胖之事大物解體肆乾之謂之乾肉小物全乾曰臘膴䐑肉大臠也胖如脯而腥此皆獸人所共臘人治之膴音呼胖音判凡祭祀共豆脯薦脯膴胖凡臘物豆當為羞聲之誤也凡祭祀臘人則共羞脯謂庶羞之脯薦脯謂薦獻之脯及凡臘物皆臘人治之賓客喪紀共其脯臘凡乾肉之事周禮句解卷一
